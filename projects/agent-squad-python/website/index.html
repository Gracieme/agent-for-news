<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>格雷西学习小屋 🏡</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:   #1a73e8;
      --pink:   #c2185b;
      --teal:   #00838f;
      --purple: #667eea;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 14px rgba(102,126,234,.4);
    }
    .header-brand { display: flex; align-items: baseline; gap: 10px; }
    .header-brand h1 { color: #fff; font-size: 20px; font-weight: 800; letter-spacing: 1px; }
    .header-brand span { color: rgba(255,255,255,.6); font-size: 12px; }
    .header-pill {
      background: rgba(255,255,255,.18);
      border-radius: 20px;
      padding: 5px 16px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }
    .header-pill em { font-style: normal; font-size: 20px; font-weight: 800; }

    /* ── Layout ── */
    .layout {
      display: flex;
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 16px;
      gap: 20px;
      align-items: flex-start;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 196px;
      flex-shrink: 0;
      position: sticky;
      top: 76px;
      max-height: calc(100vh - 96px);
      overflow-y: auto;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .sidebar-label {
      font-size: 11px;
      font-weight: 700;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 0 4px;
      margin-bottom: 10px;
    }

    .date-item {
      background: #fff;
      border-radius: 10px;
      padding: 10px 13px;
      margin-bottom: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all .15s ease;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .date-item:hover { border-color: #c4b7f0; transform: translateX(2px); }
    .date-item.active {
      border-color: var(--purple);
      background: linear-gradient(135deg, #f3f0ff, #faf0ff);
    }
    .date-item .di-en  { font-size: 12px; font-weight: 700; color: #555; }
    .date-item.active .di-en { color: var(--purple); }
    .date-item .di-cn  { font-size: 11px; color: #bbb; margin-top: 1px; }
    .date-item .di-dots { display: flex; gap: 3px; margin-top: 5px; }
    .dot {
      font-size: 11px;
      padding: 1px 5px;
      border-radius: 6px;
      background: #f0f0f0;
      color: #888;
    }

    /* ── Main ── */
    .main { flex: 1; min-width: 0; }

    /* ── Tab bar ── */
    .tab-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab-btn {
      padding: 9px 20px;
      border-radius: 10px;
      border: 2px solid #e8e8e8;
      background: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      color: #888;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
    }
    .tab-btn:hover { border-color: #bbb; color: #555; }

    .tab-btn[data-tab="english"].active {
      border-color: var(--blue); background: #e8f0fe; color: var(--blue);
      box-shadow: 0 2px 10px rgba(26,115,232,.18);
    }
    .tab-btn[data-tab="beauty"].active {
      border-color: var(--pink); background: #fce4ec; color: var(--pink);
      box-shadow: 0 2px 10px rgba(194,24,91,.18);
    }
    .tab-btn[data-tab="research"].active {
      border-color: var(--teal); background: #e0f7fa; color: var(--teal);
      box-shadow: 0 2px 10px rgba(0,131,143,.18);
    }

    /* ── Content panel ── */
    .content-panel {
      background: #fff;
      border-radius: 14px;
      padding: 28px 30px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
      min-height: 420px;
    }

    /* ── States ── */
    .center-msg {
      text-align: center;
      padding: 80px 20px;
      color: #bbb;
      font-size: 15px;
      line-height: 1.9;
    }
    .center-msg .big { font-size: 52px; margin-bottom: 16px; }

    @media (max-width: 680px) {
      .layout { flex-direction: column; padding: 12px; }
      .sidebar { width: 100%; position: static; max-height: 180px; }
      .header-pill { display: none; }
      .header-brand h1 { font-size: 16px; }
    }
  </style>
</head>

<header class="header">

  <div class="header-pill"><em id="total-days">0</em> days of learning</div>

<div class="layout">

    <div id="date-list"></div>

      <button class="tab-btn active" data-tab="english">📚 英语表达</button>
      <button class="tab-btn"        data-tab="beauty">💄 美妆</button>
      <button class="tab-btn"        data-tab="research">🔬 科研文献</button>

      </div>
    </div>
  </main>

</div>

<script>
const ENTRIES = [{"date_key": "2026-03-09", "date_cn": "2026年03月09日", "day_cn": "周一", "english": "<div style=\"background:#e8f0fe;border-left:4px solid #1a73e8;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1a73e8;font-size:15px\">【今日主题】</strong></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e3f2fd;border-left:4px solid #0d47a1;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#0d47a1;font-size:15px\">【英文原文】</strong></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">So my buddy Marcus just got promoted to Senior Director at his company, and honestly, nobody&#x27;s surprised. That guy has been grinding nonstop since day one. I remember back when he first started, he was just a junior analyst, but you could tell he was hungry — he wasn&#x27;t about to just phone it in like some people do. He actually went above and beyond on every single project, even the boring ones nobody wanted to touch.</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A couple of years in, he hit a rough patch. His team got restructured, his favorite manager left, and he seriously thought about throwing in the towel. I told him, &quot;Dude, don&#x27;t. You&#x27;ve already put in the work. Just hang in there.&quot; And he did. He kept his head down, stayed focused, and didn&#x27;t get caught up in all the office politics. While other people were busy kissing up to the higher-ups, Marcus was just quietly delivering results.</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">Then last year, he really stepped up to the plate when the company landed a massive client and nobody knew how to handle the account. Marcus volunteered, pulled a few all-nighters, and absolutely crushed it. That project alone put him on the radar of the C-suite executives. His boss told him straight up, &quot;You&#x27;re a go-getter, and we need more people like you.&quot;</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">Now he&#x27;s climbing the corporate ladder faster than anyone expected. The coolest part? He&#x27;s not the kind of guy who big-leagues people. Even after the promotion, he still grabs lunch with the interns and helps new hires get the lay of the land. He always says, &quot;I didn&#x27;t get here overnight — it was a long game.&quot; And that&#x27;s the thing about real success: you have to put in the reps and trust the process. No shortcuts.</p>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e8f5e9;border-left:4px solid #1b5e20;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1b5e20;font-size:15px\">【中文翻译】</strong></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">我哥们儿Marcus刚升了高级总监，说实话，没人觉得意外。这哥们儿从第一天起就一直在拼命努力（grinding）。我记得他刚入职的时候只是个初级分析师，但你看得出来他很有野心——他绝不会像有些人那样敷衍了事（phone it in）。他在每一个项目上都全力以赴、超额完成（went above and beyond），哪怕是那些没人想碰的无聊项目。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">干了几年之后，他遇到了一段艰难时期（hit a rough patch）。团队被重组，他最喜欢的经理走了，他真的认真考虑过放弃（throwing in the towel）。我跟他说：&quot;兄弟，别放弃。你已经付出了那么多努力，再撑一撑（hang in there）就好了。&quot;他真的撑住了。他埋头苦干，保持专注，没有卷入那些办公室政治。其他人都忙着巴结上级（kissing up to the higher-ups），Marcus只是默默地交付成果。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">后来去年，公司拿下了一个大客户，没人知道怎么搞定这个项目，Marcus挺身而出、迎接挑战（stepped up to the plate），主动请缨，熬了几个通宵，然后漂亮地完成了任务（crushed it）。光这一个项目就让他进入了高管层的视野。他老板直接跟他说：&quot;你是个积极进取的人（go-getter），我们需要更多像你这样的人。&quot;</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">现在他在公司晋升（climbing the corporate ladder）的速度比谁都快。最酷的是什么呢？他不是那种升了职就摆架子看不起人的人（big-leagues people）。升职之后，他照样跟实习生一起吃午饭，帮新员工熟悉情况（get the lay of the land）。他总说：&quot;我不是一夜之间走到这一步的——这是一场持久战。&quot;真正的成功就是这样：你得持续付出努力，相信过程。没有捷径。</p>\n<div style=\"height:8px\"></div>\n<div style=\"background:#f3e5f5;border-left:4px solid #4a148c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#4a148c;font-size:15px\">【本日表达列表】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">01.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\">**phone it in**</strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 敷衍了事，不认真对待工作</span>&nbsp;&nbsp;<span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap\">📍 职场吐槽、朋友闲聊</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">02.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\">**go above and beyond**</strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 超出预期地努力，做得比要求的更多</span>&nbsp;&nbsp;<span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap\">📍 职场评价、绩效评估、日常赞美</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">03.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\">**hit a rough patch**</strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 经历一段困难/低谷时期</span>&nbsp;&nbsp;<span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap\">📍 朋友谈心、职场分享经历</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">04.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\">**throw in the towel**</strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 放弃，认输（源自拳击比赛）</span>&nbsp;&nbsp;<span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap\">📍 日常闲聊、励志谈话</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">05.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\">**hang in there**</strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 再撑一撑，坚持住</span>&nbsp;&nbsp;<span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap\">📍 安慰朋友、鼓励同事</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">06.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\">**kiss up to (someone)**</strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 巴结、拍马屁</span>&nbsp;&nbsp;<span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap\">📍 职场吐槽、朋友私下聊天</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">07.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\">**step up to the plate**</strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 挺身而出，主动承担责任（源自棒球）</span>&nbsp;&nbsp;<span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap\">📍 职场表扬、团队讨论</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">08.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\">**crush it**</strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 表现极其出色，干得漂亮</span>&nbsp;&nbsp;<span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap\">📍 朋友鼓励、社交媒体、职场庆祝</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">09.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\">**climb the corporate ladder**</strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 在公司逐步晋升</span>&nbsp;&nbsp;<span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap\">📍 职业发展讨论、朋友聊天</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">10.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\">**big-league (someone)**</strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 摆架子、看不起人、冷落别人</span>&nbsp;&nbsp;<span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap\">📍 朋友吐槽、社交评价</span></td></tr></table>", "beauty": "<div style=\"background:#fce4ec;border-left:4px solid #e91e8c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#c2185b;font-size:15px\">【今日主题】</strong></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">## 一、妆前准备——&quot;先养后遮&quot;四步法</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">**Step 1 ｜ 软化角质，让底妆&quot;吃得进&quot;**</p>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>早晨洁面后用含 **5% PHA（葡萄糖酸内酯）** 的化妆水湿敷T区 30 秒，软化偏厚角质层，避免后续粉底浮在表面。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>⚠️ 不建议每天用磨砂或高浓度果酸，一周 1-2 次即可。</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">**Step 2 ｜ 保湿打底**</p>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>全脸薄涂一层含 **神经酰胺+角鲨烷** 的轻乳液，等待 2 分钟完全吸收。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>重点：让皮肤摸起来&quot;润而不滑&quot;，才是上妆最佳状态。</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">**Step 3 ｜ 局部控油**</p>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>仅在鼻翼、额头等出油区域点涂 **控油妆前乳**（哑光型），其余区域不涂——避免全脸过于干涩显暗。</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">**Step 4 ｜ 全脸提亮校色**</p>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>使用 **蜜桃色/杏橘色妆前校色乳** 薄薄一层全脸推开。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>🟠 蜜桃橘调：中和橄榄皮的黄绿灰调暗沉</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>❌ 避开紫色校色乳：会让橄榄皮更灰更脏</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">## 二、粉底上法——&quot;中心亮、边缘融&quot;</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">**Step 5 ｜ 选对色号**</p>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>橄榄皮关键词：**暖黄调偏绿底（Warm Olive）**。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>试色位置：下颌线 → 自然光下看 30 秒，消失感最强的就是你的色号。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>色号常见陷阱：偏粉的色号上脸会&quot;灰+脏&quot;，偏白的色号会&quot;面具感&quot;。</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">**Step 6 ｜ 上妆手法（圆脸专属）**</p>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">1.</span><span style=\"color:#333;font-size:14px;line-height:1.7\">取约一泵粉底液，点在 **面中三角区**（两眼下方+鼻梁+嘴周）。</span></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">2.</span><span style=\"color:#333;font-size:14px;line-height:1.7\">用 **微湿美妆蛋** 从面中央向外弹拍推开——</span></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>面中央：轻拍 2-3 遍 → 遮盖力集中在视觉中心，自带&quot;聚光感&quot;。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>脸颊外侧 &amp; 下颌线：只用余粉轻轻带过，保持轻薄 → **减少横向膨胀感**。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>发际线 &amp; 耳前：几乎不上粉底，留出自然阴影区域。</div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">3.</span><span style=\"color:#333;font-size:14px;line-height:1.7\">✅ 口诀：**&quot;中间厚、四周薄、边缘无&quot;**——圆脸最怕全脸均匀涂满显&quot;大饼&quot;。</span></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">**Step 7 ｜ 遮瑕分区**</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 区域 | 遮瑕质地 | 手法 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">|------|----------|------|</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 黑眼圈 | 蜜桃/橘调液体遮瑕 | 倒三角打底→拍开 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 鼻翼泛红 | 偏黄绿调遮瑕 | 小刷点涂→蛋拍 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 痘印/毛孔 | 高遮盖膏状遮瑕 | 指腹按压 → 不拉扯 |</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">**Step 8 ｜ 定妆（分区策略）**</p>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>**T区 + 鼻翼**：控油散粉，用粉扑按压定妆。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>**面中苹果肌**：薄扫一层细腻定妆粉，保留微光泽。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>**脸颊外侧**：可不定妆或极薄扫过 → 保留皮肤质感，避免&quot;全哑光大平面&quot;放大圆脸。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">## 三、圆脸底妆的&quot;视觉塑形&quot;小心机</p>\n<div style=\"height:8px\"></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">1.</span><span style=\"color:#333;font-size:14px;line-height:1.7\">**粉底色差法**：面中用正常色号，下颌线及两侧用深半号粉底自然过渡 → 比修容更隐形的收窄手法。</span></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">2.</span><span style=\"color:#333;font-size:14px;line-height:1.7\">**高光暗示**：鼻梁、眉骨下方、人中用极细高光笔轻点 → 把视线拉向纵向中轴线。</span></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">3.</span><span style=\"color:#333;font-size:14px;line-height:1.7\">**不要把粉底涂到耳根**：留出耳前阴影可以让脸看起来窄 1cm。</span></div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#fff9c4;border-left:4px solid #f9a825;padding:12px 16px;margin:14px 0;border-radius:0 8px 8px 0\"><strong style=\"color:#e65100\">💡 **针对你的肤质/脸型：**</strong></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">&gt; **角质偏厚** → 妆前软化角质是关键，否则底妆会&quot;搓泥+斑驳&quot;。每周一次温和去角质（PHA / 酵素粉）可以让底妆服帖度提升一个级别。</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">&gt;</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">&gt; **皮肤偏黄偏暗** → 校色环节别省！蜜桃/杏橘调校色乳 1 步 = 少叠 1 层粉底的遮盖量，整体妆感更轻薄透亮。</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">&gt;</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">&gt; **毛孔偏大** → 上妆永远用&quot;按压拍弹&quot;，**禁止来回涂抹推拉**，否则粉底会被推进毛孔形成&quot;反向填充&quot;，毛孔更明显。</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">&gt;</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">&gt; **圆脸** → 底妆阶段就开始&quot;做减法&quot;：外轮廓的薄+面中央的亮 = 天然小</p>", "research": "<p style=\"margin:5px 0;line-height:1.8;color:#555;font-size:13px;padding-left:96px\"># 📚 每日论文推荐 — 2026年3月9日</p>\n<p style=\"margin:5px 0;line-height:1.8;color:#555;font-size:13px;padding-left:96px\">### 今日主题侧重：评估与语言权力（washback · epistemic injustice · CDA）</p>\n<div style=\"height:6px\"></div>\n<div style=\"height:6px\"></div>\n<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 1</div>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 **作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">** Shohamy, E.</td></tr></table>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 **标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">** Language Tests as Language Policy Tools</td></tr></table>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 **期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">** *Assessment in Education: Principles, Policy &amp; Practice*, 14(1), 117–130</td></tr></table>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 **引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">** 约 350 次（估计）</td></tr></table>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 **摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">**</td></tr></table>\n<p style=\"margin:5px 0;line-height:1.8;color:#555;font-size:13px;padding-left:96px\">Shohamy 在本文中系统阐述了语言测试如何被用作隐性的语言政策工具（de facto language policy）。她认为，测试并非中立的测量手段，而是被各种权力机构利用来控制语言行为、塑造课程内容、排斥特定群体的机制。文章提出了&quot;测试的力量&quot;框架，分析测试如何通过 washback 效应在教育系统中自上而下地传递意识形态信息，并探讨了对抗不公正测试实践的&quot;民主评估&quot;路径。</p>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 **与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">**</td></tr></table>\n<p style=\"margin:5px 0;line-height:1.8;color:#555;font-size:13px;padding-left:96px\">此文为研究方向一提供了核心理论支撑——将 AP Chinese 考试理解为一种隐性语言政策工具。Shohamy 关于测试如何制造语言等级制度（metalinguistic asymmetry）的论述，直接呼应了您对 AP Chinese 如何通过评估标准再生产认识论不公正（epistemic injustice）的研究框架。她对 washback 的政策化解读也超越了传统的教学效果层面，与 CDA 视角天然契合。</p>\n<div style=\"height:6px\"></div>\n<div style=\"height:6px\"></div>\n</div>\n<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 2</div>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 **作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">** Flores, N. &amp; Rosa, J.</td></tr></table>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 **标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">** Undoing Appropriateness: Raciolinguistic Ideologies and Language Diversity in Education</td></tr></table>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 **期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">** *Harvard Educational Review*, 85(2), 149–171</td></tr></table>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 **引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">** 约 1,800 次（估计）</td></tr></table>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 **摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">**</td></tr></table>\n<p style=\"margin:5px 0;line-height:1.8;color:#555;font-size:13px;padding-left:96px\">Flores 和 Rosa 提出了&quot;种族语言意识形态&quot;（raciolinguistic ideologies）这一开创性概念，指出语言&quot;得体性&quot;（appropriateness）的判定标准根植于白人听者主体（white listening subject）的感知习惯中。即使少数族裔说话者产出了&quot;标准&quot;语言形式，他们仍然可能被系统性地感知为语言能力不足。文章批判了将双语者的&quot;学术语言&quot;与主流单语标准对齐的教育实践，认为这些实践忽略了结构性种族化对语言评价的深层影响。</p>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 **与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">**</td></tr></table>\n<p style=\"margin:5px 0;line-height:1.8;color:#555;font-size:13px;padding-left:96px\">此文高度关联您对 AP Chinese 评估中 hermeneutical injustice 的分析。Flores &amp; Rosa 的核心论点——语言评价中的&quot;得体性&quot;标准本身就内嵌了种族化的认知框架——可以直接迁移到您对中文能力评估的批判性分析中：谁的中文被视为&quot;标准&quot;？评估框架中的&quot;heritage vs. non-heritage&quot; 区分是否复制了种族语言意识形态？该论文为 CDA 分析 AP Chinese 评分标准（rubrics）提供了有力的理论透镜。</p>\n<div style=\"height:6px\"></div>\n<div style=\"height:6px\"></div>\n</div>\n<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 3</div>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 **作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">** Li Wei</td></tr></table>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 **标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">** Translanguaging as a Practical Theory of Language</td></tr></table>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 **期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">** *Applied Linguistics*, 39(1), 9–30</td></tr></table>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 **引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">** 约 1,500 次（估计）</td></tr></table>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 </td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">**摘要</td></tr></table>\n</div>"}];

let selIdx = ENTRIES.length > 0 ? 0 : -1;
let selTab = 'english';

document.getElementById('total-days').textContent = ENTRIES.length;

/* ── Format date_key "2026-03-09" → "Mon, Mar 9" ── */
function fmtUS(dateKey) {
  const d = new Date(dateKey + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
}

/* ── Sidebar ── */
function renderSidebar() {
  const list = document.getElementById('date-list');
  if (!ENTRIES.length) {
    list.innerHTML = '<div style="color:#ccc;font-size:12px;padding:6px">No entries yet</div>';
    return;
  }
  list.innerHTML = ENTRIES.map((e, i) => `
    <div class="date-item ${i === selIdx ? 'active' : ''}" onclick="selectEntry(${i})">
      <div class="di-en">${fmtUS(e.date_key)}</div>
      <div class="di-cn">${e.day_cn}</div>
      <div class="di-dots">
        ${e.english  ? '<span class="dot">📚</span>' : ''}
        ${e.beauty   ? '<span class="dot">💄</span>' : ''}
        ${e.research ? '<span class="dot">🔬</span>' : ''}
      </div>
    </div>
  `).join('');
}

/* ── Content ── */
function renderContent() {
  const panel = document.getElementById('content-panel');
  if (selIdx < 0) {
    panel.innerHTML = ENTRIES.length
      ? '<div class="center-msg">← Pick a date from the left</div>'
      : '<div class="center-msg"><div class="big">🏡</div>No entries yet.<br>Run the daily email script to get started!</div>';
    return;
  }
  const html = ENTRIES[selIdx][selTab];
  panel.innerHTML = html
    || '<div class="center-msg" style="color:#ccc">No content for this section</div>';
}

function selectEntry(i) {
  selIdx = i;
  renderSidebar();
  renderContent();
}

/* ── Tab clicks ── */
document.getElementById('tab-bar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selTab = btn.dataset.tab;
  renderContent();
});

/* ── Init ── */
renderSidebar();
renderContent();
</script>
