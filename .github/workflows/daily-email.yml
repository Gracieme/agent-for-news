# 每日定时发邮件 + 更新格雷西学习小屋网站
# 丹佛时间每天早 8:00（UTC 15:00 冬季 / UTC 14:00 夏令时）自动运行
name: Daily Email + Update Site

on:
  schedule:
    - cron: '0 8 * * *'    # 夏令时 MDT（UTC-6）凌晨 2:00；冬季 MST 改为 '0 9 * * *'
  workflow_dispatch:         # 允许手动触发

permissions:
  contents: write            # 允许 workflow 把生成的网站文件 commit 回仓库

jobs:
  send-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: projects/agent-squad-python

      - name: Send daily email & build site
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY:  ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:          ${{ secrets.TO_EMAIL }}
        run: python daily_email.py
        working-directory: projects/agent-squad-python

      - name: Commit updated website files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "🏡 Daily update: $(date -u +'%Y-%m-%d')"
          git push
