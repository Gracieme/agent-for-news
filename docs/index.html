ine-height:1.7;\">55 次</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">The COVID-19 pandemic, necessitating remote instruction in the vast majority of educational institutions around the world, put technology squarely at the center of language learning and teaching. Virtually all teaching and learning was mediated by Zoom or similar videoconferencing platforms. Students could see one another&#x27;s faces (rather than the backs of their peers’ heads), but they could also c…</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">这篇论文探讨了21世纪技术（尤其是疫情期间远程教学平台）对语言教育的影响，涉及课堂互动模式的根本性变化（如Zoom分组讨论、聊天窗口作为交际副渠道），这与<strong>方向二</strong>中CSL课堂互动、同伴互动（peer interaction）及中介（mediation）研究直接相关，因为技术平台重新塑造了学习者之间的互动方式与语言相关片段的生成情境。此外，技术驱动的教学变革也牵涉<strong>方向三</strong>中教师在制度性技术要求下的情感劳动与</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://doi.org/10.1111/modl.12924\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 10.1111/modl.12924</a></td></tr></table>\n<div style=\"height:6px\"></div>\n</div>\n<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 3</div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Kevin W. H. Tai</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">Translanguaging as Inclusive Pedagogical Practices in English-Medium Instruction Science and Mathematics Classrooms for Linguistically and Culturally Diverse Students</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Research in Science Education</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2021</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">120 次</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Abstract In English-medium instruction (EMI), English-as-a-second-language students will learn all/some subjects through English. Although there are a considerable number of studies which explore classroom interaction in Hong Kong (HK) secondary EMI schools, few studies have investigated EMI lessons which involve South Asian ethnic minorised students. These students share different linguistic and …</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">该论文聚焦EMI课堂中translanguaging作为包容性教学策略的多模态会话分析，与<strong>方向二</strong>高度相关，尤其在translanguaging实践和课堂互动分析层面形成直接呼应，为理解语言多样性背景下的中介机制提供了参照。同时，研究关注语言少数族裔学生在EMI体制下的经历，涉及语言权力与教育公平议题，与<strong>方向一</strong>中语言权力和认知不公正（epistemic injustice）的关切存在潜在对话空间。此外，教师在多语多文化课堂中的教学调适也可延伸至**</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://doi.org/10.1007/s11165-021-10018-6\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 10.1007/s11165-021-10018-6</a></td></tr></table>\n</div>"}, {"date_key": "2026-03-24", "date_cn": "2026年03月24日", "day_cn": "周二", "english": "<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e8f0fe;border-left:4px solid #1a73e8;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1a73e8;font-size:15px\">【今日主题】</strong><span style=\"margin-left:8px;font-weight:400;color:#1a73e8\">人生哲理与智慧 Life Wisdom, Choices &amp; Consequences</span></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e3f2fd;border-left:4px solid #0d47a1;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#0d47a1;font-size:15px\">【英文原文】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Hey, you&#x27;ve been quiet all morning. What&#x27;s going on?</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">I don&#x27;t know, man. I&#x27;ve been doing a lot of soul-searching lately. I turned forty last month, and suddenly I&#x27;m looking back at everything wondering if I <strong>played my cards right</strong>.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Forty&#x27;s not the end of the world. You&#x27;ve got a solid career, a family that loves you. Don&#x27;t sell yourself short.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Yeah, but remember when I almost moved to Portland to start that nonprofit? I chickened out. Sometimes I wonder what would&#x27;ve happened if I&#x27;d <strong>taken the plunge</strong>.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Okay, but here&#x27;s the thing — <strong>hindsight is 20/20</strong>. You made the best call you could with what you knew back then. And honestly, you <strong>landed on your feet</strong> pretty well.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">I guess. It&#x27;s just — I keep seeing people online living these wild, adventurous lives, and I feel like I&#x27;m just <span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">going through the motions</span>.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Bro, comparison is the thief of joy. Those people only post the highlight reel. Real life? <strong>It is what it is.</strong> Nobody&#x27;s got it all figured out. Everyone&#x27;s just <strong>winging it</strong> to some degree.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Ha. That&#x27;s weirdly comforting. My dad always used to say, <strong>&quot;You reap what you sow.&quot;</strong> And I think I&#x27;ve sown decent stuff, but I just can&#x27;t shake this feeling that I&#x27;m stuck.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Then shake things up! Doesn&#x27;t have to be some massive life overhaul. Start small. You know what they say — <strong>every cloud has a silver lining</strong>. Maybe this restless feeling is actually pushing you toward something better.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">You think so?</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Absolutely. And look, <strong>what&#x27;s done is done</strong> — you can&#x27;t change the past. But you&#x27;ve still got a ton of runway ahead of you. Stop beating yourself up. <strong>The ball is in your court</strong> now. You get to decide what the next chapter looks like.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Man, when did you get so wise?</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Wise? Nah. I just <strong>learned the hard way</strong> — spent my whole thirties stressing about the same stuff. Trust me, the sooner you stop overthinking, the sooner you start living.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Alright, alright. Maybe I&#x27;ll dust off that old business plan this weekend.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Now we&#x27;re talking.</td></tr></table>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e8f5e9;border-left:4px solid #1b5e20;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1b5e20;font-size:15px\">【中文翻译】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">嘿，你整个上午都不怎么说话。怎么了？</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">不知道啊，老兄。我最近一直在反思自己（soul-searching）。上个月刚满四十，突然就开始回头看所有事情，想自己当初有没有<strong>做对选择</strong>（played my cards right）。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">四十岁又不是世界末日。你事业稳定，家人也爱你。别<strong>低估自己</strong>（sell yourself short）。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">话是这么说，但你还记得我差点搬去波特兰开那个非营利组织吗？我退缩了。有时候我就想，如果当初<strong>放手一搏</strong>（taken the plunge）会怎样。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">好吧，但问题是——<strong>事后看谁都是诸葛亮</strong>（hindsight is 20/20）。你当时根据已知信息做了最好的判断。而且说实话，你最后<strong>也站稳脚跟了</strong>（landed on your feet）。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">也许吧。只是——我老看到网上的人过着那种疯狂冒险的生活，感觉自己只是在<span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">行尸走肉地过日子</span>（going through the motions）。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">兄弟，攀比是快乐的小偷。那些人只发精彩片段。真实生活？<strong>就那么回事呗</strong>（It is what it is）。没人什么都想通了。每个人在某种程度上都在<strong>摸着石头过河</strong>（winging it）。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">哈，这话莫名让人安慰。我爸以前老说，<strong>&quot;种瓜得瓜，种豆得豆&quot;</strong>（You reap what you sow）。我觉得我种的东西也还行，但就是摆脱不了那种被困住的感觉。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">那就做点改变啊！不一定非要大刀阔斧改变人生，从小处开始。你知道人们怎么说的——<strong>每朵乌云都镶着银边</strong>（every cloud has a silver lining）。也许这种不安的感觉其实是在推你走向更好的东西。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">你觉得是这样？</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">当然。而且你看，<strong>过去的就过去了</strong>（what&#x27;s done is done）——你改变不了过去。但你前面还有很长的路。别再自我折磨了。<strong>球在你这边</strong>（the ball is in your court），下一个篇章什么样，由你来决定。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">老兄，你什么时候变得这么有智慧了？</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">有智慧？才不是。我只是<strong>吃了亏才学到的</strong>（learned the hard way）——整个三十岁都在为同样的事情焦虑。相信我，你越早停止想太多，就越早开始真正地生活。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">好吧好吧。也许这周末我会把那个老商业计划书翻出来看看。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">这才对嘛。</td></tr></table>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#f3e5f5;border-left:4px solid #4a148c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#4a148c;font-size:15px\">【本日表达列表】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">01.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>play your cards right</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 做出正确的选择/策略，把手里的牌打好</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 反思过去的决定、谈论策略时</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">02.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>take the plunge</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 下定决心冒险一试，放手一搏</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 鼓励别人大胆行动，讨论人生重大决定时</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">03.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>hindsight is 20/20</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 事后诸葛亮，回头看什么都清楚</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 安慰别人不要后悔过去的决定</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">04.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>land on your feet</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 在困境后站稳脚跟，化险为夷</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 形容某人经历困难后恢复得不错</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">05.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>It is what it is.</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 事情就是这样，没什么好改变的，接受现实吧</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用（极高频口头禅）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 表达对现状的接受，日常万能口头禅</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">06.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>wing it</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 即兴发挥，没有计划就硬上</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 没准备就去做某事，或形容人生没有完美计划</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">07.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>You reap what you sow.</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 种瓜得瓜，种豆得豆；自作自受/一分耕耘一分收获</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用（常见于家庭教育、南方口语）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 谈论因果报应、人生哲理时</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">08.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>every cloud has a silver lining</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 黑暗中总有一线光明，塞翁失马焉知非福</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 英国通用 / 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 安慰别人、对困境保持乐观时</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">09.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>What&#x27;s done is done.</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 过去的事就过去了，木已成舟</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 劝别人放下过去、不要再纠结</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">10.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>The ball is in your court.</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 轮到你做决定了，主动权在你手里</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 告诉对方下一步取决于他们自己的行动</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>额外标注的地道表达：</strong></p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">- <span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">going through the motions</span>：机械地做事，行尸走肉般过日子</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">- <span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">sell yourself short</span>：低估自己，妄自菲薄</p>", "beauty": "<div style=\"background:#fce4ec;border-left:4px solid #e91e8c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#c2185b;font-size:15px\">【今日主题】</strong><span style=\"margin-left:8px;font-weight:400;color:#c2185b\">眼妆教程 — 温棕拉长眼型，圆脸秒变高级</span></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">今天教你一套 <strong>「横向拉长＋深邃消肿」</strong> 的日常温棕眼妆，整体思路是：用棕调晕染把眼睛往 <strong>外侧延伸</strong>，配合圆脸的修饰让五官视觉上更集中、脸型更窄长。</p>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">🔶 STEP 1｜眼部打底（关键一步，别跳过！）</div>\n<div style=\"height:8px\"></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>取 <strong>米杏色/肉桂奶茶色</strong> 眼部打底膏，薄薄铺满整个眼皮直至眉骨下方。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>作用：遮住眼皮暗沉发灰、均匀肤色，后续眼影更显色、更持久不积线。</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">&gt; ✅ 橄榄皮眼周常带灰绿暗沉，这一步能让后面所有颜色都「干净」。</p>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">🔶 STEP 2｜打底色铺色（大面积·柔光）</div>\n<div style=\"height:8px\"></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>用 <strong>大号晕染刷</strong> 蘸取 <strong>哑光奶茶棕/浅驼色</strong>，以眼窝为范围来回晕染。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>范围：睁眼后能看到约 2-3 mm 的色彩边缘，不要晕太高。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>内眼角→外眼角方向带，<strong>外眼角区域可以稍微多叠一层</strong>，为拉长做准备。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">🔶 STEP 3｜加深色塑形（重点·拉长）</div>\n<div style=\"height:8px\"></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>换 <strong>中号锥形刷</strong>，蘸取 <strong>红棕/焦糖棕（半哑光或微微细闪）</strong>。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>涂在 <strong>双眼皮褶皱线内 + 外眼角 ＜ 形三角区</strong>。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>🔑 <strong>拉长技巧</strong>：</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>外眼角向太阳穴方向 <strong>斜向上延伸约 5 mm</strong>，画出一个小三角并晕染边缘。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>下眼尾 1/3 也用同色轻轻带过，与上眼尾三角区自然衔接，形成 <strong>＜ 包围感</strong>。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>内眼角处 <strong>不加深</strong>，保持干净，避免显脏。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">🔶 STEP 4｜点睛深色（最深·收缩）</div>\n<div style=\"height:8px\"></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>用 <strong>细节刷/扁平小刷</strong> 蘸取 <strong>深巧克力棕/深红棕（哑光）</strong>。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>只压在 <strong>睫毛根部</strong>，像画一条粗眼线一样，从瞳孔正上方往外眼角描。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>下眼线外 1/4 也轻压一点点，让眼尾有「收拢→延伸」的锐利感。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">🔶 STEP 5｜提亮（高光点缀）</div>\n<div style=\"height:8px\"></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>眼头</strong>：用手指或细刷点一颗 <strong>香槟金/蜜桃金细闪</strong>，提亮眼头增加神采。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>卧蚕中段</strong>：同色轻点卧蚕中央最凸处，眼睛立刻有光泽感。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>⚠️ 避免大面积亮片铺眼皮中央——橄榄皮大面积珠光容易显肿显油。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">🔶 STEP 6｜眼线 + 睫毛，完成！</div>\n<div style=\"height:8px\"></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>眼线</strong>：棕黑色/深棕色眼线胶笔，贴着睫毛根部画内眼线＋外眼线。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>眼尾 <strong>微微上挑拉出 3-4 mm</strong>，与 STEP 3 的三角阴影方向一致。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>不要画全包眼线（会让眼睛显圆→脸更圆）。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>睫毛</strong>：夹翘后刷 <strong>纤长型睫毛膏</strong>（棕黑色最佳），重点刷外眼角的睫毛，强化拉长效果。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">💡 针对你的肤质 / 脸型个性化建议</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 维度 | 建议 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">|------|------|</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| <strong>橄榄皮显色</strong> | 橄榄皮吃色偏灰，选眼影时在手臂内侧试色：涂上后偏灰偏脏的 PASS，选涂上后依然带暖棕/红棕调的。 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| <strong>角质层偏厚·眼周暗沉</strong> | 前一晚可用含 <strong>2% 烟酰胺或维 C 衍生物</strong> 的眼霜局部提亮；上妆前用 <strong>蜜桃色校色遮瑕</strong> 点在眼周暗沉处再上打底。 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| <strong>毛孔·出油</strong> | 眼皮出油会让眼影结块：打底膏之后可以用散粉扑轻压一层薄定妆粉，再上眼影，持妆翻倍。 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| <strong>圆脸拉长</strong> | ① 眉毛同步配合：眉尾适当拉长至超过外眼角垂直线，带出横向延伸感。② 眼妆整体重心放外眼角，内眼角保持浅色/留白。③ 避免圆形大面积晕染（会加宽中庭）。 |</p>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">🎨 产品 / 色号推荐</div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">眼影盘</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 产品 | 推荐理由 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">|------|----------|</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| <strong>BOBBI BROWN 经典巧克力系列</strong>（Warm）| 红棕＋焦</p>", "research": "<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 1</div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Huarong Ma</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">Critical Thinking Dispositions of Undergraduate College Students in A Comprehensive University of Mainland China</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">International Journal of Higher Education</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2021</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">5 次</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">This study was undertaken to assess the critical thinking dispositions of undergraduate college students in a comprehensive university of mainland China and examine the roles of gender and major in the subjects’ critical thinking dispositions. An adapted Chinese version of the California Critical Thinking Dispositions Inventory (CCTDI) was used to survey 534 undergraduate students. Statistics reve…</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">该研究关注中国大陆本科生的批判性思维倾向评估，使用标准化量表（CCTDI）进行测量，与方向一中&quot;评估&quot;（assessment）的主题相关，尤其涉及大规模标准化测试工具在中国语境下的适用性与文化调适问题。此外，研究揭示中国学生批判性思维倾向普遍偏低的现象，可与方向一中有关认知公正（epistemic injustice）的讨论产生对话——即教育体制与文化因素如何塑造或制约学生的认知能力与思维习惯，进而影响其在高风险考试（如AP</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://doi.org/10.5430/ijhe.v10n6p224\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 10.5430/ijhe.v10n6p224</a></td></tr></table>\n<div style=\"height:6px\"></div>\n</div>\n<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 2</div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Zhi Ma</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">From Validity to Equity: Revisiting CET-4 Through Messick, Kane, and Paraskeva’s Frameworks</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">International Journal of Language and Linguistics</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2025</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">0 次</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">The College English Test Band 4 (CET-4) is a high-stakes, standardised English proficiency assessment widely administered in Chinese universities. Initially developed to evaluate non-English majors’ language competence, it has since evolved into a gatekeeping mechanism that influences graduation eligibility, access to scholarships, postgraduate admissions, and employment opportunities. As English …</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">该论文与用户的【方向一】高度相关。首先，论文以CET-4这一高利害标准化考试为对象，运用Messick的效度框架、Kane的论证框架以及Paraskeva的公平视角进行批判性审视，直接呼应了用户关注的assessment、washback等核心议题。其次，论文聚焦考试作为&quot;门槛机制&quot;对毕业、升学和就业的影响，涉及考试如何系统性地制造或再生产不平等，这与用户关注的语言权力、epistemic injustice以及CDA式的批判性分析框架高度契合。此外，论文从效度走向公</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://doi.org/10.11648/j.ijll.20251303.14\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 10.11648/j.ijll.20251303.14</a></td></tr></table>\n<div style=\"height:6px\"></div>\n</div>\n<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 3</div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Andrew Gordon Drybrough</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">Conceptualisations of critical thinking in academic writing at a master’s level</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">ERA</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2019</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">0 次</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Critical thinking is often considered to involve a set of skills required by graduates of higher educational institutions in the UK. However, the conceptualisation of critical thinking by university tutors varies across disciplines and is not always particularly clear. In a UK higher educational context where proportionally increasing numbers of postgraduate students are international, often from …</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">这篇论文探讨高等教育中批判性思维的概念化及其在不同学科、不同文化背景学生间的理解差异。它与方向一有一定关联：批判性思维的界定涉及学术评估标准中的知识权力问题，不同教育传统的学生面对英国学术规范时可能遭遇认识论不公正（epistemic injustice），即其原有的思维方式和知识传统被边缘化或贬低。此外，导师对批判性思维的不同概念化也可通过批评话语分析（CDA）的视角来审视学术话语中隐含的权力关系与制度期待。</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://scholar.google.com/scholar?q=Conceptualisations%20of%20critical%20thinking%20in%20academic%20writing%20at%20a%20master%E2%80%99s%20level\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 Google Scholar</a></td></tr></table>\n</div>"}, {"date_key": "2026-03-23", "date_cn": "2026年03月23日", "day_cn": "周一", "english": "<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e8f0fe;border-left:4px solid #1a73e8;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1a73e8;font-size:15px\">【今日主题】</strong><span style=\"margin-left:8px;font-weight:400;color:#1a73e8\">职场与成功（Career, Ambition, Perseverance）</span></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e3f2fd;border-left:4px solid #0d47a1;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#0d47a1;font-size:15px\">【英文原文】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Hey, I heard you finally got that senior manager position. Congrats! You&#x27;ve been <strong>grinding</strong> for years.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Thanks, man. Honestly, it almost didn&#x27;t happen. I was <span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">this close</span> to throwing in the towel last summer when they passed me over the first time.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Yeah, I remember that. You were pretty bummed out. But you didn&#x27;t let it <strong>get to your head</strong> — you just kept showing up and doing the work.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">I mean, what else was I gonna do? I had to <strong>put in the reps</strong>. I figured if I kept delivering results, eventually someone would notice. My mentor told me to just <strong>stay in my lane</strong> and focus on what I could control.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Smart advice. A lot of people would&#x27;ve started <strong>bad-mouthing</strong> the company or playing office politics instead.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Oh, for sure. I&#x27;ve seen people <strong>burn bridges</strong> over stuff like that, and it never ends well. I just kept my head down, and honestly, the whole experience lit a fire under me. I was like, okay, I need to <strong>level up</strong> — not just complain about it.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">That&#x27;s the right mindset. So what&#x27;s next? You gonna <strong>coast</strong> for a while now that you made it?</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Ha! No way. I&#x27;m already eyeing a director role in a couple of years. I know it&#x27;s a long shot, but I&#x27;ve got a <strong>game plan</strong>. I&#x27;m building the right relationships, getting more visibility on cross-functional projects, and trying to <strong>move the needle</strong> on some big initiatives.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">You&#x27;re not messing around. You know, a lot of people talk a big game, but you actually <strong>walk the walk</strong>. I respect that.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Appreciate it. Honestly, I&#x27;ve learned the hard way that nobody&#x27;s gonna <strong>hand you anything on a silver platter</strong>. You gotta bet on yourself and just keep pushing. Some days you&#x27;re <span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">running on fumes</span>, but that&#x27;s part of the deal.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Well, you&#x27;ve earned it. Let&#x27;s grab dinner this weekend — <span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">my treat</span>. We gotta celebrate properly.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">I&#x27;m down. Let&#x27;s do it.</td></tr></table>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e8f5e9;border-left:4px solid #1b5e20;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1b5e20;font-size:15px\">【中文翻译】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">嘿，听说你终于拿到高级经理的职位了。恭喜！你这些年一直在<strong>拼命干</strong>（grinding）。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">谢了，兄弟。说实话，差点就没成。去年夏天他们第一次跳过我的时候，我差点就想放弃了。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">是啊，我记得那时候你挺沮丧的。但你没<strong>让那事冲昏头脑</strong>（get to your head），你就是继续埋头干活。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">我还能怎么办呢？我只能<strong>不断积累</strong>（put in the reps）。我想着只要持续拿出成绩，总会有人注意到的。我的导师跟我说，就<strong>做好自己的事</strong>（stay in my lane），专注于自己能控制的东西。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">好建议。很多人遇到这种事会开始<strong>说公司坏话</strong>（bad-mouthing），或者玩办公室政治。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">可不是嘛。我见过不少人因为这种事<strong>把关系搞砸</strong>（burn bridges），从来没有好下场。我就低头做事，说实话，那段经历反而激发了我的斗志。我当时想，好吧，我得<strong>提升自己</strong>（level up）——而不是光抱怨。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">这心态就对了。那接下来呢？你现在升上去了，是不是要<strong>混混日子</strong>（coast）了？</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">哈！不可能。我已经在盯着两年内升总监了。我知道希望不大，但我有<strong>一套计划</strong>（game plan）。我在建立对的人脉，争取在跨部门项目中获得更多曝光，努力在一些大项目上<strong>推动实质性进展</strong>（move the needle）。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">你可真不是闹着玩的。你知道吗，很多人只会嘴上说说，但你是真正<strong>说到做到的人</strong>（walk the walk）。我很佩服。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">感谢了。说实话，我是吃了亏才明白，没有人会<strong>把东西端到你面前白送给你</strong>（hand you anything on a silver platter）。你得相信自己，然后不停往前走。有些日子你已经<span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">精疲力竭</span>了，但那就是这条路的一部分。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">你值得的。这周末我们去吃个饭吧——<span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">我请客</span>。得好好庆祝一下。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">走起。</td></tr></table>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#f3e5f5;border-left:4px solid #4a148c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#4a148c;font-size:15px\">【本日表达列表】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">01.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>grinding</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 拼命干、持续努力工作</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / Gen Z &amp; 千禧一代尤其常用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 形容长期高强度工作或为目标不懈奋斗，职场和健身圈都很常见</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">02.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>get to your head</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 冲昏头脑；让负面情绪（或成功）影响你的心态</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 提醒别人不要被挫折打倒或被成功冲昏头脑</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">03.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>put in the reps</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 反复练习、不断积累（像健身里的&quot;做够次数&quot;）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 强调成功需要大量重复性努力，职场和个人成长语境常见</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">04.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>stay in my lane</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 做好自己的事、不越界、专注自己的领域</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 源自非裔美国英语</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 建议别人不要管闲事、专注自身，职场和日常劝告都用</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">05.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>bad-mouthing</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 说坏话、诋毁、背后讲人坏话</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 描述某人在背后说公司、同事或某件事的坏话</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">06.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>burn bridges</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 把关系搞砸、自断后路</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 全球通用 / 美国尤其常用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 提醒别人离职或冲突时不要彻底得罪人，职场中非常经典的用法</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">07.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>level up</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 提升自己、升级（源自游戏用语，现广泛用于生活）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / Gen Z &amp; 千禧一代</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 说自己要在技能、职位、生活品质上更上一层楼</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">08.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>coast</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 混日子、不太用力地滑行、不再努力</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 形容一个人在达到目标后懈怠了，或者问别人是不是打算&quot;躺平&quot;</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">09.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>game plan</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 作战计划、行动方案（源自体育用语）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 职场和日常生活中说&quot;我有一套计划&quot;，非常口语化</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">10.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>move the needle</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 推动实质性进展、产生实际影响</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 商业职场高频用语</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 强调做的事要有实际效果、而不是做无用功，开会和汇报中常听到</span></td></tr></table>", "beauty": "<div style=\"background:#fce4ec;border-left:4px solid #e91e8c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#c2185b;font-size:15px\">【今日主题】</strong><span style=\"margin-left:8px;font-weight:400;color:#c2185b\">底妆技巧 · 打造橄榄皮的高级奶油肌</span></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">🧴 完整底妆六步法</div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">Step 1｜妆前护肤——给底妆&quot;铺路&quot;</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>洁面后薄涂一层<strong>含烟酰胺的精华</strong>，快速提亮暗沉的黄灰底色</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>面霜选<strong>啫喱质地/水乳质地</strong>，避免过度油润导致后续搓泥</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>等待 <strong>2-3 分钟</strong>，让护肤品完全成膜再上妆前乳</div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">Step 2｜妆前乳——分区策略（关键！）</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>T 区 + 鼻翼两侧</strong>：控油填毛孔型妆前（硅感柔焦类），用指腹轻轻按压&quot;填&quot;进毛孔，不要拉扯涂抹</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91
