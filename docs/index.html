ng=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">05.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>buckle down</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 认真起来、开始集中精力努力做某事</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 劝人该收心了、该努力了的时候用</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">06.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>free up</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 腾出（时间、资金、空间等）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 讨论如何重新分配资源、省钱或腾出时间时常用</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">07.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>raking it in</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 赚大钱、财源滚滚</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国 / 英国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 形容某人或某生意赚了很多钱</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">08.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>make the most of</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 充分利用、最大化利用（时间、机会等）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 鼓励别人珍惜机会或有效利用资源时常用</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">09.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>strapped for (time/cash)</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— （时间或金钱）紧张、不够用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 日常抱怨钱不够或时间不够时常用</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">10.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>nail down</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 敲定、确定下来（计划、细节等）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 讨论落实计划、确认安排时常用</span></td></tr></table>", "beauty": "<div style=\"background:#fce4ec;border-left:4px solid #e91e8c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#c2185b;font-size:15px\">【今日主题】</strong><span style=\"margin-left:8px;font-weight:400;color:#c2185b\">唇妆色号 💋</span></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">一、橄榄皮选唇色的核心逻辑</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">橄榄皮最大的&quot;陷阱&quot;是——很多柜台试色好看的颜色，上嘴后会发灰、显脏、让肤色更暗沉。根源在于：</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">&gt; 橄榄皮底色含<strong>绿调/灰调</strong>，遇到冷粉、冷紫、荧光色会互相&quot;打架&quot;，灰上加灰。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">✅ <strong>选色万能公式：暖底调 + 中高饱和度 + 微棕/微红</strong></p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">❌ <strong>避雷关键词：冷粉、死亡芭比粉、紫粉、裸灰色、荧光橘</strong></p>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">二、五大黄金色系详解</div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">1️⃣ 砖红/铁锈红（最安全的&quot;本命色&quot;）</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>色彩特征</strong>：红色底调+棕色沉淀，像秋天的红砖墙</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>上嘴效果</strong>：压住黄调和灰调，瞬间气色拉满，显白一个度</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>适合场景</strong>：日常通勤、约会、正式场合——几乎万能</div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">2️⃣ 暖棕红/红棕色（高级知性感）</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>色彩特征</strong>：棕多红少，带一点点焦糖质感</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>上嘴效果</strong>：与肤色高度融合、不抢戏但非常显质感</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>适合场景</strong>：极简妆/裸妆搭配、日常低调出门</div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">3️⃣ 暖调豆沙/脏粉（日常温柔挂）</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>色彩特征</strong>：粉色中掺入了棕和红，绝非&quot;纯粉&quot;</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>上嘴效果</strong>：减龄、柔和，不会像冷粉一样显灰</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>⚠️ 注意</strong>：一定选偏&quot;脏&quot;偏&quot;暖&quot;的豆沙，避免偏紫偏冷的</div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">4️⃣ 焦糖/红梨色（秋冬质感感）</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>色彩特征</strong>：深红+橘棕，像煮过的梨子皮</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>上嘴效果</strong>：深邃、高级，非常显白，适合浓一点的妆面</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>适合场景</strong>：派对、晚宴、秋冬重妆</div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">5️⃣ 暖调正红（节日/气场色）</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>色彩特征</strong>：正红色偏暖橘底，不是蓝调正红</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>上嘴效果</strong>：最经典的&quot;好气色&quot;，拍照超上镜</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>⚠️ 注意</strong>：选暖调/橘底正红，蓝调正红在橄榄皮上易显老</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">三、上唇技巧——圆脸专属唇形修饰</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">圆脸横向宽、轮廓柔，唇妆可以帮你<strong>纵向拉长中庭、聚焦视觉中心</strong>：</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>Step 1｜遮原唇边缘</strong></p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">用遮瑕膏/粉底轻拍嘴角外侧和唇边缘，模糊原有唇线——这一步让后续画唇形更自由。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>Step 2｜唇线塑形（关键！）</strong></p>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>用唇笔/唇刷<strong>微微画高唇峰</strong>（上唇中央最高点上移1-2mm），视觉上拉长人中、增加纵向比例。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>不要刻意加宽嘴角</strong>——圆脸忌横向延伸，唇型宽度保持或略收。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>下唇中央可<strong>稍稍画厚1mm</strong>，形成饱满的&quot;水滴形&quot;焦点。</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>Step 3｜填色方式</strong></p>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>哑光/丝绒质地为主</strong>——雾面质感显脸小、更利落。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>嘴角处颜色可略淡于中央（自然渐变咬唇），制造&quot;嘟嘟感&quot;同时收缩唇部宽度。</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>Step 4｜终极小心机</strong></p>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>在<strong>下唇正中央</strong>点一小滴透明/浅色唇蜜，制造立体光点，视线向内聚拢，脸看起来更小。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">💡 针对你的肤质/脸型个性化建议</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>关于唇部状态：</strong></p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">棱橄榄皮角质层偏厚，唇周和唇部本身也容易暗沉、唇色偏深。因此：</p>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>涂浅色裸唇色时<strong>一定先用唇部遮瑕/打底</strong>打底（如用指腹薄拍粉底），否则原始暗唇色会把色号&quot;吃掉&quot;变脏。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>砖红、红棕这类中深色反而可以直接涂，因为它们能完美覆盖暗唇底。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>每周1-2次用<strong>唇部磨砂膏</strong>去唇部老化角质（跟面部角质层厚同理），上色更均匀。</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>关于脸型：</strong></p>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>唇妆是圆脸最容易被忽略的&quot;显瘦武器&quot;——一个有存在感的唇色可以把视线锁定在面部中下方纵轴，从而弱化横向颧骨宽度。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>建议妆面公式</strong>：淡眼妆 + 有重点的唇色 = 视觉下移收窄，脸型更立体纤长。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">🎨 产品/色号推荐</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 色系 | 产品推荐 | 色号 | 推荐理由 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">|------|</p>", "research": "<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 1</div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Huarong Ma</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">Critical Thinking Dispositions of Undergraduate College Students in A Comprehensive University of Mainland China</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">International Journal of Higher Education</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2021</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">4 次</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">This study was undertaken to assess the critical thinking dispositions of undergraduate college students in a comprehensive university of mainland China and examine the roles of gender and major in the subjects’ critical thinking dispositions. An adapted Chinese version of the California Critical Thinking Dispositions Inventory (CCTDI) was used to survey 534 undergraduate students. Statistics reve…</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">该研究涉及中国大陆高等教育情境下批判性思维倾向的评估，与方向一中&quot;assessment&quot;（评估）的主题有一定关联，尤其是对学生认知能力与倾向的测量工具使用及其在中国语境中的适用性问题。然而，该研究聚焦于批判性思维倾向而非语言评估或语言权力，也未涉及课堂互动、教师情感劳动等议题，因此与三个核心研究方向的直接关联性较弱，仅在&quot;评估工具的跨文化适用性&quot;及&quot;中国教育体制对学生思维塑造&quot;层面提</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://doi.org/10.5430/ijhe.v10n6p224\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 10.5430/ijhe.v10n6p224</a></td></tr></table>\n<div style=\"height:6px\"></div>\n</div>\n<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 2</div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Zhi Ma</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">From Validity to Equity: Revisiting CET-4 Through Messick, Kane, and Paraskeva’s Frameworks</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">International Journal of Language and Linguistics</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2025</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">0 次</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">The College English Test Band 4 (CET-4) is a high-stakes, standardised English proficiency assessment widely administered in Chinese universities. Initially developed to evaluate non-English majors’ language competence, it has since evolved into a gatekeeping mechanism that influences graduation eligibility, access to scholarships, postgraduate admissions, and employment opportunities. As English …</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">该论文通过Messick、Kane及Paraskeva的框架对CET-4进行效度与公平性审视，与用户方向一高度相关：它直接涉及高风险语言评估（assessment）的社会后果与权力运作，CET-4作为&quot;守门机制&quot;（gatekeeping）对学生机会的限制呼应了认识论不公正（epistemic injustice）的关切，同时对标准化考试公平性的批判性分析与批评话语分析（CDA）的学术取向一脉相承。此外，该研究探讨考试对教学的反拨效应（washback），即CET-4如何塑造大学英语教学实践</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://doi.org/10.11648/j.ijll.20251303.14\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 10.11648/j.ijll.20251303.14</a></td></tr></table>\n<div style=\"height:6px\"></div>\n</div>\n<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 3</div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Andrew Gordon Drybrough</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">Conceptualisations of critical thinking in academic writing at a master’s level</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">ERA</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2019</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">0 次</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Critical thinking is often considered to involve a set of skills required by graduates of higher educational institutions in the UK. However, the conceptualisation of critical thinking by university tutors varies across disciplines and is not always particularly clear. In a UK higher educational context where proportionally increasing numbers of postgraduate students are international, often from …</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">这篇论文探讨高等教育中批判性思维的概念化及其在国际学生与导师之间的理解差异，与用户的研究方向存在一定关联：首先，它涉及学术评估中隐含的认识论权力问题——导师对&quot;批判性思维&quot;的界定标准可能构成一种认知不公（epistemic injustice），与方向一中评估、语言权力及批判话语分析的关切相呼应；其次，国际学生（包括来自中文教育背景的学生）在学术写作中的批判性思维表现涉及跨语言、跨文化的知识建构过程，与方向二中</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://scholar.google.com/scholar?q=Conceptualisations%20of%20critical%20thinking%20in%20academic%20writing%20at%20a%20master%E2%80%99s%20level\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 Google Scholar</a></td></tr></table>\n</div>"}, {"date_key": "2026-03-11", "date_cn": "2026年03月11日", "day_cn": "周三", "english": "<div style=\"background:#e8f0fe;border-left:4px solid #1a73e8;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1a73e8;font-size:15px\">【今日主题】</strong><span style=\"margin-left:8px;font-weight:400;color:#1a73e8\">人际关系与友谊 (Friendship, Trust &amp; Communication)</span></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e3f2fd;border-left:4px solid #0d47a1;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#0d47a1;font-size:15px\">【英文原文】</strong></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A (Megan): Hey, so… I need to vent for a sec. You know how I&#x27;ve been <strong>thick as thieves</strong> with Lauren since college?</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">B (Jake): Yeah, you two were basically inseparable. What happened?</p>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Well, lately she&#x27;s been super <strong>flaky</strong> — canceling plans last minute, leaving me on read for days. I finally called her out on it, and she totally <strong>gaslit</strong> me. She was like, &quot;I never said I&#x27;d come,&quot; when I literally have the texts.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Oof. That&#x27;s rough. Did you <span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">push back</span> or just let it go?</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">I pushed back, but I tried to keep it cool. I told her, &quot;Look, I&#x27;m not trying to start drama, but you need to <strong>keep it real</strong> with me.&quot; And she just <strong>blew me off</strong> like it was nothing.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Man, that&#x27;s frustrating. Sounds like she&#x27;s not <strong>showing up</strong> for you the way a real friend should.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Exactly. And the thing is, I&#x27;ve always <strong>had her back</strong> — like, every single time she needed someone, I was there. I even <strong>went to bat for</strong> her when people at work were talking behind her back.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">A hundred percent. You&#x27;ve been solid. Honestly, it sounds like she&#x27;s been <strong>taking you for granted</strong>. Some people just get comfortable and stop putting in the effort.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Yeah… My sister told me I should just <strong>cut her off</strong>, but that feels extreme. We have so much history, you know?</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">I hear you. You don&#x27;t have to burn the bridge completely. Maybe just <strong>set some boundaries</strong> and pull back a little. See if she notices and actually steps up. If she values the friendship, she&#x27;ll come around. If not… well, that tells you everything.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">You always know how to <strong>talk me off the ledge</strong>. Seriously, I was <span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">spiraling</span> all morning.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">That&#x27;s what I&#x27;m here for. And hey — you deserve people who <strong>ride or die</strong> with you, not just when it&#x27;s convenient for them.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Ugh, you&#x27;re right. Thanks for <span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">keeping it real</span> with me too, by the way.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Always.</td></tr></table>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e8f5e9;border-left:4px solid #1b5e20;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1b5e20;font-size:15px\">【中文翻译】</strong></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A（梅根）：嘿，我需要吐槽一下。你知道我跟劳伦从大学起就一直<strong>关系特别铁</strong>（thick as thieves）吧？</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">B（杰克）：嗯，你俩基本上形影不离。怎么了？</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A：最近她特别<strong>不靠谱</strong>（flaky）——总是临时取消计划，消息几天不回。我终于当面说了她，结果她完全在<strong>颠倒黑白</strong>（gaslit me）。她说&quot;我从没说过我要来&quot;，但我明明有聊天记录。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">B：唉，那挺糟心的。你有反驳还是就算了？</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A：我反驳了，但我尽量保持冷静。我跟她说：&quot;听着，我不是要搞事，但你得跟我<strong>说实话、别装了</strong>（keep it real）。&quot;结果她直接<strong>不当回事儿</strong>（blew me off），好像根本无所谓。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">B：天哪，太让人恼火了。听起来她没有像真正的朋友那样<strong>用心对待你</strong>（showing up for you）。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A：就是啊。而且我一直<strong>挺她</strong>（had her back）——每次她需要人的时候，我都在。她在公司被人背后议论的时候，我还<strong>替她出头</strong>（went to bat for her）。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">B：百分百。你一直很够意思。说实话，听起来她一直在<strong>把你的付出当理所当然</strong>（taking you for granted）。有些人就是处着处着就懒得经营了。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A：是啊……我姐说我应该直接<strong>跟她断了</strong>（cut her off），但那感觉太极端了。我们毕竟认识这么久了。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">B：我理解。你不用彻底把桥烧了。也许就<strong>划清一些界限</strong>（set some boundaries），稍微拉开点距离。看看她有没有注意到、愿不愿意主动改变。如果她重视这段友谊，她会回头的。如果不会……那本身就说明一切了。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A：你总能<strong>让我冷静下来</strong>（talk me off the ledge）。说真的，我一早上都在胡思乱想。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">B：我就是干这个的嘛。还有——你值得拥有跟你<strong>不离不弃</strong>（ride or die）的人，不是只在她方便的时候才出现的人。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A：唉，你说得对。顺便说一句，也谢谢你对我说实话。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">B：那必须的。</p>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#f3e5f5;border-left:4px solid #4a148c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#4a148c;font-size:15px\">【本日表达列表】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">01.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>thick as thieves</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 关系非常亲密、铁得很</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 全球通用（美国常用）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 形容两个人关系特别好、形影不离，朋友间聊天常用</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">02.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>flaky</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 不靠谱的，说话不算数的，总是临时放鸽子</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 吐槽某人总是取消计划、不守承诺</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">03.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>gaslight (someone)</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 通过否认事实来操控对方、让对方怀疑自己的判断</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / Gen Z 高频词</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 描述人际关系中的精神操控行为，现已广泛用于日常口语</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">04.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>keep it real</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 说实话、别装、真诚以对</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用（源自非裔美国英语 AAVE）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 要求对方坦诚相待，或夸赞某人真实不做作</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">05.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>blow someone off</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 敷衍某人、不把某人当回事、放鸽子</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 朋友/约会对象忽视你的感受或取消约定时使用</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">06.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>show up (for someone)</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— （在精神/情感上）支持某人、为某人到场</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 强调一段关系中&quot;用心在场&quot;的重要性，不仅仅指物理上到场</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">07.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>have someone&#x27;s back</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 支持某人、挺某人、为某人撑腰</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 表示忠诚和可靠的友谊，非常高频的日常表达</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">08.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>go to bat for someone</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 替某人出头、为某人据理力争</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用（源自棒球比喻）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 在职场或社交场合中为朋友辩护或争取利益</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">09.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>take someone for granted</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 把某人的付出视为理所当然、不珍惜</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 全球通用（美国极高频）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 感情、友谊、家庭关系中的经典抱怨</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">10.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>talk someone off the ledge</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 让某人冷静下来、安抚极度焦虑/崩溃的人</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 朋友情绪失控或过度焦虑时，帮助对方恢复理性（口语化比喻，非字面意义）</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>附加标注说明：</strong> 对话中用 <span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">双下划线</span> 标出的 push back、spiraling、keeping it real（重复出现）等也属于地道表达，供读者留意，但未列入今日学习重点。另外 <strong>ride or die</strong> 出现在对话末尾，含义为&quot;不离不弃的/同甘共苦的&quot;（源自 AAVE / 嘻哈文化），由于与主题高度相关且极具美国特色，已作为隐含加分表达供读者自行积累。</p>", "beauty": "<div style=\"background:#fce4ec;border-left:4px solid #e91e8c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#c2185b;font-size:15px\">【今日主题】</strong><span style=\"margin-left:8px;font-weight:400;color:#c2185b\">修容高光 · 圆脸棱橄榄皮の立体小脸术</span></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">一、修容篇 —— 「收窄 + 拉长」双重策略</div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">Step 1 · 选对修容色调</div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">棱橄榄皮最常踩的坑：用偏灰/偏红的修容，上脸要么显脏要么像一坨泥。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">✅ <strong>正确色调：黄调棕 / 温暖可可棕</strong></p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">&gt; 与你本身的黄暖底调融合，阴影看起来像&quot;天生的骨骼暗面&quot;而非人为涂抹。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">❌ 避开：灰调修容、偏橘红修容、冷咖修容</p>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">Step 2 · 圆脸五区修容地图</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">按以下顺序上妆，用<strong>哑光修容</strong>（膏状更易控制，粉状更适合补妆）：</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 区域 | 位置 | 作用 | 手法 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">|------|------|------|------|</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| ① 颧骨下方 | 耳中→嘴角方向，<strong>止于瞳孔外侧垂直线</strong> | 收窄中庭宽度 | 斜向下45°刷，不超过鼻翼水平线 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| ② 下颌角 | 下颌骨转角处→下巴方向 | 弱化圆润轮廓 | 沿骨骼走向轻扫，向内渐淡 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| ③ 太阳穴 | 发际线与眉尾交汇的凹陷处 | 缩窄上庭 | 小面积晕染，与颧骨修容不要连成一片 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| ④ 发际线两侧 | 额头最宽的弧形区域 | 视觉窄额头 | 用大号散粉刷轻带，千万别下手重 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| ⑤ 鼻侧（可选） | 眉头至鼻翼两侧 | 鼻梁立体 | 极细刷，仅用余粉带过，避免&quot;两条杠&quot; |</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">&gt; <strong>圆脸核心原则：所有线条走向都是&quot;斜向下&quot;的，制造向下收拢的视觉引导，绝不横向平拉。</strong></p>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">Step 3 · 晕染是灵魂</div>\n<div style=\"height:8px\"></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>工具</strong>：选择松散、无明显切割线的刷子（如蘑菇头刷/斜角散粉刷）</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>口诀</strong>：&quot;三秒上色，十秒晕染&quot;——每画一笔，立刻用干净面来回晕开边界</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>检查</strong>：伸直手臂对镜自看，如果能一眼看到修容边界 → 还需要再晕</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">二、高光篇 —— 棱橄榄皮的「点光源」法则</div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">色调选择</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 高光色调 | 适合度 | 说明 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">|----------|--------|------|</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| <strong>香槟金 / 蜜桃金</strong> | ⭐⭐⭐⭐⭐ | 暖底色完美融合，提亮不突兀 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 淡金色带细闪 | ⭐⭐⭐⭐ | 适合晚间/派对，存在感强 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 银白色珠光 | ⭐⭐ | 在橄榄皮上会显灰、显毛孔 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 冷粉色高光 | ⭐ | 和肤色打架，显脏 |</p>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">圆脸高光位置 —— &quot;纵向窄条&quot;思维</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">&gt; 圆脸打高光最怕打成一个面，会让脸看起来更膨胀。我们要的是<strong>窄、长、精准的光带</strong>。</p>\n<div style=\"height:8px\"></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">1.</span><span style=\"color:#333;font-size:14px;line-height:1.7\"><strong>鼻梁中段</strong></span></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">从山根下方到鼻头上方1cm，一条极窄的光线。不要点到鼻头！圆脸+圆鼻头会更显圆。</p>\n<div style=\"height:8px\"></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">2.</span><span style=\"color:#333;font-size:14px;line-height:1.7\"><strong>眉弓骨（眉毛正下方的骨骼凸起处）</strong></span></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">沿眉骨画一条短弧线，让眉眼之间更立体，视觉上拉高中庭。</p>\n<div style=\"height:8px\"></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">3.</span><span style=\"color:#333;font-size:14px;line-height:1.7\"><strong>颧骨最高点 → 太阳穴方向</strong></span></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">关键！<strong>不要横着打在苹果肌上</strong>（那是圆脸最宽的地方）。从颧骨最高点往斜上方太阳穴的方向，画一道短斜线（约2cm），把光带向上、向外牵引。</p>\n<div style=\"height:8px\"></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">4.</span><span style=\"color:#333;font-size:14px;line-height:1.7\"><strong>下巴尖端（少量）</strong></span></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">一个指腹大小的点光，视觉上拉长下庭。</p>\n<div style=\"height:8px\"></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">5.</span><span style=\"color:#333;font-size:14px;line-height:1.7\"><strong>人中凹槽上方（唇弓上方）</strong></span></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">轻轻一点，让上唇轮廓更精致。</p>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">高光质地选择</div>\n<div style=\"height:8px\"></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>日常推荐：水光/奶油光泽型</strong>（cream/liquid）→ 从皮肤内部透出来的光感，不会放大毛孔</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>避免大面积用：粗闪片型</strong> → 橄榄皮毛孔偏大，粗闪会让毛孔更明显</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">三、修容+高光的黄金配合顺序</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">```</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">底妆完成</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">↓</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">① 膏状修容 → 晕染 → 定妆（散粉轻压修容区）</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">↓</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">② 膏状/液体高光 → 指腹点按晕开</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">↓</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">③ 如需加强：粉状修容叠加在膏状修容上方（少量！）</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">↓</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">④ 粉状高光用扇形刷轻扫加强（可选）</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">↓</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">⑤ 最后</p>", "research": "<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 1</div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Dharel P. Acut</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">From classroom learning to real-world skills: an autoethnographic account of school field trips and STEM work immersion program management</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Disciplinary and Interdisciplinary Science Education Research</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2024</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">10 次</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">摘要不可用</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">这篇论文采用自我民族志（autoethnography）方法探究学校实地考察与STEM沉浸式项目管理的经验，在方法论上与方向三中的autoethnography研究取径直接相关。此外，论文关注从课堂学习到真实世界技能的转化过程，涉及教育制度与教师实践层面的反思，与方向三中对教师经验及制度性因素的关注有一定呼应，但其STEM教育主题与用户的语言教育研究焦点存在较大学科差异，整体关联性有限。</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://doi.org/10.1186/s43031-024-00111-x\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 10.1186/s43031-024-00111-x</a></td></tr></table>\n<div style=\"height:6px\"></div>\n</div>\n<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 2</div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Katarina Blennow, Martin Malmström, Elizabeth Petroelje Stolle</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">Countering Discourses of Derision: Moving towards Action in Teacher Education in the USA and Sweden</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Education Sciences</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2023</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">3 次</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">This article is about how negative discourses of teacher education position teacher educators and how they might influence or inspire action. We use self-study methods to investigate the political dimension of teacher education in two national contexts: Sweden and the USA. More specifically, we examine the emotions stirred by the positioning related to being a teacher educator and how those emotio…</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">该论文聚焦教师教育者如何在贬损性话语中被定位，以及由此激发的情感与抵抗行动，这与方向三中&quot;teacher vulnerability&quot;和&quot;emotional labor&quot;高度相关——两者都关注教师在制度性话语压力下的情感体验与应对策略。此外，论文采用自我研究（self-study）方法探究政治维度，与方向三中自我民族志（autoethnography）的反思性质性研究取径相呼应，均强调研究者/实践者的主体经验在揭示制度权力结构中的作用。</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://doi.org/10.3390/educsci13070635\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 10.3390/educsci13070635</a></td></tr></table>\n<div style=\"height:6px\"></div>\n</div>\n<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 3</div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Francesca Ferrer-Best</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">The Virtual Ballet Studio: A Phenomenological Enquiry into the Domestic as Dance-Space During Lockdown</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">The International Journal of Screendance</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2021</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">5 次</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">The paper is based on an autoethnographic study of dancing via Zoom over the Covid19 lockdown in Sydney, Australia. Its theoretical framework takes up Iris Marion Young&#x27;s critical phenomenology and work on domestic space to think about certain focal points of the experience, such as having a room to move in, the floor, and the screen. The aim is to examine how important dance-space is to the exper…</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">这篇论文与用户研究方向的关联性较为有限，但存在方法论和概念层面的交叉。首先，该研究采用<strong>自我民族志（autoethnography）</strong>作为核心方法，这与方向三中教师脆弱性与情感劳动研究所使用的自我民族志方法论直接呼应，可为用户提供该方法在不同学科领域的应用范例与写作策略。其次，论文关注空间（domestic space）如何中介和重塑身体实践体验，这一&quot;空间—实践—主体&quot;的分析思路在概念上可与方向二中课堂互动空间（如线上CSL</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://doi.org/10.18061/ijsd.v12i0.7812\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 10.18061/ijsd.v12i0.7812</a></td></tr></table>\n</div>"}, {"date_key": "2026-03-10", "date_cn": "2026年03月10日", "day_cn": "周二", "english": "<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e8f0fe;border-left:4px solid #1a73e8;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1a73e8;font-size:15px\">【今日主题】</strong><span style=\"margin-left:8px;font-weight:400;color:#1a73e8\">人生哲理与智慧 Life Wisdom, Choices &amp; Consequences</span></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e3f2fd;border-left:4px solid #0d47a1;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#0d47a1;font-size:15px\">【英文原文】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Hey man, you seem kind of out of it today. What&#x27;s going on?</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Yeah... I&#x27;ve been doing a lot of soul-searching lately. You know how I turned down that job offer in Denver last year? I keep going back and forth in my head wondering if I made the right call.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Oh, I remember that. Look, there&#x27;s no point crying over spilled milk. You made the best decision you could with what you knew at the time. That&#x27;s all any of us can do.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">I know, I know. But it&#x27;s hard not to play the &quot;what if&quot; game. Like, what if that was my one shot and I blew it?</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Dude, that&#x27;s not how life works. When one door closes, another one opens. I genuinely believe that. Besides, you landed on your feet here — you got promoted, you met Sarah...</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">True. I guess I just have this fear that I&#x27;m gonna look back at sixty and realize I played it safe my whole life. You know what I mean?</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Totally. But here&#x27;s the thing — you reap what you sow. You&#x27;ve been putting in the work, showing up every day, being a good person. That stuff compounds. It doesn&#x27;t just vanish.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">My grandma used to say, &quot;The grass is always greener on the other side.&quot; Maybe I&#x27;m just romanticizing a path I didn&#x27;t take.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Exactly. And honestly? Every choice comes with trade-offs. You can&#x27;t have your cake and eat it too. Denver might&#x27;ve been great career-wise but you would&#x27;ve been starting from scratch — no friends, no support system.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Yeah, you&#x27;re <span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">spot on</span>. I think deep down I know I need to just trust the process and stop second-guessing myself.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">For real. And remember — hindsight is 20/20. It&#x27;s easy to judge past decisions when you already know how things turned out. Cut yourself some slack.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">You&#x27;re right. At the end of the day, it is what it is. I&#x27;d rather focus my energy on what&#x27;s ahead than keep beating a dead horse about something I can&#x27;t change.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Now you&#x27;re talking. Life&#x27;s too short to live in the rearview mirror, bro. You&#x27;re doing great. Own it.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Thanks, man. I needed to hear that. Sometimes you just need someone to <span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">talk some sense into you</span>.</td></tr></table>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e8f5e9;border-left:4px solid #1b5e20;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1b5e20;font-size:15px\">【中文翻译】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">嘿兄弟，你今天看起来有点心不在焉。怎么了？</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">是啊……我最近一直在反思自省（soul-searching）。你知道去年我拒了丹佛那个工作机会吧？我脑子里一直反复想（going back and forth），不确定当时的决定到底对不对。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width
