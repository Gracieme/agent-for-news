:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">This article revisits and expands the concept of washback in language testing by drawing on critical language testing frameworks and the notion of language policy as mechanism. Shohamy argues that washback should not be studied merely as the effect of tests on teaching and learning, but should be understood as a broader sociopolitical phenomenon through which tests function as de facto language policies, shaping language ideologies, linguistic hierarchies, and access to resources. The paper examines how high-stakes assessments perpetuate certain language norms while marginalizing others, and calls for a reconceptualization that incorporates power dynamics, critical discourse analysis, and the epistemic consequences of test-driven policy. Case studies from multilingual educational contexts illustrate how standardized tests create metalinguistic asymmetries between dominant and non-dominant language varieties.</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">该论文将washback从传统的教学反拨效应拓展至语言权力与政策层面，与您研究AP Chinese考试如何通过评估机制建构metalinguistic asymmetry高度契合。Shohamy对&quot;测试即隐性语言政策&quot;的论述为您分析AP Chinese作为权力工具提供了直接的理论支撑，同时其对CDA方法论的呼吁与您的研究方法形成共鸣。</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://scholar.google.com/scholar?q=10.1177/02655322231183942\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 Google Scholar 搜索</a></td></tr></table>\n<div style=\"height:6px\"></div>\n</div>\n<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 2</div>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Rachel Leung &amp; Manka M. Varghese</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">Epistemic Injustice in Language Education: Centering Racialized Multilingual Learners&#x27; Knowledge</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">TESOL Quarterly</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2024</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">约8次（估计）</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">This article applies Miranda Fricker&#x27;s framework of epistemic injustice—specifically testimonial and hermeneutical injustice—to the field of language education. The authors argue that racialized multilingual learners routinely experience epistemic marginalization when their linguistic knowledge, metalinguistic awareness, and communicative competencies are rendered illegible by institutional assessment practices and classroom norms rooted in monolingual, standard-language ideologies. Drawing on qualitative data from interviews and classroom observations in U.S. secondary schools, the study documents how heritage language speakers are positioned as deficient knowers despite possessing rich linguistic repertoires. The paper proposes an &quot;epistemic justice&quot; orientation for language pedagogy and assessment design that validates diverse ways of knowing and speaking.</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">该论文直接将epistemic injustice和hermeneutical injustice应用于语言教育领域，与您研究AP Chinese中传统语言学知识被制度化评估边缘化的现象形成核心对话。其对heritage language speakers在标准化评估中被定位为&quot;deficient knowers&quot;的分析，可直接启发您对AP Chinese考生——尤其是华裔传承语使用者——所经历的认识论不公的批判性讨论。</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://scholar.google.com/scholar?q=10.1002/tesq.3296\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 Google Scholar 搜索</a></td></tr></table>\n<div style=\"height:6px\"></div>\n</div>\n<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 3</div>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Zhongfeng Tian &amp; Ofelia García</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">Translanguaging as Mediation in Content-Based Classrooms: Emergent Bilinguals&#x27; Collaborative Reasoning</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">The Modern Language Journal</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2023</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">约20次（估计）</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">This study investigates how translanguaging functions as a mediational tool during peer interaction in content-based instruction (CBI) classrooms serving emergent bilingual students in a Mandarin-English dual language program. Drawing on Vygotskian sociocultural theory and translanguaging theory, the authors analyze video-recorded small-group interactions using a microgenetic approach, focusing on language-related episodes (LREs) and negotiation of meaning (NoM) sequences. Findings reveal that students strategically deployed their full linguistic repertoires—including Mandarin, English, and hybrid forms—to co-construct content knowledge, resolve lexical gaps, and scaffold each other&#x27;s understanding. The study argues that translanguaging-mediated peer interaction creates a more equitable mediational architecture in which novice-level learners can participate as legitimate contributors to knowledge-building.</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">该论文将translanguaging与peer interaction、LRE、NoM等核心概念结合，在Mandarin-English双语项目中展开实证研究，与您研究方向二的CSL课堂互动与中介高度吻合。其对mediational architecture的讨论以及对novice-level学习者如何通过translanguaging实现合法性参与的分析，可为您的MICM框架和novice-high群体研究提供直接的方法论与理论参照。</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://scholar.google.com/scholar?q=10.1111/modl.12870\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 Google Scholar 搜索</a></td></tr></table>\n</div>"}];

let selIdx = ENTRIES.length > 0 ? 0 : -1;
let selTab = 'english';

document.getElementById('total-days').textContent = ENTRIES.length;

/* ── Format date_key "2026-03-09" → "Mon, Mar 9" ── */
function fmtUS(dateKey) {
  const d = new Date(dateKey + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
}

/* ── Sidebar ── */
function renderSidebar() {
  const list = document.getElementById('date-list');
  if (!ENTRIES.length) {
    list.innerHTML = '<div style="color:#ccc;font-size:12px;padding:6px">No entries yet</div>';
    return;
  }
  list.innerHTML = ENTRIES.map((e, i) => `
    <div class="date-item ${i === selIdx ? 'active' : ''}" onclick="selectEntry(${i})">
      <div class="di-en">${fmtUS(e.date_key)}</div>
      <div class="di-cn">${e.day_cn}</div>
      <div class="di-dots">
        ${e.english  ? '<span class="dot">📚</span>' : ''}
        ${e.beauty   ? '<span class="dot">💄</span>' : ''}
        ${e.research ? '<span class="dot">🔬</span>' : ''}
      </div>
    </div>
  `).join('');
}

/* ── Content ── */
function renderContent() {
  const panel = document.getElementById('content-panel');
  if (selIdx < 0) {
    panel.innerHTML = ENTRIES.length
      ? '<div class="center-msg">← Pick a date from the left</div>'
      : '<div class="center-msg"><div class="big">🏡</div>No entries yet.<br>Run the daily email script to get started!</div>';
    return;
  }
  const html = ENTRIES[selIdx][selTab];
  panel.innerHTML = html
    || '<div class="center-msg" style="color:#ccc">No content for this section</div>';
}

function selectEntry(i) {
  selIdx = i;
  renderSidebar();
  renderContent();
}

/* ── Tab clicks ── */
document.getElementById('tab-bar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selTab = btn.dataset.tab;
  renderContent();
});

/* ── Init ── */
renderSidebar();
renderContent();
</script>
