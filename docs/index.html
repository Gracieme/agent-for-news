  <style>

      padding: 0 32px;
      height: 60px;

      align-items: center;

      background: rgba(255,255,255,.18);

      font-weight: 600;

      font-weight: 700;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 0 4px;
      margin-bottom: 10px;

      border-radius: 10px;
      padding: 10px 13px;
      margin-bottom: 6px;
      cursor: pointer;

    .dot {
      font-size: 11px;
      padding: 1px 5px;
      border-radius: 6px;
      background: #f0f0f0;
      color: #888;
    }

    /* ── Main ── */
    .main { flex: 1; min-width: 0; }

    /* ── Tab bar ── */
    .tab-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab-btn {
      padding: 9px 20px;
      border-radius: 10px;
      border: 2px solid #e8e8e8;
      background: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      color: #888;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
    }
    .tab-btn:hover { border-color: #bbb; color: #555; }

    .tab-btn[data-tab="english"].active {
      border-color: var(--blue); background: #e8f0fe; color: var(--blue);
      box-shadow: 0 2px 10px rgba(26,115,232,.18);
    }

      border-color: var(--pink); background: #fce4ec; color: var(--pink);
      box-shadow: 0 2px 10px rgba(194,24,91,.18);

      border-color: var(--teal); background: #e0f7fa; color: var(--teal);
      box-shadow: 0 2px 10px rgba(0,131,143,.18);
    }

      background: #fff;
      border-radius: 14px;
      padding: 28px 30px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);

      text-align: center;
      padding: 80px 20px;
      color: #bbb;
      font-size: 15px;
      line-height: 1.9;
    }

    @media (max-width: 680px) {
      .layout { flex-direction: column; padding: 12px; }
      .sidebar { width: 100%; position: static; max-height: 180px; }
      .header-pill { display: none; }
      .header-brand h1 { font-size: 16px; }
    }
  </style>
</head>

<script>
const ENTRIES = [{"date_key": "2026-03-10", "date_cn": "2026年03月10日", "day_cn": "周二", "english": "<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e8f0fe;border-left:4px solid #1a73e8;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1a73e8;font-size:15px\">【今日主题】</strong></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e3f2fd;border-left:4px solid #0d47a1;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#0d47a1;font-size:15px\">【英文原文】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Hey, I&#x27;ve been meaning to ask you — did you end up taking that job offer in Denver?</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">No, I turned it down. Honestly, I was going back and forth for weeks. But at the end of the day, the pay bump wasn&#x27;t worth uprooting my whole family.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">I get that. You know what they say — <strong>the grass is always greener on the other side</strong>. A bigger paycheck doesn&#x27;t automatically mean a better life.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Exactly. And I learned that the hard way back in my twenties. I chased money to New York, burned out in like eight months, and came crawling back home. That whole experience was a <strong>wake-up call</strong> for me.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Yeah, I remember that phase. But hey, <strong>hindsight is 20/20</strong>, right? You couldn&#x27;t have known.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">True. I just tell myself <strong>everything happens for a reason</strong>. If I hadn&#x27;t crashed and burned in New York, I wouldn&#x27;t have met Lisa back here. So it all worked out.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">See, that&#x27;s the thing — you <strong>rolled with the punches</strong> instead of getting bitter. A lot of people don&#x27;t do that.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">I mean, what&#x27;s the alternative? You can&#x27;t just sit around playing the victim. At some point you gotta <strong>own your choices</strong> and move forward. <strong>You reap what you sow</strong>, good or bad.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">That&#x27;s real talk. My dad always used to say, &quot;<strong>Don&#x27;t put all your eggs in one basket</strong>.&quot; I used to think it was just about money, but honestly it applies to everything — relationships, career plans, your sense of purpose.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Your dad sounds wise. Mine was more of a tough-love guy. His favorite line was, &quot;<strong>You made your bed, now lie in it</strong>.&quot; Harsh, but it taught me accountability early on.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Ha, classic dad energy. I think the biggest lesson I&#x27;ve learned is to <strong>trust the process</strong>. Like, not every season of life is gonna feel great, but you&#x27;re always building toward something.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">One hundred percent. And honestly? <strong>It is what it is.</strong> You can plan all you want, but life&#x27;s gonna throw curveballs. The only thing you control is how you respond.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Amen to that. Alright, enough philosophy — you wanna grab tacos?</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Now THAT is a decision I&#x27;ll never second-guess. Let&#x27;s go.</td></tr></table>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e8f5e9;border-left:4px solid #1b5e20;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1b5e20;font-size:15px\">【中文翻译】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">嘿，我一直想问你——你最后接了丹佛那个工作offer吗？</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">没有，我拒了。说实话，我纠结了好几个星期。但<strong>说到底</strong>（at the end of the day），涨的那点薪水不值得让全家人连根拔起。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">我理解。你知道人们怎么说的——<strong>这山望着那山高</strong>（the grass is always greener on the other side）。工资高不代表生活就一定更好。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">就是。而且这个道理我二十多岁的时候就<strong>吃过亏才学到了</strong>（learned the hard way）。当时为了追钱跑去纽约，大概八个月就累垮了，灰溜溜地回了家。那整段经历对我来说是个<strong>警钟</strong>（wake-up call）。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">对，我记得那段时期。不过话说回来，<strong>事后诸葛亮谁都会当</strong>（hindsight is 20/20），对吧？你当时不可能预料到。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">确实。我就告诉自己<strong>一切都是命中注定的</strong>（everything happens for a reason）。如果我没在纽约摔那一跤，就不会回来遇见Lisa。所以结果还是好的。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">你看，关键就在这儿——你<strong>随遇而安、见招拆招</strong>（rolled with the punches），而不是变得愤世嫉俗。很多人做不到这一点。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">我的意思是，不这样还能怎样？你不能一直坐在那儿扮演受害者。到了某个时候你得<strong>为自己的选择负责</strong>（own your choices），然后继续往前走。<strong>种什么因，得什么果</strong>（you reap what you sow），不管好坏。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">说得太真实了。我爸以前总说，&quot;<strong>不要把所有鸡蛋放在一个篮子里</strong>（don&#x27;t put all your eggs in one basket）。&quot;我以前觉得只是在说钱的事，但说真的，这适用于所有事——人际关系、职业规划、你的人生目标。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">你爸听起来很有智慧。我爸属于严厉教育那种。他最爱说的一句话是，&quot;<strong>自己铺的床，自己躺</strong>（you made your bed, now lie in it）。&quot;挺狠的，但让我很早就学会了承担责任。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">哈，经典老爸风格。我觉得我学到的最大教训就是<strong>相信过程</strong>（trust the process）。就是说，不是人生每个阶段感觉都会很好，但你一直在为某个目标积累。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">百分之百同意。而且说实话？<strong>事已至此，就这样吧</strong>（it is what it is）。你再怎么计划，生活还是会给你扔曲线球。你唯一能控制的就是自己怎么回应。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">说得太对了。好了，哲学课到此为止——你想去吃taco吗？</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">这个决定我绝不会犹豫。走！</td></tr></table>\n<div style=\"height:8px\"></div>\n<div style=\"background:#f3e5f5;border-left:4px solid #4a148c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#4a148c;font-size:15px\">【本日表达列表】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">01.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>at the end of the day</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 说到底，归根结底</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 总结观点、做最终判断时，日常口语高频使用</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">02.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>the grass is always greener on the other side</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 这山望着那山高；总觉得别处更好</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 劝人知足、讨论选择时</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">03.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>wake-up call</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 警钟，让人猛然醒悟的事件</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 谈论人生转折、重大教训时</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">04.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>hindsight is 20/20</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 事后诸葛亮，回头看都清楚</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 讨论过去的决定、安慰别人不必自责</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">05.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>everything happens for a reason</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 一切都有它的道理/命中注定</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 安慰自己或他人，接受不如意的结果时</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">06.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>roll with the punches</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 随遇而安，见招拆招，灵活应对</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用（源自拳击术语）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 赞扬某人面对逆境的态度</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">07.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>own your choices</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 为自己的选择负责，不推卸责任</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 当代流行</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 励志对话、谈论个人成长</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">08.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>you reap what you sow</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 种瓜得瓜，种豆得豆；自作自受</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 全球通用（源自《圣经》）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 谈论因果报应、行为与结果的关系</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">09.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>don&#x27;t put all your eggs in one basket</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 不要孤注一掷，要分散风险</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 给建议时，谈投资、职业规划、人生策略</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">10.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>you made your bed, now lie in it</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 自己做的决定，自己承担后果</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 强调责任和后果，略带严厉的语气</span></td></tr></table>", "beauty": "<div style=\"background:#fce4ec;border-left:4px solid #e91e8c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#c2185b;font-size:15px\">【今日主题】</strong></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">今天为你拆解一套 <strong>「暖棕拉长眼妆」</strong>，核心目标：用横向拉长的眼形来从视觉上收窄圆脸的横宽感，同时让橄榄皮自带的黄调变成高级优势而不是&quot;显脏&quot;。</p>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">📐 Step 0｜眼部打底（别跳过！）</div>\n<div style=\"height:8px\"></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>取米粒大小的 <strong>眼部专用打底膏</strong>，薄涂整个眼皮至眉骨下方。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>为什么对你特别重要</strong>：橄榄皮眼皮偏暗、角质偏厚，不打底直接上色容易吃色发灰，持妆也会大打折扣。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">🎨 Step 1｜铺底色——大面积哑光暖杏</div>\n<div style=\"height:8px\"></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>用蓬松晕染刷蘸取 <strong>哑光奶杏色/浅驼色</strong>，从睫毛根部扫至眉骨下方。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>手法：来回轻扫，不要按压，让颜色均匀过渡。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>作用：统一眼皮肤色、遮住暗沉，给后续叠色创造干净底板。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">🎨 Step 2｜眼窝色——中调红棕/焦糖棕</div>\n<div style=\"height:8px\"></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>用中号锥形刷蘸取 <strong>红棕/焦糖色</strong>（哑光），沿眼窝弧线来回晕染。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>关键手法——向外拉</strong>：</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>刷子在眼尾方向多带出 <strong>约 0.5cm</strong>，呈微微上扬的斜线，不要画圆圈。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>这一步决定了眼型&quot;被拉长&quot;的效果。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>内眼角方向晕染范围要 <strong>克制</strong>，只轻轻带到就好。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">🎨 Step 3｜加深色——深棕/巧克力棕，精准描画眼尾</div>\n<div style=\"height:8px\"></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>用小号扁头刷蘸取 <strong>深巧克力棕色</strong>（哑光优先）。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>画法（重点 ⬇️）：</div>\n<div style=\"height:8px\"></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">1.</span><span style=\"color:#333;font-size:14px;line-height:1.7\"><strong>外眼角 &lt; 形加深</strong>：沿上睫毛尾端向斜上方拉出一小段（约眼长的 1/4），再从下睫毛尾端向同一方向拉出，形成一个不闭合的 &quot;&lt;&quot; 三角区。</span></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">2.</span><span style=\"color:#333;font-size:14px;line-height:1.7\">用小号晕染刷把边缘向外柔化，<strong>保持尖端不糊</strong>。</span></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">3.</span><span style=\"color:#333;font-size:14px;line-height:1.7\">下眼尾 1/3 也用同色轻轻带上，和上眼尾颜色衔接。</span></div>\n<div style=\"height:8px\"></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>⚠️ 切忌把深色往眼中段大面积晕开——会让眼睛看起来更&quot;圆&quot;而非&quot;长&quot;。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">✨ Step 4｜提亮点睛——细闪/缎光</div>\n<div style=\"height:8px\"></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>用手指或细刷蘸取 <strong>香槟金/铜金细闪色</strong>，轻点在：</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>① 上眼皮中央（黑眼珠正上方）→ 制造立体膨胀感</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>② 下眼中段卧蚕位置 → 放大眼睛、增加清澈感</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>避免大亮片银色——在橄榄皮上容易显灰、显脏。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">✏️ Step 5｜眼线——棕色拉长，不要纯黑</div>\n<div style=\"height:8px\"></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>推荐用 <strong>深棕色/棕黑色</strong> 眼线胶笔。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>画法：</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>内眼线：贴着上睫毛根部填满睫毛空隙。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>外眼线：从眼尾自然延伸出 <strong>3-5mm</strong>，方向微微上扬（约 20-30°），末端轻轻收细。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>不拐弯下垂、不画粗</strong>——保持线条利落，才有拉长效果。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">🖌️ Step 6｜睫毛——重点刷外眼角</div>\n<div style=\"height:8px\"></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>睫毛夹夹翘后，刷睫毛膏时 <strong>在外眼角区域多刷 1-2 次</strong>，刷的时候刷头微微向太阳穴方向倾斜。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>内眼角睫毛轻带即可。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>效果：睫毛的浓密重心在外侧 → 进一步延伸眼尾。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">🤎 Step 7｜眉毛配合（加分项）</div>\n<div style=\"height:8px\"></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>圆脸搭配 <strong>略带棱角的拱形眉/直眉微挑</strong>，不建议纯弯圆眉。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>眉尾比眉头略低或齐平，长度拉到 <strong>超过外眼角正上方</strong>，呼应眼尾的延伸感。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>眉色选 <strong>灰棕/红棕</strong>，和眼影色系统一。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">💡 针对你的肤质 / 脸型个性化建议</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 关注点 | 建议 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">|---|---|</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| <strong>圆脸收窄</strong> | 整套眼妆的重心都在&quot;向外拉&quot;——眼影、眼线、睫毛三个步骤同方向延伸，横向拉长眼睛会在视觉上把脸的比例压窄。 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| <strong>橄榄皮显脏问题</strong> | 全程避开冷粉、冷紫、灰色调眼影；选棕色系眼线代替纯黑，减少面部对比过硬导致的暗沉加重。 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| <strong>角质层偏厚/易出油</strong> | 打底膏</p>", "research": "<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 1</div>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Zheng, B., &amp; Warschauer, M.</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">Translanguaging in a Chinese-English dual language program: A multi-case study</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">International Journal of Bilingual Education and Bilingualism</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2023</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">约25次（估计）</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">This study investigates translanguaging practices in a Chinese-English dual language immersion program in the United States. Drawing on multiple case studies of elementary-level students, the authors examine how learners strategically deploy their full linguistic repertoires during collaborative literacy tasks. The analysis reveals that translanguaging serves multiple functions: metalinguistic problem-solving (particularly around Chinese character recognition and tonal distinctions), identity negotiation, and the co-construction of meaning during peer interaction. The study also addresses the tension between programmatic language separation policies and students&#x27; organic translanguaging practices, arguing that rigid language boundaries may constrain students&#x27; mediational resources. The findings contribute to theorizations of translanguaging in heritage/L2 Chinese contexts where the typological distance between languages creates unique affordances for cross-linguistic meaning-making.</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">本文直接关联研究方向二中translanguaging和peer interaction的核心议题。尤其值得关注的是：(1) 研究场景为中英双语项目中的中文学习，与CSL教学情境高度相关；(2) 文中对语言分离政策与学生自发translanguaging之间张力的分析，呼应了mediational architecture的理论关切——制度设计如何框定或限制学习者可获取的中介资源；(3) 对metalinguistic problem-solving的细致分析与LRE研究传统形成对话。</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://scholar.google.com/scholar?q=10.1080/13670050.2023.2175752\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 Google Scholar 搜索</a></td></tr></table>\n<div style=\"height:6px\"></div>\n</div>\n<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 2</div>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Dao, P., &amp; McDonough, K.</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">Languaging during peer interaction: A microgenetic analysis of co-constructed language-related episodes</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Language Awareness</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2022</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">约30次（估计）</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">This study adopts a microgenetic approach to examine how second language learners engage in languaging — the process of using language to mediate cognition — during peer interaction tasks. Focusing on dyadic interactions among university-level learners, the authors systematically categorize language-related episodes (LREs) according to their focus (lexical, grammatical, discourse-level) and resolution patterns (correctly resolved, incorrectly resolved, unresolved). Beyond this quantitative mapping, the study provides fine-grained qualitative analysis of how learners collaboratively construct metalinguistic understanding through extended deliberation sequences. Key findings indicate that lexical LREs were most frequent and most likely to be correctly resolved, while grammatical LREs showed greater variability in resolution outcomes depending on dyad composition (proficiency pairing). The study also reveals that &quot;extended&quot; LREs — those involving sustained deliberation across multiple turns — were more strongly associated with learning gains on individualized post-tests than brief, quickly-resolved episodes.</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">本文是LRE和peer interaction研究的前沿成果，与研究方向二高度契合。(1) 对LRE的分类体系（lexical/grammatical/discourse + resolution patterns）为CSL同伴互动研究提供了可操作的分析框架；(2) microgenetic方法论与Vygotskian中介理论直接关联，呼应MICM对学习者认知发展微观过程的关注；(3) dyad proficiency pairing对LRE解决模式的影响，对novice-high水平学习者的配对研究具有启示意义。</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://scholar.google.com/scholar?q=10.1080/09658416.2021.1981910\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 Google Scholar 搜索</a></td></tr></table>\n<div style=\"height:6px\"></div>\n</div>\n<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 3</div>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Catalano, T., &amp; Hamann, E. T.</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">Multilingual pedagogies and pre-service teachers: Implementing critical language awareness in dual language education</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Journal of Language, Identity &amp; Education</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2023</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">约15次（估计）</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">This study examines how pre-service teachers in dual language immersion (DLI) programs develop critical language awareness (CLA) through a semester-long professional development intervention. Using a qualitative design that combines classroom observations, reflective journals, and semi-structured interviews, the authors trace how emerging teachers negotiate dominant language ideologies — particularly the monoglossic assumptions embedded in standardized curricula and assessment frameworks. The analysis reveals a process of ideological &quot;awakening&quot; that is neither linear nor comfortable: participants experienced emotional dissonance when their developing CLA perspectives conflicted with institutional expectations around language separation, standardized testing, and accountability metrics. The study conceptualizes this tension through the lens of emotional labor, arguing that DLI teachers must continuously manage the affective demands of working within systems that structurally devalue multilingual practices while being tasked with promoting bilingualism.</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">本文搭配研究方向三（教师与制度），涵盖DLI、emotional labor和policy implementation等核心概念。(1) 对DLI教师如何在单语制度逻辑与多语教学理念之间挣扎的分析，直接呼应decoupling的理论视角——教师在政策执行中的策略性应对；(2) emotional labor框架的运用与teacher vulnerability研究形成互补；(3) 文中对标准化评估如何塑造教师语言意识形态的讨论，也可与研究方向一中assessment和语言权力的议题建立跨方向对话。</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://scholar.google.com/scholar?q=10.1080/15348458.2022.2120279\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 Google Scholar 搜索</a></td></tr></table>\n</div>"}, {"date_key": "2026-03-09", "date_cn": "2026年03月09日", "day_cn": "周一", "english": "<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e8f0fe;border-left:4px solid #1a73e8;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1a73e8;font-size:15px\">【今日主题】</strong></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e3f2fd;border-left:4px solid #0d47a1;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#0d47a1;font-size:15px\">【英文原文】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Hey, how&#x27;s the new gig going? Last time we talked, you were still on the fence about leaving your old company.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Dude, best decision I ever made. I was totally <strong>stuck in a rut</strong> at my old place — same tasks, no growth, just going through the motions. Now I&#x27;m actually learning stuff every single day.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">That&#x27;s awesome. I remember you were worried about starting from scratch, though. Like, having to <strong>pay your dues</strong> all over again at a new company.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Yeah, I won&#x27;t lie, the first couple months were rough. I had to <strong>hit the ground running</strong> because they threw me onto a huge project on day one. No hand-holding, no onboarding buddy, nothing. Just &quot;here&#x27;s the Slack channel, good luck.&quot;</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Ha! Sink or swim, basically. But you&#x27;ve always been good at <strong>wearing many hats</strong>. That&#x27;s kind of your superpower.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Thanks, man. Honestly, though, the real game-changer was my new manager. She actually <strong>goes to bat for</strong> her team. Like, when leadership tried to pile more work on us without extra headcount, she pushed back hard.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">That&#x27;s rare. My boss just keeps <strong>moving the goalposts</strong> — every time I think I&#x27;m close to a promotion, suddenly there&#x27;s a new metric I need to hit.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Ugh, that&#x27;s the worst. Have you thought about <strong>putting yourself out there</strong> more? Like, networking outside your department, making sure the right people know your name?</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">I have, actually. I started going to those cross-team meetings just to get visibility. I&#x27;m trying to <strong>play the long game</strong> instead of getting frustrated about the short term.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Smart. And don&#x27;t let imposter syndrome mess with your head either. You&#x27;ve <strong>put in the work</strong>, and it shows. Sometimes you just need to <strong>bet on yourself</strong> and ask for what you deserve — raise, title, whatever.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">You&#x27;re right. I think I&#x27;ve been too passive. Time to stop waiting around and actually advocate for myself.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Exactly. Nobody&#x27;s gonna hand it to you. You gotta go get it.</td></tr></table>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e8f5e9;border-left:4px solid #1b5e20;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1b5e20;font-size:15px\">【中文翻译】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">嘿，新工作怎么样了？上次咱们聊的时候，你还在纠结要不要离开老公司呢。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">兄弟，这是我做过最好的决定。我在老公司完全<strong>陷入了一成不变的状态</strong>（stuck in a rut）——重复的活儿，没有成长，就是混日子。现在我每天都在学新东西。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">太好了。不过我记得你当时很担心从头开始，比如到新公司得重新<strong>从基层熬起来</strong>（pay your dues）。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">是，说实话，头两个月确实很难。我不得不<strong>一上来就全力以赴</strong>（hit the ground running），因为第一天他们就把我扔进了一个大项目。没人带、没入职伙伴、什么都没有。就是&quot;这是Slack频道，祝你好运。&quot;</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">哈！说白了就是自生自灭。不过你一直都很擅长<strong>身兼多职</strong>（wearing many hats），这算是你的超能力了。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">谢了，哥们。不过说真的，真正改变局面的是我的新经理。她真的会<strong>为团队出头撑腰</strong>（goes to bat for）。比如领导想给我们加活儿又不加人的时候，她直接顶了回去。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">这太少见了。我的老板一直在<strong>不断改变标准</strong>（moving the goalposts）——每次我觉得快要升职了，突然又冒出一个新指标要达标。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">唉，那最烦了。你有没有想过更<strong>主动地展示自己</strong>（putting yourself out there）？比如跨部门社交，让关键人物知道你这个人。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">其实我已经在做了。我开始参加那些跨团队会议，就为了增加曝光度。我在尝试<strong>着眼长远</strong>（play the long game），而不是因为短期的事情而沮丧。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">聪明。而且别让冒充者综合症影响你的心态。你已经<strong>付出了实实在在的努力</strong>（put in the work），这是看得到的。有时候你就得<strong>相信自己、赌自己一把</strong>（bet on yourself），去争取你应得的——加薪、头衔、什么都好。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">你说得对。我想我一直太被动了。是时候不再干等着，开始真正为自己争取了。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">没错。没人会白送给你的，你得自己去争取。</td></tr></table>\n<div style=\"height:8px\"></div>\n<div style=\"background:#f3e5f5;border-left:4px solid #4a148c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#4a148c;font-size:15px\">【本日表达列表】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">01.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>stuck in a rut</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 陷入一成不变的状态，停滞不前</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 形容工作、生活缺乏变化和成长，感到厌倦</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">02.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>pay your dues</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 从基层做起，经历磨练才能往上走</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 谈论职业初期的积累阶段或新环境中重新证明自己</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">03.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>hit the ground running</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 一开始就全力投入、迅速进入状态</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 形容新工作、新项目中快速上手，无适应期</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">04.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>wear many hats</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 身兼多职，承担多种角色</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 描述在公司中（尤其创业公司或小团队）一人干多样活</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">05.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>go to bat for (someone)</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 为某人挺身而出，撑腰支持</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用（源自棒球用语）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 赞扬上级或同事在关键时刻帮你说话、争取利益</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">06.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>move the goalposts</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 不断改变标准或规则，使人难以达成目标</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 英国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 吐槽老板或制度不断提高要求，让人感觉永远达不到</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">07.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>put yourself out there</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 主动展示自己，走出舒适圈去社交或表现</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 鼓励他人大胆社交、主动争取机会（职场、社交、约会都用）</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">08.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>play the long game</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 着眼长远，有耐心地做长期规划</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 讨论职业规划、投资、人际关系等需要长期布局的事情</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">09.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>put in the work</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 付出实实在在的努力，下苦功</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 肯定或强调某人确实花了大量时间精力去做某事</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">10.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>bet on yourself</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 相信自己、敢于为自己的能力押注</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / Gen Z &amp; 千禧一代高频用语</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 鼓励他人勇敢做出选择，如跳槽、创业、争取升职等，社交媒体也非常常见</span></td></tr></table>", "beauty": "<div style=\"background:#fce4ec;border-left:4px solid #e91e8c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#c2185b;font-size:15px\">【今日主题】</strong></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">一、妆前三步：给底妆打好&quot;地基&quot;</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>Step 1｜温和去角质（每周1~2次）</strong></p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">橄榄皮角质层偏厚，底妆前若有明显粗糙感，用含水杨酸/乳酸的去角质凝露薄薄按摩 T 区和两颊，冲洗后皮肤更平滑、后续粉底贴服力直接翻倍。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>Step 2｜保湿打底（30秒按压法）</strong></p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">取清爽型保湿乳（啫喱质地优先），掌心捂热后按压全脸，重点鼻翼和两颊毛孔区多按压 5 秒——含水量够的皮肤不易卡粉、浮粉。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>Step 3｜分区妆前隔离</strong></p>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>T 区 + 鼻翼 + 下巴</strong> → 控油毛孔隐形妆前乳（硅感填充型），用指腹&quot;点按拍弹&quot;填入毛孔，<strong>不要拉扯涂抹</strong>。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>两颊 + 额头外侧</strong> → 带微光调色妆前乳（蜜桃/杏色调），薄薄一层中和暗黄。</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">&gt; ⚠️ 避免全脸使用紫色/薰衣草色调隔离——橄榄皮底色偏黄绿，叠加冷紫会显灰脏。</p>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">二、粉底上法：圆脸&quot;纵向光感&quot;涂法</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>选质地：</strong></p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">缎光/半哑光水粉霜 &gt; 完全雾面粉底。橄榄皮全哑光容易看起来&quot;糊&quot;和暗沉，保留适度光泽感反而更干净。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>核心手法——&quot;纵向八字拍法&quot;</strong></p>\n<div style=\"height:8px\"></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">1.</span><span style=\"color:#333;font-size:14px;line-height:1.7\">取约一泵半粉底，点在额头中央、鼻梁、两颊内侧（苹果肌内侧）、下巴共五点。</span></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">2.</span><span style=\"color:#333;font-size:14px;line-height:1.7\">用<strong>微湿美妆蛋</strong>从面部中心向外，按照<strong>从上到下的纵向弧线</strong>弹拍开——</span></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>✅ 动作方向：始终沿脸部纵轴（从额头到下巴方向）拍推</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>❌ 避免横向大面积左右拉扯——横向推开会在视觉上&quot;撑宽&quot;圆脸</div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">3.</span><span style=\"color:#333;font-size:14px;line-height:1.7\">面部外轮廓（发际线、下颌线、耳前）只用蛋上残余粉底轻扫，<strong>越往外越薄</strong>，形成自然的&quot;中心厚→边缘薄&quot;过渡。</span></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>遮瑕节点（粉底后局部加强）：</strong></p>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>鼻翼暗沉 → 蜜桃色遮瑕轻点拍开</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>痘印/色素 → 比粉底深半号的遮瑕，小刷头精准点涂，蛋尖弹开边缘</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>黑眼圈 → 偏橘/杏色调遮瑕中和青黑，再叠一层肤色遮瑕提亮</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">三、定妆：分区定妆才是&quot;持妆+小脸&quot;的秘密</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 区域 | 定妆产品 | 手法 | 目的 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">|------|----------|------|------|</p>\n<p style=\"margin:6px 0
