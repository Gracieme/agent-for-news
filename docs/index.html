:#333;font-size:14px;line-height:1.7;\">2024</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">10 次</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">摘要不可用</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">这篇论文采用自我民族志（autoethnography）方法探究学校实地考察与STEM沉浸式项目管理的经验，在方法论上与方向三中的autoethnography研究取径直接相关。此外，论文关注从课堂学习到真实世界技能的转化过程，涉及教育制度与教师实践层面的反思，与方向三中对教师经验及制度性因素的关注有一定呼应，但其STEM教育主题与用户的语言教育研究焦点存在较大学科差异，整体关联性有限。</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://doi.org/10.1186/s43031-024-00111-x\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 10.1186/s43031-024-00111-x</a></td></tr></table>\n<div style=\"height:6px\"></div>\n</div>\n<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 2</div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Katarina Blennow, Martin Malmström, Elizabeth Petroelje Stolle</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">Countering Discourses of Derision: Moving towards Action in Teacher Education in the USA and Sweden</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Education Sciences</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2023</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">3 次</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">This article is about how negative discourses of teacher education position teacher educators and how they might influence or inspire action. We use self-study methods to investigate the political dimension of teacher education in two national contexts: Sweden and the USA. More specifically, we examine the emotions stirred by the positioning related to being a teacher educator and how those emotio…</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">该论文聚焦教师教育者如何在贬损性话语中被定位，以及由此激发的情感与抵抗行动，这与方向三中&quot;teacher vulnerability&quot;和&quot;emotional labor&quot;高度相关——两者都关注教师在制度性话语压力下的情感体验与应对策略。此外，论文采用自我研究（self-study）方法探究政治维度，与方向三中自我民族志（autoethnography）的反思性质性研究取径相呼应，均强调研究者/实践者的主体经验在揭示制度权力结构中的作用。</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://doi.org/10.3390/educsci13070635\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 10.3390/educsci13070635</a></td></tr></table>\n<div style=\"height:6px\"></div>\n</div>\n<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 3</div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Francesca Ferrer-Best</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">The Virtual Ballet Studio: A Phenomenological Enquiry into the Domestic as Dance-Space During Lockdown</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">The International Journal of Screendance</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2021</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">5 次</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">The paper is based on an autoethnographic study of dancing via Zoom over the Covid19 lockdown in Sydney, Australia. Its theoretical framework takes up Iris Marion Young&#x27;s critical phenomenology and work on domestic space to think about certain focal points of the experience, such as having a room to move in, the floor, and the screen. The aim is to examine how important dance-space is to the exper…</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">这篇论文与用户研究方向的关联性较为有限，但存在方法论和概念层面的交叉。首先，该研究采用<strong>自我民族志（autoethnography）</strong>作为核心方法，这与方向三中教师脆弱性与情感劳动研究所使用的自我民族志方法论直接呼应，可为用户提供该方法在不同学科领域的应用范例与写作策略。其次，论文关注空间（domestic space）如何中介和重塑身体实践体验，这一&quot;空间—实践—主体&quot;的分析思路在概念上可与方向二中课堂互动空间（如线上CSL</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://doi.org/10.18061/ijsd.v12i0.7812\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 10.18061/ijsd.v12i0.7812</a></td></tr></table>\n</div>"}, {"date_key": "2026-03-10", "date_cn": "2026年03月10日", "day_cn": "周二", "english": "<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e8f0fe;border-left:4px solid #1a73e8;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1a73e8;font-size:15px\">【今日主题】</strong><span style=\"margin-left:8px;font-weight:400;color:#1a73e8\">人生哲理与智慧 Life Wisdom, Choices &amp; Consequences</span></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e3f2fd;border-left:4px solid #0d47a1;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#0d47a1;font-size:15px\">【英文原文】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Hey man, you seem kind of out of it today. What&#x27;s going on?</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Yeah... I&#x27;ve been doing a lot of soul-searching lately. You know how I turned down that job offer in Denver last year? I keep going back and forth in my head wondering if I made the right call.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Oh, I remember that. Look, there&#x27;s no point crying over spilled milk. You made the best decision you could with what you knew at the time. That&#x27;s all any of us can do.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">I know, I know. But it&#x27;s hard not to play the &quot;what if&quot; game. Like, what if that was my one shot and I blew it?</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Dude, that&#x27;s not how life works. When one door closes, another one opens. I genuinely believe that. Besides, you landed on your feet here — you got promoted, you met Sarah...</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">True. I guess I just have this fear that I&#x27;m gonna look back at sixty and realize I played it safe my whole life. You know what I mean?</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Totally. But here&#x27;s the thing — you reap what you sow. You&#x27;ve been putting in the work, showing up every day, being a good person. That stuff compounds. It doesn&#x27;t just vanish.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">My grandma used to say, &quot;The grass is always greener on the other side.&quot; Maybe I&#x27;m just romanticizing a path I didn&#x27;t take.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Exactly. And honestly? Every choice comes with trade-offs. You can&#x27;t have your cake and eat it too. Denver might&#x27;ve been great career-wise but you would&#x27;ve been starting from scratch — no friends, no support system.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Yeah, you&#x27;re <span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">spot on</span>. I think deep down I know I need to just trust the process and stop second-guessing myself.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">For real. And remember — hindsight is 20/20. It&#x27;s easy to judge past decisions when you already know how things turned out. Cut yourself some slack.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">You&#x27;re right. At the end of the day, it is what it is. I&#x27;d rather focus my energy on what&#x27;s ahead than keep beating a dead horse about something I can&#x27;t change.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Now you&#x27;re talking. Life&#x27;s too short to live in the rearview mirror, bro. You&#x27;re doing great. Own it.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Thanks, man. I needed to hear that. Sometimes you just need someone to <span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">talk some sense into you</span>.</td></tr></table>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e8f5e9;border-left:4px solid #1b5e20;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1b5e20;font-size:15px\">【中文翻译】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">嘿兄弟，你今天看起来有点心不在焉。怎么了？</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">是啊……我最近一直在反思自省（soul-searching）。你知道去年我拒了丹佛那个工作机会吧？我脑子里一直反复想（going back and forth），不确定当时的决定到底对不对。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">哦，我记得那件事。听我说，覆水难收，别为已经发生的事后悔了（crying over spilled milk）。你在当时掌握的信息下做了最好的决定，我们每个人都只能做到这样。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">我知道，我知道。但很难不去玩&quot;如果当初&quot;的游戏。比如说，万一那是我唯一的机会，而我搞砸了呢？</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">老兄，人生不是那样运转的。一扇门关上，另一扇就会打开（when one door closes, another one opens）。我真心相信这一点。再说了，你在这边也站稳脚跟了（landed on your feet）——你升了职，还认识了Sarah……</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">也是。我只是害怕到了六十岁回头看，发现自己一辈子都在求稳（played it safe）。你懂我意思吧？</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">完全懂。但关键是——种瓜得瓜，种豆得豆（you reap what you sow）。你一直在努力付出，每天都在认真生活，做一个好人。这些东西会累积的，不会凭空消失。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">我奶奶以前常说，&quot;那边的草看起来总是更绿&quot;（the grass is always greener on the other side）。也许我只是在美化一条没走过的路。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">没错。而且说实话？每个选择都有代价和取舍。鱼和熊掌不可兼得（you can&#x27;t have your cake and eat it too）。丹佛可能事业上不错，但你得从零开始——没朋友，没有支持系统。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">是啊，你说得太对了。我觉得内心深处我知道自己应该相信过程（trust the process），别再反复质疑自己了（second-guessing myself）。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">真的。而且记住——事后看总是清楚的（hindsight is 20/20）。当你已经知道结果的时候，评判过去的决定太容易了。对自己宽容一点吧。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">你说得对。说到底，事已至此就是这样了（it is what it is）。我宁愿把精力放在前方的路上，也不想对一件改变不了的事翻来覆去纠结（beating a dead horse）。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">这才对嘛。人生太短了，不能一直盯着后视镜过日子，兄弟。你做得很好，坦然接受吧。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">谢了，兄弟。我就需要听到这些。有时候你就是需要一个人来让你清醒清醒。</td></tr></table>\n<div style=\"height:8px\"></div>\n<div style=\"background:#f3e5f5;border-left:4px solid #4a148c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#4a148c;font-size:15px\">【本日表达列表】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">01.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>soul-searching</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 深刻的自我反省、内心审视</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 面对重大人生决定时，谈论内心挣扎和自我反思</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">02.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>crying over spilled milk</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 为已经发生的事后悔，覆水难收</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 安慰朋友不要纠结于过去无法改变的事</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">03.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>when one door closes, another one opens</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 一扇门关上，另一扇会打开；塞翁失马焉知非福</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 鼓励别人在失去机会后保持乐观</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">04.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>land on your feet</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 化险为夷，在困境后站稳脚跟</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 描述某人经历变故后重新找到稳定状态</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">05.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>play it safe</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 求稳，不冒险，选择保守路线</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 讨论人生选择时，形容某人总是选最安全的选项</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">06.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>you reap what you sow</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 种瓜得瓜，种豆得豆；付出什么就收获什么</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用（带有圣经渊源）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 强调努力终有回报，或者因果报应</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">07.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>the grass is always greener on the other side</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 这山望着那山高，总觉得别处更好</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 提醒别人不要总觉得另一种选择更完美</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">08.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>you can&#x27;t have your cake and eat it too</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 鱼和熊掌不可兼得，二者不能兼顾</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 讨论选择的代价和取舍时使用</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">09.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>hindsight is 20/20</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 事后诸葛亮，回头看总是清楚的</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 安慰别人不要用现在的信息去苛责过去的决定</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">10.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>beating a dead horse</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 翻来覆去纠结同一件事，白费口舌，无意义地重复</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 劝人别再揪着一件已经没法改变的事不放</span></td></tr></table>", "beauty": "<div style=\"background:#fce4ec;border-left:4px solid #e91e8c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#c2185b;font-size:15px\">【今日主题】</strong><span style=\"margin-left:8px;font-weight:400;color:#c2185b\">眼妆教程 —— 棕调深邃拉长眼妆</span></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">今天为你拆解一套「暖棕拉长眼型」的完整眼妆画法，既能中和橄榄皮的黄灰调，又能通过眼型横向微拉、配合眉眼走向在视觉上纵向延伸脸型，让圆脸看起来更精致立体。</p>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">✏️ STEP 0｜眼部打底</div>\n<div style=\"height:8px\"></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>用专门的 <strong>眼部打底膏</strong> 薄薄铺满整个眼皮及下眼睑。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>目的：遮盖眼皮暗沉（橄榄皮眼周容易偏青灰）、控油防积线、让后续眼影显色持久。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>选色建议：选 <strong>肤色偏暖黄调</strong> 的打底膏，不要选偏白偏粉的，否则会让眼皮发灰。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">🎨 STEP 1｜眼影四色晕染（核心步骤）</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">我们用 <strong>四个色块</strong> 来理解这个眼妆的结构：</p>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">① 打底色（哑光奶茶/浅驼色）</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>范围：<strong>整个上眼皮 + 眉骨下方</strong></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>手法：大号眼影刷来回轻扫，均匀铺色。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>作用：统一肤色、消除眼皮暗沉，为后续叠色做&quot;画布&quot;。</div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">② 过渡色（哑光红棕/焦糖色）</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>范围：<strong>双眼皮褶皱线以内</strong>，从眼头到眼尾，外眼角区域可稍稍超出褶皱线。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>手法：中号晕染刷，以 <strong>眼尾为起点向眼头方向</strong> 来回晕染，眼尾最深、眼头最浅，自然过渡。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>⚠️ 重点：不要把颜色堆在眼皮正中间，这会让眼睛看起来更圆→脸更圆。<strong>把&quot;浓度重心&quot;放在眼尾外侧1/3处</strong>。</div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">③ 加深色（哑光深棕/巧克力棕）</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>范围：<strong>上眼尾 &lt; 形三角区</strong> + <strong>下眼尾后1/3</strong></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>手法：</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>上眼尾：用小号锥形刷，沿着睫毛根部从眼尾向外上方45°微微拖出一个小三角，再用干净晕染刷把边缘晕开。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>下眼尾：用扁头小刷蘸取同色，贴着下睫毛根部从外眼角向内画到眼球正下方即止，浓度外深内浅。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>作用：这是整个眼妆 <strong>拉长眼型、制造深邃感</strong> 的关键。三角区的角度向外上方走，可以引导视线纵向延伸，削弱圆脸的横向宽度感。</div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">④ 提亮色（细闪香槟金/铜金色）</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>范围：<strong>上眼皮中央（黑眼珠正上方）</strong> 轻点按压 + <strong>眼头 ＜ 卧蚕前半段</strong></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>手法：用指腹或小号铺色刷 <strong>按压上色</strong>（不要来回涂抹，避免带走底色）。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>选色关键：橄榄皮选 <strong>偏金铜调</strong> 的闪片，避免银白色闪片（会显灰）和偏粉闪片（会显脏）。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">✏️ STEP 2｜眼线——拉长而非加粗</div>\n<div style=\"height:8px\"></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>工具：<strong>深棕色</strong> 极细眼线液笔（比纯黑更适合橄榄皮日常妆，不会太硬）。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>画法：</div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">1.</span><span style=\"color:#333;font-size:14px;line-height:1.7\">贴着 <strong>上睫毛根部</strong> 填满睫毛间隙（内眼线），从眼中段画到眼尾。</span></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">2.</span><span style=\"color:#333;font-size:14px;line-height:1.7\">到外眼角时 <strong>不要停</strong>，顺着下眼睑的延长线方向微微上翘，拖出 <strong>3-5mm 小尾巴</strong>。</span></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">3.</span><span style=\"color:#333;font-size:14px;line-height:1.7\">眼线尾端可以略微加粗成一个小三角，与眼影的加深三角区衔接。</span></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>❌ 避免：全包眼线、把眼线画得又粗又圆——这会让眼型变圆，放大圆脸感。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">🌀 STEP 3｜睫毛——卷翘 &gt; 浓密</div>\n<div style=\"height:8px\"></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>用睫毛夹分 <strong>三段</strong> 夹翘（根部→中段→尾端），特别注意 <strong>外眼角睫毛多夹一次</strong>，让外侧睫毛更翘→视觉拉长。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>刷睫毛膏时以 <strong>Z字形</strong> 从根部刷到尖端；下睫毛竖起刷头用尖端轻刷即可。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>如果你的睫毛偏短或下垂，可以在夹完后先上一层 <strong>防水纤维打底膏</strong>，再刷睫毛膏，卷翘持久度翻倍。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">✏️ STEP 4｜眉毛配合（加分项）</div>\n<div style=\"height:8px\"></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>圆脸适合 <strong>自然挑眉/低弧度拱眉</strong>，眉峰位置在眉毛外侧2/3处微微上挑，能纵向拉长中庭。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>眉色选 <strong>灰棕/深驼色</strong>，与眼影色系呼应，避免纯黑或红棕（纯黑太硬，红棕在橄</div>", "research": "<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 1</div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">HAO YANG, Joseph Foley</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">Translanguaging as Interactional Resources Employed by Students in EFL Student-Led Group Task Interaction</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Journal of English Language and Linguistics</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2024</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2 次</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">This study aimed to investigate the strategies used by students during group tasks in the EFL classroom. The study focused on translanguaging as one of the strategies to facilitate communication and interaction among students. The data was collected by recording the classroom discussions of a focused group in an EFL class at a Chinese university over three hours. The analysis was carried out using…</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">该论文与<strong>方向二（课堂互动与中介）</strong>高度相关：研究聚焦EFL课堂中学生主导的小组任务互动，以会话分析方法考察translanguaging作为互动资源的使用策略，直接涉及translanguaging和peer interaction两个核心议题。此外，研究语境设置在中国大学英语课堂，与CSL/语言教学的课堂互动研究具有方法论和理论上的可迁移性，尤其在探讨学习者如何通过多语资源协商意义、促进语言相关片段（LRE）的产出方面可提供对话空间。</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://doi.org/10.62819/jel.2024.145\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 10.62819/jel.2024.145</a></td></tr></table>\n<div style=\"height:6px\"></div>\n</div>\n<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 2</div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Richard Kern</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">Twenty‐first century technologies and language education: Charting a path forward</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Modern Language Journal</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2024</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">54 次</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">The COVID-19 pandemic, necessitating remote instruction in the vast majority of educational institutions around the world, put technology squarely at the center of language learning and teaching. Virtually all teaching and learning was mediated by Zoom or similar videoconferencing platforms. Students could see one another&#x27;s faces (rather than the backs of their peers’ heads), but they could also c…</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">这篇论文探讨21世纪技术（尤其是疫情期间远程教学工具）如何中介语言学习与教学，与<strong>方向二</strong>（课堂互动与中介）相关，因为视频会议平台上的聊天窗口、分组讨论室等功能重塑了同伴互动模式和课堂话语参与方式，涉及技术如何作为新的中介工具影响语言相关片段（LRE）的产生与协商。此外，技术驱动的教学变革也关涉<strong>方向三</strong>中教师在制度性转型压力下的情感劳动与脆弱性，因为大规模远程</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://doi.org/10.1111/modl.12924\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 10.1111/modl.12924</a></td></tr></table>\n<div style=\"height:6px\"></div>\n</div>\n<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 3</div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Kevin W. H. Tai</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">Translanguaging as Inclusive Pedagogical Practices in English-Medium Instruction Science and Mathematics Classrooms for Linguistically and Culturally Diverse Students</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Research in Science Education</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2021</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">119 次</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Abstract In English-medium instruction (EMI), English-as-a-second-language students will learn all/some subjects through English. Although there are a considerable number of studies which explore classroom interaction in Hong Kong (HK) secondary EMI schools, few studies have investigated EMI lessons which involve South Asian ethnic minorised students. These students share different linguistic and …</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">这篇论文与<strong>方向二（课堂互动与中介）</strong>高度相关：研究聚焦EMI课堂中的translanguaging实践及课堂互动，采用多模态会话分析探究语言和文化多样性学生的学习过程，与translanguaging、课堂互动（peer interaction）等核心议题直接对接。同时，该研究关注少数族裔学生在以英语为教学媒介的课堂中的语言资源运用，涉及语言权力与包容性教学实践问题，与<strong>方向一</strong>中语言权力及评估公平性的关切（如epistemic injustice）存在潜在关联。此外，研究</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://doi.org/10.1007/s11165-021-10018-6\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 10.1007/s11165-021-10018-6</a></td></tr></table>\n</div>"}, {"date_key": "2026-03-09", "date_cn": "2026年03月09日", "day_cn": "周一", "english": "<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e8f0fe;border-left:4px solid #1a73e8;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1a73e8;font-size:15px\">【今日主题】</strong></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e3f2fd;border-left:4px solid #0d47a1;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#0d47a1;font-size:15px\">【英文原文】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Hey, how&#x27;s the new gig going? Last time we talked, you were still on the fence about leaving your old company.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Dude, best decision I ever made. I was totally <strong>stuck in a rut</strong> at my old place — same tasks, no growth, just going through the motions. Now I&#x27;m actually learning stuff every single day.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">That&#x27;s awesome. I remember you were worried about starting from scratch, though. Like, having to <strong>pay your dues</strong> all over again at a new company.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Yeah, I won&#x27;t lie, the first couple months were rough. I had to <strong>hit the ground running</strong> because they threw me onto a huge project on day one. No hand-holding, no onboarding buddy, nothing. Just &quot;here&#x27;s the Slack channel, good luck.&quot;</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Ha! Sink or swim, basically. But you&#x27;ve always been good at <strong>wearing many hats</strong>. That&#x27;s kind of your superpower.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Thanks, man. Honestly, though, the real game-changer was my new manager. She actually <strong>goes to bat for</strong> her team. Like, when leadership tried to pile more work on us without extra headcount, she pushed back hard.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">That&#x27;s rare. My boss just keeps <strong>moving the goalposts</strong> — every time I think I&#x27;m close to a promotion, suddenly there&#x27;s a new metric I need to hit.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Ugh, that&#x27;s the worst. Have you thought about <strong>putting yourself out there</strong> more? Like, networking outside your department, making sure the right people know your name?</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">I have, actually. I started going to those cross-team meetings just to get visibility. I&#x27;m trying to <strong>play the long game</strong> instead of getting frustrated about the short term.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Smart. And don&#x27;t let imposter syndrome mess with your head either. You&#x27;ve <strong>put in the work</strong>, and it shows. Sometimes you just need to <strong>bet on yourself</strong> and ask for what you deserve — raise, title, whatever.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">You&#x27;re right. I think I&#x27;ve been too passive. Time to stop waiting around and actually advocate for myself.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Exactly. Nobody&#x27;s gonna hand it to you. You gotta go get it.</td></tr></table>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e8f5e9;border-left:4px solid #1b5e20;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1b5e20;font-size:15px\">【中文翻译】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">嘿，新工作怎么样了？上次咱们聊的时候，你还在纠结要不要离开老公司呢。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">兄弟，这是我做过最好的决定。我在老公司完全<strong>陷入了一成不变的状态</strong>（stuck in a rut）——重复的活儿，没有成长，就是混日子。现在我每天都在学新东西。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">太好了。不过我记得你当时很担心从头开始，比如到新公司得重新<strong>从基层熬起来</strong>（pay your dues）。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">是，说实话，头两个月确实很难。我不得不<strong>一上来就全力以赴</strong>（hit the ground running），因为第一天他们就把我扔进了一个大项目。没人带、没入职伙伴、什么都没有。就是&quot;这是Slack频道，祝你好运。&quot;</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">哈！说白了就是自生自灭。不过你一直都很擅长<strong>身兼多职</strong>（wearing many hats），这算是你的超能力了。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">谢了，哥们。不过说真的，真正改变局面的是我的新经理。她真的会<strong>为团队出头撑腰</strong>（goes to bat for）。比如领导想给我们加活儿又不加人的时候，她直接顶了回去。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">这太少见了。我的老板一直在<strong>不断改变标准</strong>（moving the goalposts）——每次我觉得快要升职了，突然又冒出一个新指标要达标。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">唉，那最烦了。你有没有想过更<strong>主动地展示自己</strong>（putting yourself out there）？比如跨部门社交，让关键人物知道你这个人。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">其实我已经在做了。我开始参加那些跨团队会议，就为了增加曝光度。我在尝试<strong>着眼长远</strong>（play the long game），而不是因为短期的事情而沮丧。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">聪明。而且别让冒充者综合症影响你的心态。你已经<strong>付出了实实在在的努力</strong>（put in the work），这是看得到的。有时候你就得<strong>相信自己、赌自己一把</strong>（bet on yourself），去争取你应得的——加薪、头衔、什么都好。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">你说得对。我想我一直太被动了。是时候不再干等着，开始真正为自己争取了。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">没错。没人会白送给你的，你得自己去争取。</td></tr></table>\n<div style=\"height:8px\"></div>\n<div style=\"background:#f3e5f5;border-left:4px solid #4a148c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#4a148c;font-size:15px\">【本日表达列表】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">01.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>stuck in a rut</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 陷入一成不变的状态，停滞不前</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 形容工作、生活缺乏变化和成长，感到厌倦</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">02.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>pay your dues</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 从基层做起，经历磨练才能往上走</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 谈论职业初期的积累阶段或新环境中重新证明自己</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">03.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>hit the ground running</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 一开始就全力投入、迅速进入状态</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 形容新工作、新项目中快速上手，无适应期</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">04.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>wear many hats</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 身兼多职，承担多种角色</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 描述在公司中（尤其创业公司或小团队）一人干多样活</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">05.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>go to bat for (someone)</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 为某人挺身而出，撑腰支持</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用（源自棒球用语）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 赞扬上级或同事在关键时刻帮你说话、争取利益</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">06.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>move the goalposts</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 不断改变标准或规则，使人难以达成目标</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 英国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 吐槽老板或制度不断提高要求，让人感觉永远达不到</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">07.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>put yourself out there</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 主动展示自己，走出舒适圈去社交或表现</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 鼓励他人大胆社交、主动争取机会（职场、社交、约会都用）</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">08.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>play the long game</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 着眼长远，有耐心地做长期规划</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 讨论职业规划、投资、人际关系等需要长期布局的事情</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">09.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>put in the work</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 付出实实在在的努力，下苦功</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 肯定或强调某人确实花了大量时间精力去做某事</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">10.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>bet on yourself</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 相信自己、敢于为自己的能力押注</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / Gen Z &amp; 千禧一代高频用语</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin
