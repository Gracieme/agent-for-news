rgin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">天哪，我很抱歉。那太残酷了。但我了解你，你不是那种会轻易<strong>认输放弃</strong>（throw in the towel）的人。你总能找到出路。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">谢谢你这么说，但现在感觉我只是在<strong>勉强维持</strong>（treading water），你懂吗？就是做最低限度的事情来不让自己彻底崩溃。账单不会因为你没了工资就停下来。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">是啊，我理解。但你看——你以前也<strong>经历过很多磨难</strong>（been through the wringer）。还记得你当初几乎什么都没有就搬到这儿来吗？那时候你搞定了，现在也会搞定的。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">说得对。我想我需要学会<strong>随机应变、逆来顺受</strong>（roll with the punches），而不是跟每件小事较劲。我的心理咨询师一直让我专注于我能控制的事情。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">很明智。而且说实话，有时候被击倒反而会迫使你<strong>转型</strong>（pivot）。也许这正是你需要的推动力，终于可以去追求你一直在说的UX设计了。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">你说得可能对。我已经<span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">犹豫不决</span>好几个月了。也许是时候<strong>放手一搏</strong>（take the leap）、全力投入了。最坏的情况，也不过是学到了新东西。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">就是这样。而且，你不必<strong>孤军奋战</strong>（go it alone）。我认识几个做这行的人——我可以帮你介绍一下。有时候多认识几个人真的很有用。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">那真的太感谢了，说真的。我觉得我就是需要有人<strong>把我从崩溃边缘拉回来</strong>（talk me off the ledge）——当然不是字面意思——就是让我别钻牛角尖。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">朋友就是干这个的。而且我跟你说，我觉得一年以后你<strong>回头看这件事</strong>（look back on this），会意识到这其实是<strong>因祸得福</strong>（blessing in disguise）。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">但愿如此。好了，不丧了。我请你喝杯咖啡——这是我最起码能做的。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">成交。但明年你成了<span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">大人物</span>UX设计师的时候，你得请我吃饭。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">哈！没问题。</td></tr></table>\n<div style=\"height:8px\"></div>\n<div style=\"background:#f3e5f5;border-left:4px solid #4a148c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#4a148c;font-size:15px\">【本日表达列表】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">01.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>going through it</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 正在经历非常艰难的时期，精神或情感上很煎熬</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 当代流行（Gen Z-Millennial 高频使用）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 朋友之间倾诉困境、谈论低谷期</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">02.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>throw in the towel</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 认输，放弃（源自拳击比赛中扔毛巾认输的动作）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 鼓励别人不要放弃，或承认自己放弃了某事</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">03.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>treading water</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 原地踏步，勉强维持现状，没有进步也没有倒退</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 描述工作、财务或生活状态停滞不前</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">04.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>been through the wringer</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 经历了极其艰苦的磨难或折磨（wringer 指老式衣物脱水机的压辊）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 形容某人饱经磨难后的状态</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">05.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>roll with the punches</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 随机应变，坦然接受困难和打击（源自拳击中顺着对方出拳方向转身以减轻冲击）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 建议别人面对逆境要灵活应对</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">06.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>pivot</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— （在事业或人生方向上）转型、转变方向</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用（尤其硅谷/职场/创业圈高频使用）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 讨论职业变动、公司战略调整、人生转折</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">07.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>take the leap</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 放手一搏，鼓起勇气迈出重要的一步（尤其指有风险的决定）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 鼓励别人做出重大决定，如换工作、创业、搬家</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">08.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>go it alone</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 独自行动，孤军奋战，不依赖他人的帮助</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 讨论创业、面对挑战时是否寻求帮助</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">09.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>talk someone off the ledge</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 在某人极度焦虑或崩溃时安抚他们、把他们从情绪崩溃边缘拉回来（非字面意义，日常口语中比喻用法非常普遍）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 朋友之间互相安慰、工作压力大时同事间支持</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">10.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>blessing in disguise</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 因祸得福，表面看是坏事但实际上带来了好结果</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 事后回顾不幸经历时的感悟，安慰正在经历困难的人</span></td></tr></table>", "beauty": "<div style=\"background:#fce4ec;border-left:4px solid #e91e8c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#c2185b;font-size:15px\">【今日主题】</strong><span style=\"margin-left:8px;font-weight:400;color:#c2185b\">🪞 完整妆容教程——橄榄皮圆脸の「初春轻暖棕」全流程</span></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">&gt; 🌸 三月中旬，气温回暖、光线柔和，今天这套妆容以 <strong>暖棕色系</strong> 为主调，整体思路是：<strong>底妆矫色提亮→修容视觉瘦脸→眼妆拉长→唇妆点题</strong>。全程约 25 分钟，每一步都为你的肤质和脸型量身拆解。</p>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">▎STEP 0 · 妆前准备（3 min）</div>\n<div style=\"height:8px\"></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">1.</span><span style=\"color:#333;font-size:14px;line-height:1.7\"><strong>洁面后护肤</strong>：轻薄水乳即可，避免过度滋润导致后续搓泥。</span></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">2.</span><span style=\"color:#333;font-size:14px;line-height:1.7\"><strong>等待 5 分钟</strong>：让护肤品充分吸收，用这个时间整理工具。</span></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">3.</span><span style=\"color:#333;font-size:14px;line-height:1.7\"><strong>妆前需要准备的工具</strong>：</span></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>美妆蛋 × 1（微湿）</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>修容刷（斜角中号）× 1</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>眼影刷（铺色 + 晕染 + 细节）× 3</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>唇刷 × 1（可选）</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>散粉扑/蜜粉刷 × 1</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">▎STEP 1 · 妆前乳（1 min）</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 区域 | 用什么 | 为什么 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">|------|--------|--------|</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 全脸 | <strong>控油妆前乳</strong>（哑光/柔焦质地） | 你角质层偏厚、毛孔偏大，需要填平毛孔、控制油光 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| T区额外 | 毛孔隐形膏，逆毛孔方向按压 | 圆脸额头与鼻翼毛孔易显粗 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 两颊/下巴 | 叠加一层 <strong>绿色矫色隔离</strong>（薄薄一层） | 中和橄榄皮偏黄偏暗的色调 |</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">&gt; ⚠️ 切记：绿色隔离只用在暗沉/泛黄区域，不要全脸涂，否则后续粉底会发灰。</p>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">▎STEP 2 · 底妆（3 min）</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>方法：「中心向外」点涂法 + 美妆蛋弹压</strong></p>\n<div style=\"height:8px\"></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">1.</span><span style=\"color:#333;font-size:14px;line-height:1.7\">取粉底液（约一泵半），点在额头、鼻梁、双颊内侧、下巴 <strong>五点</strong>。</span></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">2.</span><span style=\"color:#333;font-size:14px;line-height:1.7\">用 <strong>微湿美妆蛋</strong> 从面部中心向外弹压推开——</span></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>面中区域（鼻翼、眼下、苹果肌）：多弹几次，遮盖力集中在这里。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>脸部边缘（发际线、下颌线）：轻轻带过即可，<strong>不要边缘厚重</strong>，圆脸最忌底妆&quot;面具感&quot;把脸框得更圆。</div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">3.</span><span style=\"color:#333;font-size:14px;line-height:1.7\">痘印/色素沉着：用遮瑕膏 <strong>点涂→按压→边缘拍开</strong>，不要拖拽。</span></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">&gt; 🎯 <strong>色号选择关键</strong>：橄榄皮一定选 <strong>黄调偏暖（warm/golden undertone）</strong> 的色号，避免粉调/冷调底妆，否则脸会显灰显脏。</p>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">▎STEP 3 · 遮瑕（2 min）</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 区域 | 手法 | 要点 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">|------|------|------|</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 黑眼圈 | 倒三角形遮瑕，蛋尖按压 | 选比底妆亮半号的 <strong>暖桃色调</strong> 遮瑕，同时提亮面中 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 鼻翼暗沉 | 薄薄一层遮瑕，指腹拍匀 | 橄榄皮鼻翼特别容易暗，这步很关键 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 法令纹/嘴角 | 细刷点涂 | 圆脸法令纹区域提亮可以拉长中庭视觉 |</p>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">▎STEP 4 · 定妆（1 min）</div>\n<div style=\"height:8px\"></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>T区 + 鼻翼</strong>：用 <strong>控油散粉</strong> 按压定妆（你出油适中，薄按即可）。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>眼下/面中</strong>：用烘焙法 or 极少量散粉轻扫，<strong>保留微光泽感</strong>——橄榄皮全哑光会显老显干。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>面部边缘</strong>：不定妆或极轻扫过，保持皮肤质感自然过渡。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">▎STEP 5 · 修容 + 高光（3 min）⭐ 圆脸核心步骤</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">这一步对你的脸型改变最大，请认真看：</p>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">🔲 修容（收窄 + 拉长）</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">```</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">修容位置示意（正面看）：</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">╭──  发际线两侧（太阳穴向上）──╮</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">╱                                  ╲</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">│  颧骨下方 ← 从耳前向嘴角方向斜扫   │</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">│                                    │</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">╲   下颌角 → 向下巴方向收           ╱</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">╰──────── 下巴底部（可选）────────╯</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">```</p>\n<div style=\"height:8px\"></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>发际线两侧</strong>：收窄额头横向宽度——圆脸重点！</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>颧骨下方</strong>：从耳前向嘴角方向 <strong>斜向下</strong> 扫（不要横着扫，横扫显更宽）。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>下颌角到下巴</strong>：轻扫，制造下颌线条感。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>鼻侧影</strong>：从眉头向</div>", "research": "<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 1</div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Dharel P. Acut</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">From classroom learning to real-world skills: an autoethnographic account of school field trips and STEM work immersion program management</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Disciplinary and Interdisciplinary Science Education Research</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2024</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">10 次</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Abstract Quality science education is crucial in preparing students for real-world challenges by fostering scientific literacy and critical thinking skills. Field trips and work immersion programs support this goal by providing hands-on experiences and real-world applications of scientific concepts, thereby enhancing student engagement and understanding. This autoethnographic study explores the ma…</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">这篇论文与用户研究方向的关联性主要体现在方法论和教师经验维度。首先，该研究采用自我民族志（autoethnography）作为核心方法，与方向三中教师脆弱性与情感劳动研究所使用的自我民族志方法一致，可提供方法论上的参照与对话。其次，研究聚焦教师对课外教学活动（实地考察与实习项目）的管理与反思性实践，涉及教师在制度框架下的角色与情感体验，与方向三关注的教师与制度议题存在一定交集。不过，该研究的学科情境（</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://doi.org/10.1186/s43031-024-00111-x\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 10.1186/s43031-024-00111-x</a></td></tr></table>\n<div style=\"height:6px\"></div>\n</div>\n<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 2</div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Katarina Blennow, Martin Malmström, Elizabeth Petroelje Stolle</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">Countering Discourses of Derision: Moving towards Action in Teacher Education in the USA and Sweden</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Education Sciences</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2023</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">3 次</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">This article is about how negative discourses of teacher education position teacher educators and how they might influence or inspire action. We use self-study methods to investigate the political dimension of teacher education in two national contexts: Sweden and the USA. More specifically, we examine the emotions stirred by the positioning related to being a teacher educator and how those emotio…</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">本文聚焦教师教育者如何被负面话语定位及其情感回应，与<strong>方向三（教师与制度）</strong>高度相关：研究涉及教师在制度性话语中的脆弱性（teacher vulnerability）、面对贬抑话语时的情感劳动（emotional labor），以及运用自我研究方法（与autoethnography同属质性自我探究传统）来抵抗职业边界的限制。此外，文章对负面话语的批判分析也与<strong>方向一</strong>中批判话语分析（CDA）及认识不公正（epistemic injustice）的关切存在方法论与理论上的交叉，即制度话语如何</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://doi.org/10.3390/educsci13070635\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 10.3390/educsci13070635</a></td></tr></table>\n<div style=\"height:6px\"></div>\n</div>\n<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 3</div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Francesca Ferrer-Best</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">The Virtual Ballet Studio: A Phenomenological Enquiry into the Domestic as Dance-Space During Lockdown</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">The International Journal of Screendance</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2021</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">5 次</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">The paper is based on an autoethnographic study of dancing via Zoom over the Covid19 lockdown in Sydney, Australia. Its theoretical framework takes up Iris Marion Young&#x27;s critical phenomenology and work on domestic space to think about certain focal points of the experience, such as having a room to move in, the floor, and the screen. The aim is to examine how important dance-space is to the exper…</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">这篇论文与用户研究方向的关联性较为有限，但存在方法论上的交叉。该研究采用<strong>自我民族志（autoethnography）</strong>方法探究疫情封锁期间居家空间转化为舞蹈空间的现象学体验，这与方向三中教师研究所使用的自我民族志方法论相呼应，可为理解该方法如何捕捉身体化、情感化的主体经验提供跨学科参照。此外，其对空间、屏幕（Zoom）中介下身体实践的关注，也可间接启发方向二中对线上课堂互动与中介工具如何重</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://doi.org/10.18061/ijsd.v12i0.7812\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 10.18061/ijsd.v12i0.7812</a></td></tr></table>\n</div>"}, {"date_key": "2026-03-13", "date_cn": "2026年03月13日", "day_cn": "周五", "english": "<div style=\"background:#e8f0fe;border-left:4px solid #1a73e8;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1a73e8;font-size:15px\">【今日主题】</strong><span style=\"margin-left:8px;font-weight:400;color:#1a73e8\">自然与环境（Nature, Seasons &amp; Environment）</span></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e3f2fd;border-left:4px solid #0d47a1;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#0d47a1;font-size:15px\">【英文原文】</strong></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A (Jake): Dude, have you been outside today? It&#x27;s absolutely gorgeous. Spring is finally in full swing.</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">B (Mia): Oh my God, yes. I stepped out this morning and I was like, okay, winter is officially <span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">done and dusted</span>. The cherry blossoms on our street are popping off.</p>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Right? I&#x27;ve been cooped up all winter, barely went anywhere. I&#x27;m so ready to touch grass, like for real.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Same. I was literally turning into a hermit. Hey, you wanna hit the trail at Red Rock this weekend? I heard the wildflowers are insane right now.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">I&#x27;m so down. I&#x27;ve been meaning to get out into the boonies and just disconnect for a bit. No phone, no emails, just vibes.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Love that. Oh, but check the forecast first. You know how it is around here — the weather can turn on a dime. Last week it was seventy degrees, and then boom, we got slammed with hail.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Yeah, that was nuts. Classic spring weather though, right? If you don&#x27;t like the weather, wait five minutes.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Ha, literally. My neighbor&#x27;s garden got wrecked. She was so bummed — she&#x27;d just gone all in on planting her veggie beds. Poor thing had to start from scratch.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Oof, that&#x27;s rough. Speaking of gardens, my mom&#x27;s been going green lately — composting, rain barrels, the whole nine yards. She&#x27;s <span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">over the moon</span> about her little eco setup.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">That&#x27;s awesome. Honestly, every little bit helps. I&#x27;ve been trying to reduce my carbon footprint too, but it&#x27;s hard not to feel like you&#x27;re just a drop in the bucket when big corporations are out here trashing the planet.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">I feel you. But I think there&#x27;s been a real sea change in how people think about sustainability. Even my dad, who used to roll coal in his truck for fun, is talking about getting an EV now.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">No way! That&#x27;s wild. I guess when gas prices are through the roof, even the die-hards come around.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Exactly. Hit &#x27;em in the wallet — that&#x27;s what really lights a fire under people.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">True that. Alright, so Saturday morning, Red Rock? Let&#x27;s get out there before it heats up and we&#x27;re all melting.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Bet. I&#x27;ll pack some snacks. Let&#x27;s soak it all in before summer rolls around and it&#x27;s a million degrees.</td></tr></table>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e8f5e9;border-left:4px solid #1b5e20;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1b5e20;font-size:15px\">【中文翻译】</strong></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A（Jake）：兄弟，你今天出门了吗？外面美翻了。春天终于全面到来了（in full swing）。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">B（Mia）：天哪，是的。我今早出门就觉得，好吧，冬天正式结束了。我们这条街上的樱花全都炸开了（popping off）。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A：对吧？我整个冬天都窝在家里（cooped up），哪儿也没去。我真的太需要出去碰碰草地了（touch grass），说真的。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">B：我也是。我简直快变成隐士了。嘿，这周末你想去 Red Rock 的步道走走吗？听说那边的野花现在美得不像话。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A：我完全愿意（I&#x27;m so down）。我一直想去偏远的地方（the boonies）彻底断个联。没有手机，没有邮件，纯放空。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">B：太棒了。不过先查查天气预报。你知道咱这儿的天气说变就变（turn on a dime）。上周还七十度呢，然后砰，就被冰雹砸了。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A：是啊，太离谱了。不过这就是典型的春天天气嘛，对吧？不喜欢天气就等五分钟（if you don&#x27;t like the weather, wait five minutes）。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">B：哈，真的是。我邻居的花园全毁了。她特别沮丧——她刚全力投入（go all in）种菜床。可怜的人只好从头来过（start from scratch）。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A：哎，太惨了。说到花园，我妈最近在走环保路线（going green）——堆肥、雨水桶、全套都搞了。她对自己的小生态系统开心得不行。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">B：太好了。说实话，每一点都有帮助。我也在努力减少碳足迹（carbon footprint），但很难不觉得自己只是杯水车薪（a drop in the bucket），大企业都在那儿糟蹋地球。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A：我懂你。但我觉得人们对可持续发展的观念确实有了根本性的转变（sea change）。连我爸，以前开卡车故意喷黑烟（roll coal）玩的人，现在都在说要买电车了。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">B：不会吧！太疯狂了。我想油价高到离谱（through the roof）的时候，连死忠派也会转变的。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A：没错。打中钱包——那才是真正让人有动力的（lights a fire under people）。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">B：确实。好的，那周六早上，Red Rock？赶在天气变热之前出去，不然我们都要融化了。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A：走起（Bet）。我带点零食。趁夏天来之前好好享受一下（soak it all in），不然就热到一百万度了。</p>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#f3e5f5;border-left:4px solid #4a148c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#4a148c;font-size:15px\">【本日表达列表】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">01.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>in full swing</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 全面展开、进入高潮</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 形容季节、活动、派对等达到最热烈的状态</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">02.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>popping off</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— （花朵等）大量绽放；（事情）火了、炸了</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / Gen Z</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 形容花开得很旺，也常用于形容某事很火爆</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">03.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>touch grass</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 出去走走、接触真实世界（常暗示别老待在网上/室内）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国 / Gen Z / 网络流行语</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 劝人或自嘲需要出门透气、亲近自然</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">04.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>I&#x27;m so down</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 我完全愿意、我很想参加</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 朋友邀约时表示积极响应</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">05.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>the boonies</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 偏远地方、荒郊野外</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 形容远离城市的乡村或荒野地区</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">06.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>turn on a dime</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 瞬间转变、说变就变</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 形容天气、局势、情绪等突然变化</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">07.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>go all in</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 全力以赴、全身心投入</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用（源自扑克术语）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 形容某人对一件事倾注全部精力或资源</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">08.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>going green</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 走环保路线、变得更环保</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 形容个人或企业开始采取环保措施</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">09.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>a drop in the bucket</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 杯水车薪、微不足道</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 觉得自己的努力相对于大问题而言太渺小</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">10.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>sea change</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 根本性的转变、重大变革</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 全球通用（源自莎士比亚）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 形容观念、态度或形势发生了深刻改变</span></td></tr></table>", "beauty": "<div style=\"background:#fce4ec;border-left:4px solid #e91e8c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#c2185b;font-size:15px\">【今日主题】</strong><span style=\"margin-left:8px;font-weight:400;color:#c2185b\">护肤成分解析 —— 棱橄榄皮的&quot;提亮×控油×嫩肤&quot;三角公式</span></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">棱橄榄皮最核心的护肤诉求可以归结为三件事：<strong>暗沉要提亮、角质要疏通、毛孔要收敛</strong>。今天我们就把这三件事拆解到具体成分，让你看配料表时心里有数。</p>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">一、提亮暗沉 —— 从&quot;黄灰&quot;走向&quot;透亮&quot;</div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">① 烟酰胺（Niacinamide / 维生素B3）</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>做什么</strong>：抑制黑色素转运、强化皮肤屏障、附带控油。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>浓度建议</strong>：日常维稳选 2%-5%；集中提亮可用 10%（需建立耐受）。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>使用节奏</strong>：早晚均可，搭配防晒效果翻倍。</div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">② 抗坏血酸及其衍生物（Vitamin C 家族）</div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 成分 | 特点 | 适合阶段 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">|------|------|----------|</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| L-抗坏血酸（原型VC） | 见效快、提亮猛，但易氧化刺激 | 已有耐受、想冲刺提亮 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 抗坏血酸葡糖苷（AA2G） | 温和缓释，稳定性好 | 新手入门、敏感期 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 乙基抗坏血酸（3-O-EAA） | 兼顾稳定与渗透 | 性价比之选 |</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">&gt; <strong>棱橄榄皮优选</strong>：角质层偏厚其实对VC耐受力不错，可以直接从 15% 原型VC精华切入，早上使用+防晒，4-6周肉眼可见肤色均匀度提升。</p>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">③ 传明酸（氨甲环酸）</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>抑制黑色素活性，对泛红型暗沉也有效。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>浓度 2%-3% 就能起效，温和度高，可与烟酰胺叠加。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">二、疏通角质 —— 让厚脸皮变&quot;发光体&quot;</div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">① 水杨酸（BHA）</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>为什么是首选</strong>：脂溶性，能钻进毛孔深处溶解油脂和老废角质——这正是棱橄榄皮毛孔粗大的根源。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>浓度</strong>：日常 0.5%-1% 每天可用；2% 做周护理（每周1-2次）。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>形态偏好</strong>：选含水杨酸的化妆水/棉片，擦拭型比涂抹型对厚角质层更友好。</div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">② 果酸（AHA）—— 甘醇酸 &amp; 乳酸</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>甘醇酸（Glycolic Acid）：分子最小、渗透最深，去角质力强；8% 以下日常用，20%-30% 做居家焕肤（每2周一次）。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>乳酸（Lactic Acid）：去角质同时保湿，适合换季过渡期。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>组合打法</strong>：工作日用水杨酸控油通孔 → 周末用甘醇酸集中焕肤，角质代谢提速，后续美白成分吸收率 ↑↑。</div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">③ 壬二酸（Azelaic Acid）</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>被低估的多面手：去角质 + 抗炎 + 提亮三合一。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>15%-20% 浓度处方级效果好，但 10% OTC 也能日常维稳。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>特别适合</strong>有闭口+暗沉双重困扰的棱橄榄皮。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">三、控油收孔 —— 让底妆服帖的前置功课</div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">① 锌盐（PCA锌 / 葡糖酸锌）</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>从源头调节皮脂分泌，不是&quot;吸油&quot;而是&quot;少出油&quot;。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>常见于控油精华、控油面霜中，看到 Zinc PCA 就对了。</div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">② 北美金缕梅提取物（Witch Hazel）</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>天然收敛成分，适合做妆前二次清洁/湿敷。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>注意</strong>：选不含酒精的蒸馏水版本，避免越收越干→反跳出油。</div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">③ CICA / 积雪草苷（Centella Asiatica）</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>修护屏障、抗炎镇静，间接减少因屏障受损导致的异常出油。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>可作为酸类产品后的&quot;修复搭档&quot;。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">四、一周成分排布建议（供参考）</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 时段 | 周一-周五 | 周六 | 周日 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">|------|-----------|------|------|</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| <strong>早</strong> | VC精华 → 烟酰胺面霜 → 防晒 | 同左 | 同左 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| <strong>晚</strong> | 水杨酸棉片 → 传明酸精华 → PCA锌面霜 | 甘醇酸焕肤（10-15min）→ CICA修复霜 | 乳酸保湿精华 → CICA修复霜 |</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">&gt; 原则：<strong>早抗氧提亮，晚疏通修复</strong>；酸类和VC不同时段使用以减少刺激叠加。</p>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">💡 针对你的肤质/脸型</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>肤质层面（棱橄榄皮）</strong></p>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>你的角质层偏厚 = 天然&quot;缓冲垫&quot;，对酸类和VC的耐受天花板</div>", "research": "<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 1</div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">HAO YANG, Joseph Foley</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">Translanguaging as Interactional Resources Employed by Students in EFL Student-Led Group Task Interaction</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Journal of English Language and Linguistics</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2024</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2 次</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">This study aimed to investigate the strategies used by students during group tasks in the EFL classroom. The study focused on translanguaging as one of the strategies to facilitate communication and interaction among students. The data was collected by recording the classroom discussions of a focused group in an EFL class at a Chinese university over three hours. The analysis was carried out using…</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">该论文与<strong>方向二（课堂互动与中介）</strong>高度相关：研究聚焦EFL课堂中学生主导的小组任务互动，以会话分析方法考察translanguaging作为互动资源的使用策略，与用户关注的translanguaging、peer interaction主题直接对应。此外，研究情境设置在中国大学英语课堂，与CSL/语言教学背景相近，其对学习者话轮建构和互动特征的分析也可为LRE（语言相关片段）研究提供方法论和分析框架上的参照。</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://doi.org/10.62819/jel.2024.145\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 10.62819/jel.2024.145</a></td></tr></table>\n<div style=\"height:6px\"></div>\n</div>\n<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 2</div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Richard Kern</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">Twenty‐first century technologies and language education: Charting a path forward</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Modern Language Journal</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2024</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">54 次</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">The COVID-19 pandemic, necessitating remote instruction in the vast majority of educational institutions around the world, put technology squarely at the center of language learning and teaching. Virtually all teaching and learning was mediated by Zoom or similar videoconferencing platforms. Students could see one another&#x27;s faces (rather than the backs of their peers’ heads), but they could also c…</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">这篇论文探讨21世纪技术在语言教育中的角色，与用户研究有间接关联：技术中介的课堂互动（如Zoom分组讨论、聊天窗口作为交际渠道）可与方向二中CSL课堂互动、同伴互动及translanguaging的研究相联系，尤其是技术如何重新塑造学习者之间的语言相关片段（LRE）和中介过程。此外，远程教学背景下教师面临的情感与制度压力也可延伸至方向三中教师脆弱性与情感劳动的探讨，技术变革对教学评估的反拨效</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://doi.org/10.1111/modl.12924\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 10.1111/modl.12924</a></td></tr></table>\n<div style=\"height:6px\"></div>\n</div>\n<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 3</div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Kevin W. H. Tai</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">Translanguaging as Inclusive Pedagogical Practices in English-Medium Instruction Science and Mathematics Classrooms for Linguistically and Culturally Diverse Students</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Research in Science Education</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2021</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">119 次</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Abstract In English-medium instruction (EMI), English-as-a-second-language students will learn all/some subjects through English. Although there are a considerable number of studies which explore classroom interaction in Hong Kong (HK) secondary EMI schools, few studies have investigated EMI lessons which involve South Asian ethnic minorised students. These students share different linguistic and …</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\
