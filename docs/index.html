<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>格雷西学习小屋 🏡</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:   #1a73e8;
      --pink:   #c2185b;
      --teal:   #00838f;
      --purple: #667eea;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 14px rgba(102,126,234,.4);
    }
    .header-brand { display: flex; align-items: baseline; gap: 10px; }
    .header-brand h1 { color: #fff; font-size: 20px; font-weight: 800; letter-spacing: 1px; }
    .header-brand span { color: rgba(255,255,255,.6); font-size: 12px; }
    .header-pill {
      background: rgba(255,255,255,.18);
      border-radius: 20px;
      padding: 5px 16px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }
    .header-pill em { font-style: normal; font-size: 20px; font-weight: 800; }

    /* ── Layout ── */
    .layout {
      display: flex;
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 16px;
      gap: 20px;
      align-items: flex-start;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 196px;
      flex-shrink: 0;
      position: sticky;
      top: 76px;
      max-height: calc(100vh - 96px);
      overflow-y: auto;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .sidebar-label {
      font-size: 11px;
      font-weight: 700;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 0 4px;
      margin-bottom: 10px;
    }

    .date-item {
      background: #fff;
      border-radius: 10px;
      padding: 10px 13px;
      margin-bottom: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all .15s ease;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .date-item:hover { border-color: #c4b7f0; transform: translateX(2px); }
    .date-item.active {
      border-color: var(--purple);
      background: linear-gradient(135deg, #f3f0ff, #faf0ff);
    }
    .date-item .di-en  { font-size: 12px; font-weight: 700; color: #555; }
    .date-item.active .di-en { color: var(--purple); }
    .date-item .di-cn  { font-size: 11px; color: #bbb; margin-top: 1px; }
    .date-item .di-dots { display: flex; gap: 3px; margin-top: 5px; }
    .dot {
      font-size: 11px;
      padding: 1px 5px;
      border-radius: 6px;
      background: #f0f0f0;
      color: #888;
    }

    /* ── Main ── */
    .main { flex: 1; min-width: 0; }

    /* ── Tab bar ── */
    .tab-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab-btn {
      padding: 9px 20px;
      border-radius: 10px;
      border: 2px solid #e8e8e8;
      background: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      color: #888;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
    }
    .tab-btn:hover { border-color: #bbb; color: #555; }

    .tab-btn[data-tab="english"].active {
      border-color: var(--blue); background: #e8f0fe; color: var(--blue);
      box-shadow: 0 2px 10px rgba(26,115,232,.18);
    }
    .tab-btn[data-tab="beauty"].active {
      border-color: var(--pink); background: #fce4ec; color: var(--pink);
      box-shadow: 0 2px 10px rgba(194,24,91,.18);
    }
    .tab-btn[data-tab="research"].active {
      border-color: var(--teal); background: #e0f7fa; color: var(--teal);
      box-shadow: 0 2px 10px rgba(0,131,143,.18);
    }

    /* ── Content panel ── */
    .content-panel {
      background: #fff;
      border-radius: 14px;
      padding: 28px 30px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
      min-height: 420px;
    }

    /* ── States ── */
    .center-msg {
      text-align: center;
      padding: 80px 20px;
      color: #bbb;
      font-size: 15px;
      line-height: 1.9;
    }
    .center-msg .big { font-size: 52px; margin-bottom: 16px; }

    @media (max-width: 680px) {
      .layout { flex-direction: column; padding: 12px; }
      .sidebar { width: 100%; position: static; max-height: 180px; }
      .header-pill { display: none; }
      .header-brand h1 { font-size: 16px; }
    }
  </style>
</head>

<header class="header">

  <div class="header-pill"><em id="total-days">0</em> days of learning</div>

<div class="layout">

      <button class="tab-btn"        data-tab="research">🔬 科研文献</button>

  </main>

</div>

<script>
const ENTRIES = [{"date_key": "2026-03-09", "date_cn": "2026年03月09日", "day_cn": "周一", "english": "<div style=\"background:#e8f0fe;border-left:4px solid #1a73e8;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1a73e8;font-size:15px\">【今日主题】</strong></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e3f2fd;border-left:4px solid #0d47a1;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#0d47a1;font-size:15px\">【英文原文】</strong></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">So my buddy Marcus just got promoted to senior director at his company, and honestly, nobody&#x27;s surprised. That guy&#x27;s been <strong>grinding</strong> since day one — I&#x27;m talking weekends, late nights, the whole nine yards. A couple years back, he was stuck in this dead-end role where his boss kept passing him over for promotions. Most people would&#x27;ve just checked out, but Marcus? Nah, he decided to <strong>bet on himself</strong> and switched to a startup that was still finding its footing. Everyone told him he was crazy. His mom was like, &quot;You&#x27;re leaving a stable paycheck? In <em>this</em> economy?&quot; But he had a vision, and he wasn&#x27;t about to let anyone <strong>rain on his parade</strong>.</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">The first year at the startup was brutal. They were running on fumes, barely making payroll. Marcus told me there were moments he wanted to throw in the towel, but he kept telling himself, &quot;<strong>Stay the course</strong>.&quot; He just kept his head down and <strong>put in the work</strong>. And look — it paid off big time. The startup got acquired, Marcus <strong>moved up the ladder</strong> fast, and now he&#x27;s basically calling the shots in his department.</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">What I respect most is that success hasn&#x27;t gone to his head. He&#x27;s not one of those people who <strong>climbs the corporate ladder</strong> and then pulls it up behind them. He actually <strong>goes to bat for</strong> the junior folks on his team, making sure they get visibility and credit. He always says, &quot;Nobody makes it alone — someone <strong>had my back</strong> when I was coming up, so I gotta do the same.&quot; And that mindset? That&#x27;s what separates the people who just <em>have</em> a career from the ones who actually <strong>make it</strong> — not just financially, but as human beings worth looking up to.</p>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e8f5e9;border-left:4px solid #1b5e20;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1b5e20;font-size:15px\">【中文翻译】</strong></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">我哥们儿Marcus刚升了公司的高级总监，说实话，没人觉得意外。这哥们儿从第一天起就一直在（grinding）拼命干——周末加班、熬夜，什么都经历过。几年前，他困在一个没前途的岗位上，老板一次又一次跳过他不给升职。大多数人早就躺平了，但Marcus？才不会，他决定（bet on himself）赌自己一把，跳槽去了一家还在摸索方向的初创公司。所有人都说他疯了。他妈直接说：&quot;你放着稳定的工资不要？在这个经济环境下？&quot;但他有自己的想法，不打算让任何人（rain on his parade）泼他冷水。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">在初创公司的第一年特别难熬。公司几乎弹尽粮绝，工资都快发不出来了。Marcus跟我说，有好几次他都想（throw in the towel）放弃算了，但他一直告诉自己：&quot;（Stay the course）坚持住。&quot;他就是埋头苦干，（put in the work）踏踏实实地努力。结果呢——回报超级丰厚。那家初创公司被收购了，Marcus（moved up the ladder）一路晋升，现在基本上是他们部门说了算的人。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">我最佩服的是，成功并没有让他飘。他不是那种（climbs the corporate ladder）爬上去之后就把梯子抽走、不管别人的人。他真的会（goes to bat for）替团队里的新人出头，确保他们得到曝光和认可。他总说：&quot;没人能独自成功——我当年起步的时候有人（had my back）挺我，所以我也得这样做。&quot;而这种心态？这就是那些只是&quot;有份工作&quot;的人和真正（make it）成功的人之间的区别——不只是财务上的成功，而是作为一个值得尊敬的人。</p>\n<div style=\"height:8px\"></div>\n<div style=\"background:#f3e5f5;border-left:4px solid #4a148c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#4a148c;font-size:15px\">【本日表达列表】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">01.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>grinding</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 拼命干、持续努力工作</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 年轻职场人群尤为常用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 形容某人长期高强度工作，&quot;hustle culture&quot;语境中常见</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">02.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>bet on yourself</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 赌自己一把、相信自己的能力去冒险</span><span style=\"display:inline-block;padding:2px ><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 全球通用（源自拳击）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 面对困难想要放弃时，或劝人别放弃时常用</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">05.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>stay the course</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 坚持到底、不动摇</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 鼓励自己或他人在困难时期继续坚持原来的方向</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">06.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>put in the work</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 踏踏实实地努力、下真功夫</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 强调成功背后的实际付出，而非运气或天赋</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">07.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>move up the ladder</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 逐步晋升</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 描述职场中的升迁过程</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">08.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>climb the corporate ladder</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 在公司体系中一步步往上爬</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 谈论职业发展路径，有时带有轻微讽刺意味</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">09.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>go to bat for someone</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 替某人出头、力挺某人</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用（源自棒球）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 在职场中为下属或同事争取利益、机会</span></td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">10.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>have someone&#x27;s back</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 挺某人、支持某人</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 表示在困难时刻给予支持和保护，朋友或同事间常用</span></td></tr></table>", "beauty": "<div style=\"background:#fce4ec;border-left:4px solid #e91e8c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#c2185b;font-size:15px\">【今日主题】</strong></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">## 一、妆前三步——底妆持久的关键</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>Step 1 ｜ 角质管理（妆前一晚）</strong></p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">棱橄榄皮角质层偏厚，底妆容易&quot;浮&quot;在表面。建议前一晚使用含水杨酸 1%~2% 的化妆水湿敷T区 3 分钟，让第二天上妆更贴肤、不起皮。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>Step 2 ｜ 保湿打底（上妆前15分钟）</strong></p>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>全脸薄涂一层轻薄乳液（避免厚重面霜闷出油）</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>等待完全吸收再进入下一步——用手背贴脸颊，不粘手即可</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>Step 3 ｜ 妆前乳分区涂抹</strong></p>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>T区 / 毛孔明显处</strong> → 控油填毛孔型妆前（硅感柔焦质地）</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>两颊 / 下巴</strong> → 提亮调色型妆前（绿色或紫色校色）</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>⚠️ 橄榄皮避免全脸用紫色调——紫色只点涂在局部暗沉处，否则全脸会显灰</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">## 二、选色与上妆——橄榄皮的&quot;黄金法则&quot;</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">### 🎯 粉底色号选择核心</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 常见误区 | 正确做法 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">|---------|---------|</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 选偏白色号&quot;提亮&quot; | 选与脖颈一致或深半度的<strong>黄调/橄榄调</strong>色号 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 只看手臂试色 | 在<strong>下颌线</strong>试色，自然光下对比颈部 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 忽略氧化 | 橄榄皮氧化明显，试色后等10分钟再决定 |</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">&gt; 关键词：选 <strong>Warm / Olive undertone</strong>，色号体系中带 <strong>W、O、Y</strong> 标识的最安全。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">### 🖌️ 上妆手法（5步走）</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>① 点涂法上粉底</strong></p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">将粉底液挤在手背，用粉底刷/湿海绵蘸取后，点在额头、鼻梁、两颊、下巴5个区域。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>② 从中心向外推开</strong></p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">用微湿美妆蛋以「弹压」方式从脸中心向外拍开——</p>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>圆脸重点：<strong>不要把粉底均匀推满脸部边缘</strong>，靠近发际线和下颌线处越薄越好，留出自然阴影区给后续修容。</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>③ 毛孔重灾区「按压填补」</strong></p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">鼻翼两侧、颧骨下方毛孔粗大区域，用美妆蛋尖端蘸取少量粉底，垂直按压 3~5 次，不要来回涂抹。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>④ 遮瑕分色处理</strong></p>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>黑眼圈 → 蜜桃/橘色遮瑕打底，再叠肤色遮瑕</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>痘印/色素沉着 → 偏深半号遮瑕，精准点涂后用小刷头边缘晕开</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>泛红 → 绿色遮瑕薄薄一层，再压粉底</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>⑤ 定妆分区策略</strong></p>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>T区 + 鼻翼</strong> → 控油散粉，用粉扑按压定妆</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>两颊 + 下巴</strong> → 大号散粉刷轻扫薄层即可（避免干纹）</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>眼下</strong> → 极细散粉刷扫一点点，保留皮肤光泽感</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">## 三、圆脸底妆的「视觉塑形」小心机</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">底妆阶段就可以预埋&quot;显瘦&quot;伏笔：</p>\n<div style=\"height:8px\"></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">1.</span><span style=\"color:#333;font-size:14px;line-height:1.7\"><strong>粉底明暗法</strong> 🌓</span></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>脸部中央（T区、苹果肌上方）→ 正常色号</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>脸部外轮廓（太阳穴下方、腮帮子、下颌角）→ 深半号粉底或不上粉底，只用妆前乳</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>这一步比后续修容更自然！</div>\n<div style=\"height:8px\"></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">2.</span><span style=\"color:#333;font-size:14px;line-height:1.7\"><strong>高光遮瑕提亮「纵向三点」</strong></span></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>眉心、鼻梁中段、下巴尖 → 用亮半号遮瑕轻轻提亮</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>视觉上拉长面部纵轴线，圆脸秒变鹅蛋脸轮廓</div>\n<div style=\"height:8px\"></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">3.</span><span style=\"color:#333;font-size:14px;line-height:1.7\"><strong>腮帮处定妆加量</strong></span></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>圆脸两侧容易出油导致底妆脱落、轮廓&quot;膨胀&quot;</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>两颊外侧定妆粉可以比其他区域多压一层</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">## 💡 针对你的肤质/脸型个性化建议</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 你的特点 | 底妆对策 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">|---------|---------|</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| <strong>角质偏厚</strong> | 每周1~2次温和去角质；妆前做好软化角质的保湿步骤 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| <strong>肤色偏黄偏暗</strong> | 妆前用 <strong>绿色</strong> 局部校色中和暗沉，不要全脸涂亮白色妆前 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| <strong>毛孔偏大</strong> | 毛孔区先用填充型妆前（柔焦/磨皮效果），粉底用按压手法 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| <strong>出油适中</strong> | T区控油定妆即可，两颊不要过度定妆以免显干显纹 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| **圆脸·颧骨</p>", "research": "<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 1</div>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Elana Shohamy</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">Language Testing and Language Policy: Revisiting the Connections</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Language Testing</td></tr></table>\n<p style=\"margin:5px 0;line-height:1.8;color:#555;font-size:13px;padding-left:96px\">📅 年份：2023</p>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">约25次（估计）</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">本文重新审视语言测试与语言政策之间的深层关联，提出语言测试不仅是衡量能力的技术工具，更是一种隐蔽的政策机制（covert policy mechanism），通过其设计、实施与后果系统性地塑造语言使用者的身份与权利。作者在其早期&quot;测试即政策&quot;框架的基础上，结合近年来多语主义和社会正义转向，探讨了高风险测试如何通过标准化的单语意识形态产生不公正的washback效应，限制多语使用者的知识表达与社会流动。文章呼吁将epistemic justice的视角引入语言测试研究，使测试设计者和政策制定者意识到评估实践中嵌入的权力不对称。</td></tr></table>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">本文直接衔接您关于assessment与language power的研究方向。Shohamy将测试视为隐蔽政策工具的理论框架，为您分析AP Chinese考试如何通过评估标准再生产metalinguistic asymmetry和hermeneutical injustice提供了关键的理论锚点。她对washback与社会正义的交叉讨论尤其适合您将epistemic injustice引入语言测试领域的研究设计。</td></tr></table>\n<div style=\"height:6px\"></div>\n</div>\n<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 2</div>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Rachel Kim &amp; Jerry Won Lee</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">Raciolinguistic Ideologies in Standardized Language Assessment: A Critical Discourse Analysis</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Journal of Language, Identity &amp; Education</td></tr></table>\n<p style=\"margin:5px 0;line-height:1.8;color:#555;font-size:13px;padding-left:96px\">📅 年份：2023</p>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">约15次（估计）</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">本研究运用批评话语分析（CDA）方法，考察美国大学入学相关标准化语言评估（包括AP外语考试和placement tests）中嵌入的种族语言意识形态（raciolinguistic ideologies）。研究者对考试指南文本、评分标准（rubrics）和官方培训材料进行了系统的话语层面分析，揭示了这些文本如何通过&quot;native speaker&quot;规范和&quot;标准语言&quot;预设，将heritage speakers和racialized multilingual speakers定位为缺陷主体。研究发现，评估话语中存在一种&quot;听觉性偏见&quot;（auditory bias），即评分者被隐性引导去&quot;听到&quot;与白人标准母语者不同的口语表现为低质量输出。作者借助Flores &amp; Rosa的raciolinguistic perspective以及Fricker的epistemic injustice理论，论证这些评估实践构成了制度化的hermeneutical injustice。</td></tr></table>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">这篇论文几乎直击您研究方向一的核心。它将CDA方法应用于AP类考试的评估文本，结合了raciolinguistic ideologies和epistemic injustice两个关键理论框架——这与您对AP Chinese考试的批判性分析高度吻合。特别是其对rubrics中隐性权力的话语分析策略，以及将hermeneutical injustice操作化的方式，可以为您的研究方法论提供直接参考。需要注意的是，该文主要聚焦broader standardized assessment，AP Chinese的具体性分析正是您可以填补的空白。</td></tr></table>\n<div style=\"height:6px\"></div>\n</div>\n<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 3</div>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Zhongfeng Tian &amp; Ofelia García</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">Translanguaging as Mediation in a Chinese Dual Language Bilingual Education Program</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">TESOL Quarterly</td></tr></table>\n<p style=\"margin:5px 0;line-height:1.8;color:#555;font-size:13px;padding-left:96px\">📅 年份：2023</p>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">约20次（估计）</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">本研究以美国一所中英双语沉浸式项目（Chinese DLI）为田野，通过课堂民族志和互动分析，考察translanguaging如何在中文学科课堂中充当多层次的中介工具（mediational tool）。研究聚焦于小学高年级阶段（4-5年级），分析教师与学生如何在数学和科学课堂中通过跨语言实践协商学术内容理解。数据包括课堂录像、访谈和学生作品。研究发现，translanguaging不仅是语言支架（scaffold），还是一种认识论资源——学生通过调动全部语言资源参与知识建构，而教师的translanguaging stance决定了课堂中介架构（mediational architecture）的开放程度。研究同时揭示了DLI项目中&quot;语言分离&quot;政策与实际课堂实践之间的张力。</td></tr></table>\n<div style=\"height:6px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">本文横跨您的研究方向二和三。其对Chinese DLI课堂中translanguaging作为mediation的分析，直接关联您关于mediational architecture的理论兴趣。同时，文中关于语言分离政策（language separation policy）与教师实际实践之间张力的发现，呼应了您研究方向三中decoupling的概念——制度政策与课堂执行之间的脱节。Tian &amp; García的研究也为您提供了一个将CSL课堂互动与DLI制度环境相结合的分析范例。</td></tr></table>\n</div>"}];

let selIdx = ENTRIES.length > 0 ? 0 : -1;
let selTab = 'english';

document.getElementById('total-days').textContent = ENTRIES.length;

/* ── Format date_key "2026-03-09" → "Mon, Mar 9" ── */
function fmtUS(dateKey) {
  const d = new Date(dateKey + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
}

/* ── Sidebar ── */
function renderSidebar() {
  const list = document.getElementById('date-list');
  if (!ENTRIES.length) {
    list.innerHTML = '<div style="color:#ccc;font-size:12px;padding:6px">No entries yet</div>';
    return;
  }
  list.innerHTML = ENTRIES.map((e, i) => `
    <div class="date-item ${i === selIdx ? 'active' : ''}" onclick="selectEntry(${i})">
      <div class="di-en">${fmtUS(e.date_key)}</div>
      <div class="di-cn">${e.day_cn}</div>
      <div class="di-dots">
        ${e.english  ? '<span class="dot">📚</span>' : ''}
        ${e.beauty   ? '<span class="dot">💄</span>' : ''}
        ${e.research ? '<span class="dot">🔬</span>' : ''}
      </div>
    </div>
  `).join('');
}

/* ── Content ── */
function renderContent() {
  const panel = document.getElementById('content-panel');
  if (selIdx < 0) {
    panel.innerHTML = ENTRIES.length
      ? '<div class="center-msg">← Pick a date from the left</div>'
      : '<div class="center-msg"><div class="big">🏡</div>No entries yet.<br>Run the daily email script to get started!</div>';
    return;
  }
  const html = ENTRIES[selIdx][selTab];
  panel.innerHTML = html
    || '<div class="center-msg" style="color:#ccc">No content for this section</div>';
}

function selectEntry(i) {
  selIdx = i;
  renderSidebar();
  renderContent();
}

/* ── Tab clicks ── */
document.getElementById('tab-bar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selTab = btn.dataset.tab;
  renderContent();
});

/* ── Init ── */
renderSidebar();
renderContent();
</script>
