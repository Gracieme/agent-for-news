<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>格雷西学习小屋 🏡</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:   #1a73e8;
      --pink:   #c2185b;
      --teal:   #00838f;
      --purple: #667eea;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 14px rgba(102,126,234,.4);
    }
    .header-brand { display: flex; align-items: baseline; gap: 10px; }
    .header-brand h1 { color: #fff; font-size: 20px; font-weight: 800; letter-spacing: 1px; }
    .header-brand span { color: rgba(255,255,255,.6); font-size: 12px; }
    .header-pill {
      background: rgba(255,255,255,.18);
      border-radius: 20px;
      padding: 5px 16px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }
    .header-pill em { font-style: normal; font-size: 20px; font-weight: 800; }

    /* ── Layout ── */
    .layout {
      display: flex;
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 16px;
      gap: 20px;
      align-items: flex-start;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 196px;
      flex-shrink: 0;
      position: sticky;
      top: 76px;
      max-height: calc(100vh - 96px);
      overflow-y: auto;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .sidebar-label {
      font-size: 11px;
      font-weight: 700;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 0 4px;
      margin-bottom: 10px;
    }

    .date-item {
      background: #fff;
      border-radius: 10px;
      padding: 10px 13px;
      margin-bottom: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all .15s ease;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .date-item:hover { border-color: #c4b7f0; transform: translateX(2px); }
    .date-item.active {
      border-color: var(--purple);
      background: linear-gradient(135deg, #f3f0ff, #faf0ff);
    }
    .date-item .di-en  { font-size: 12px; font-weight: 700; color: #555; }
    .date-item.active .di-en { color: var(--purple); }
    .date-item .di-cn  { font-size: 11px; color: #bbb; margin-top: 1px; }
    .date-item .di-dots { display: flex; gap: 3px; margin-top: 5px; }
    .dot {
      font-size: 11px;
      padding: 1px 5px;
      border-radius: 6px;
      background: #f0f0f0;
      color: #888;
    }

    /* ── Main ── */
    .main { flex: 1; min-width: 0; }

    /* ── Tab bar ── */
    .tab-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab-btn {
      padding: 9px 20px;
      border-radius: 10px;
      border: 2px solid #e8e8e8;
      background: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      color: #888;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
    }
    .tab-btn:hover { border-color: #bbb; color: #555; }

    .tab-btn[data-tab="english"].active {
      border-color: var(--blue); background: #e8f0fe; color: var(--blue);
      box-shadow: 0 2px 10px rgba(26,115,232,.18);
    }
    .tab-btn[data-tab="beauty"].active {
      border-color: var(--pink); background: #fce4ec; color: var(--pink);
      box-shadow: 0 2px 10px rgba(194,24,91,.18);
    }
    .tab-btn[data-tab="research"].active {
      border-color: var(--teal); background: #e0f7fa; color: var(--teal);
      box-shadow: 0 2px 10px rgba(0,131,143,.18);
    }
    .tab-btn[data-tab="news"].active {
      border-color: #e65100; background: #fff3e0; color: #e65100;
      box-shadow: 0 2px 10px rgba(230,81,0,.18);
    }

    /* ── Content panel ── */
    .content-panel {
      background: #fff;
      border-radius: 14px;
      padding: 28px 30px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
      min-height: 420px;
    }

    /* ── States ── */
    .center-msg {
      text-align: center;
      padding: 80px 20px;
      color: #bbb;
      font-size: 15px;
      line-height: 1.9;
    }
    .center-msg .big { font-size: 52px; margin-bottom: 16px; }

    @media (max-width: 680px) {
      .layout { flex-direction: column; padding: 12px; }
      .sidebar { width: 100%; position: static; max-height: 180px; }
      .header-pill { display: none; }
      .header-brand h1 { font-size: 16px; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-brand">
    <h1>🏡 格雷西学习小屋</h1>
    <span>Gracie's Learning Hub</span>
  </div>
  <div class="header-pill"><em id="total-days">0</em> days of learning</div>
</header>

<div class="layout">

  <nav class="sidebar">
    <div class="sidebar-label">📅 Archive</div>

  <main class="main">
    <div class="tab-bar" id="tab-bar">
      <button class="tab-btn active" data-tab="english">📚 英语表达</button>
      <button class="tab-btn"        data-tab="beauty">💄 美妆</button>
      <button class="tab-btn"        data-tab="research">🔬 科研文献</button>
      <button class="tab-btn"        data-tab="news">📰 全球新闻</button>

        每次发送邮件后内容会自动同步到这里！
      </div>

  </main>

</div>

<script>
const ENTRIES = [{"date_key": "2026-03-26", "date_cn": "2026年03月26日", "day_cn": "周四", "english": "<div style=\"background:#e8f0fe;border-left:4px solid #1a73e8;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1a73e8;font-size:15px\">【今日主题】</strong><span style=\"margin-left:8px;font-weight:400;color:#1a73e8\">租房与买房（Housing Market, Landlords, Roommates）</span></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e3f2fd;border-left:4px solid #0d47a1;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#0d47a1;font-size:15px\">【英文原文】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">So, have you guys heard? Mike&#x27;s landlord just hit him with a massive rent hike. Like, thirty percent. The bloke&#x27;s absolutely <strong>taking the piss</strong>.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Thirty percent?! That&#x27;s criminal. Is he gonna fight it or just cop it on the chin?</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">He&#x27;s already <strong>house-hunting</strong>, actually. He said he&#x27;s done renting. Wants to get on the <strong>property ladder</strong> before prices go even more mental.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Good luck with that. The housing market right now is an absolute <strong>seller&#x27;s market</strong>. Everything&#x27;s going for way over asking price. My cousin put in five offers last month and got outbid every single time.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#2e7d32;white-space:nowrap\">C:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Yeah, tell me about it. We&#x27;ve been trying to buy for over a year now. Every open house is <span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">packed to the gills</span>. You show up and there&#x27;s like forty people already in line. It&#x27;s doing my head in.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Have you thought about maybe getting a <strong>fixer-upper</strong>? Those usually scare off the big spenders. You could probably snag one without a bidding war.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#2e7d32;white-space:nowrap\">C:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">We actually looked at a couple. But the <strong>closing costs</strong> alone would drain us, and then you&#x27;ve still got renovations on top of that. We&#x27;d be <strong>house poor</strong> for years — like, technically homeowners but eating ramen every night.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Honestly, that&#x27;s why I&#x27;m still splitting rent with a <strong>flatmate</strong>. It&#x27;s not glamorous, but at least I&#x27;m not <span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">stretched thin</span> every month. My mate Dave, though — he just locked in a thirty-year <strong>fixed-rate mortgage</strong> at like six point two percent. He reckons it&#x27;s still worth it &#x27;cause rent money is just <strong>dead money</strong> anyway.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">He&#x27;s not wrong, though. At least with a mortgage you&#x27;re building equity. Rent just vanishes into your landlord&#x27;s pocket.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#2e7d32;white-space:nowrap\">C:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">True. But being locked into a mortgage when you might want to relocate in a couple of years? That scares me more than paying rent, honestly.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Yeah, it&#x27;s a tough call either way. No perfect answer, is there?</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Nope. Just different flavours of being broke.</td></tr></table>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e8f5e9;border-left:4px solid #1b5e20;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1b5e20;font-size:15px\">【中文翻译】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">你们听说了吗？Mike的房东突然给他大幅涨租，涨了百分之三十。那家伙简直是在<strong>胡来/欺负人</strong>（taking the piss）。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">百分之三十？！太离谱了。他打算抗争还是就硬扛下来？</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">他其实已经在<strong>找房子</strong>（house-hunting）了。他说受够租房了，想趁房价没再涨疯之前赶紧<strong>上车买房</strong>（get on the property ladder）。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">祝他好运吧。现在的房市完全是<strong>卖方市场</strong>（seller&#x27;s market），每套房都远超要价成交。我表弟上个月出了五次报价，每次都被人加价顶掉。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#2e7d32;white-space:nowrap\">C:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">可不是嘛。我们尝试买房已经一年多了。每次看房日都<span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">挤得水泄不通</span>，你到了发现前面已经排了四十个人。真是快把我逼疯了。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">你们有没有考虑买个<strong>需要翻修的旧房子</strong>（fixer-upper）？那种房子通常会吓跑出大价钱的买家，你们也许能避开竞价大战拿下来。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#2e7d32;white-space:nowrap\">C:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">我们确实看过几套。但光是<strong>过户费用</strong>（closing costs）就能把我们掏空，之后还有装修费。我们会变成<strong>房奴</strong>（house poor）好几年——名义上是房主，实际上每天只能吃方便面。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">说实话，这就是我还在和<strong>室友</strong>（flatmate）合租的原因。虽然不光鲜，但至少每个月不会<span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">捉襟见肘</span>。不过我哥们Dave刚锁定了一个三十年<strong>固定利率贷款</strong>（fixed-rate mortgage），利率大概6.2%。他觉得还是值得的，因为交的房租反正就是<strong>打水漂的钱</strong>（dead money）。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">他说得也没错。至少还贷款是在积累资产，房租交了就进了房东的口袋，啥也没剩。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#2e7d32;white-space:nowrap\">C:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">没错。但万一两三年内想搬到别的城市呢？被房贷绑住——说实话，这比交房租更让我害怕。</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">是啊，怎么选都不容易。没有完美答案，对吧？</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">是的。只不过是不同形式的穷罢了。</td></tr></table>\n<div style=\"height:8px\"></div>\n<div style=\"background:#f3e5f5;border-left:4px solid #4a148c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#4a148c;font-size:15px\">【本日表达列表】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">01.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>taking the piss</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 胡来、欺负人、不当回事（表示对方做得太过分）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 英国 / 澳大利亚</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 朋友间抱怨某人行为离谱时使用，非正式场合</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">02.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>house-hunting</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 找房子（买房或租房前四处看房的过程）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 日常聊天谈论搬家、买房计划时</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">03.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>property ladder</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 房产阶梯（指首次置业进入房产市场，常用&quot;get on the property ladder&quot;）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 英国 / 澳大利亚 / 新西兰</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 讨论年轻人首次买房、房市门槛时</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">04.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>seller&#x27;s market</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 卖方市场（供不应求，卖家占优势的市场状态）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 谈论房市行情、经济新闻、买房经历时</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">05.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>fixer-upper</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 需要翻修的旧房子（价格较低但需大量维修的房产）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 讨论买房策略、看房经历、家装话题时</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">06.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>closing costs</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 过户费用 / 交割成本（买房完成交易时产生的各种手续费、税费等）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 买房流程中谈论费用、与经纪人或银行沟通时</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">07.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>house poor</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 房奴（房子买了但日常开销捉襟见肘，大部分收入用于还贷）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国 / 加拿大</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 朋友间讨论买房压力、理财规划时</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">08.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>flatmate</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 室友（合租的人）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 英国 / 澳大利亚 / 新西兰（美国更常说 roommate）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 日常聊天中提到合住的人</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">09.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>fixed-rate mortgage</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 固定利率抵押贷款（利率在整个还款期内不变）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 全球通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 买房贷款咨询、朋友间讨论房贷选择时</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">10.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>dead money</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 打水漂的钱（花出去没有回报、不能积累资产的钱）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 澳大利亚 / 英国（美国也有使用）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 讨论租房vs买房、投资回报时，常说&quot;rent is dead money&quot;</span></td></tr></table>", "beauty": "<div style=\"background:#fce4ec;border-left:4px solid #e91e8c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#c2185b;font-size:15px\">【今日主题】</strong><span style=\"margin-left:8px;font-weight:400;color:#c2185b\">唇妆色号 · 橄榄皮的&quot;显白显瘦&quot;唇色密码</span></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">一、橄榄皮选唇色的核心逻辑</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">橄榄皮肤底偏黄偏绿灰，最怕的就是唇色&quot;吃肤色&quot;——涂上去显得整张脸更黄更暗。记住一个万能公式：</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">&gt; <strong>底色带棕/暖橘调 + 饱和度中高 + 避开蓝底粉紫</strong></p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">具体来说：</p>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">1.</span><span style=\"color:#333;font-size:14px;line-height:1.7\"><strong>✅ 友好色调</strong>：砖红、脏橘、红棕、豆沙棕、焦糖、暖梅子</span></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">2.</span><span style=\"color:#333;font-size:14px;line-height:1.7\"><strong>❌ 踩雷色调</strong>：冷粉（芭比粉）、冷紫（死亡玫紫）、荧光橘、裸到发白的肉粉色</span></div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">二、圆脸唇妆的&quot;视觉瘦脸&quot;画法</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">唇形画法对圆脸的影响远超你想象：</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>Step 1 · 唇线定型</strong></p>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>用与唇膏同色系的唇线笔，将<strong>上唇唇峰画得略尖锐</strong>，制造棱角感，打破圆脸的&quot;圆润线条&quot;。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>下唇底部中央<strong>微微画平</strong>，不要画成完美圆弧，视觉上缩短下巴到嘴唇的距离。</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>Step 2 · 唇形比例</strong></p>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>上下唇比例控制在 <strong>1:1.2 ～ 1:1.3</strong>，下唇略饱满即可。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>不要过度强调横向宽度</strong>——唇膏涂抹不超出嘴角，甚至可以内缩1-2mm，让嘴唇视觉上变窄，从而反衬脸更小。</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>Step 3 · 渐变咬唇法（日常首选）</strong></p>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>用遮瑕膏/粉底轻拍模糊唇边缘 → 唇膏集中涂抹在<strong>唇内侧2/3</strong> → 用手指向外晕开。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>这种&quot;内深外浅&quot;的咬唇效果让嘴唇看起来更小巧，对圆脸非常友好。</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\"><strong>Step 4 · 质地选择</strong></p>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>哑光/丝绒雾面</strong> &gt; 水光/玻璃唇。高光感唇妆会让唇部膨胀，增加面部横向体量。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>如果喜欢微光泽，选&quot;柔雾缎光&quot;质地即可。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">三、四大场景色号推荐</div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">🔸 场景一：日常通勤——红棕/豆沙棕</div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">温柔低调、不挑场合，和橄榄皮搭配显得气色好但不突兀。</p>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">🔸 场景二：约会小心机——砖红/暖梅子</div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">砖红是橄榄皮的&quot;亲妈色&quot;，涂上一秒提亮肤色，既显白又有氛围感。</p>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">🔸 场景三：职场正式——深豆沙/干枯玫瑰棕</div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">带灰棕调的深豆沙非常高级，压得住气场又不会过于浓烈。</p>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">🔸 场景四：派对/晚宴——深酒红/焦糖红</div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">浓郁深色系，饱和度拉满，搭配雾面质地直接封神。</p>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#fff9c4;border-left:4px solid #f9a825;padding:12px 16px;margin:14px 0;border-radius:0 8px 8px 0\"><strong style=\"color:#e65100\">💡 <strong>针对你的肤质/脸型：</strong></strong></div>\n<div style=\"height:8px\"></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>角质层偏厚 → 唇部也容易堆积死皮</strong>。建议每周1-2次用唇部磨砂膏轻柔去角质，之后涂润唇膏打底10分钟再上色，否则哑光唇膏会&quot;卡皮&quot;显得干燥斑驳。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>毛孔偏大、出油适中</strong>：唇周出油容易导致唇膏晕开、模糊唇线。上唇妆前用散粉轻扑唇周，再用唇线笔勾勒，持妆翻倍。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>圆脸 + 橄榄皮的黄金组合</strong>：用偏深的唇色（红棕、砖红）搭配当日修容，深色唇会将视觉重心集中到面部中心偏下位置，配合太阳穴到下颚线的修容，脸型会被&quot;框&quot;得更窄更长。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e0f7fa;border-left:4px solid #00bcd4;padding:12px 16px;margin:14px 0;border-radius:0 8px 8px 0\"><strong style=\"color:#006064\">🎨 <strong>产品/色号推荐：</strong></strong></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 场景 | 品牌 &amp; 色号 | 质地 | 推荐理由 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">|------|------------|------|----------|</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 日常通勤 | <strong>MAC · Marrakesh</strong> | 哑光 | 经典红棕，橄榄皮百搭不踩雷 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 日常通勤 | <strong>3CE · Taupe</strong> | 丝绒 | 豆沙棕灰调，自带高级感 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 约会 | <strong>YSL 小金条 · #1966</strong> | 缎光哑光 | 砖红正调，显白力天花板 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 约会 | <strong>Bobbi Brown · Crushed Lip · Cranberry</strong> | 柔雾 | 暖梅子色，带微棕调不显黑 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 职场 | <strong>Charlotte Tilbury · Pillow Talk Medium</strong> | 哑光 | 适合偏深肤色的干枯玫瑰棕 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 派对 | <strong>NARS · Audacious · Bette</strong> | 丝缎 | 深酒红色，气场全开 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 派对 | <strong>Pat McGrath · Elson 2</strong> | 哑光 | 焦糖深红，橄榄皮涂完像自带打</p>", "research": "<p style=\"margin:5px 0;line-height:1.8;color:#555;font-size:13px;padding-left:96px\">（今日无法获取论文数据，请稍后查看）</p>", "news": "<div style=\"margin-bottom:22px\"><div style=\"background:#c62828;color:#fff;font-weight:700;font-size:14px;padding:7px 14px;border-radius:8px 8px 0 0;letter-spacing:0.5px\">🇨🇳 中国</div><div style=\"background:#fff5f5;border:1px solid #ffd9d9;border-top:none;border-radius:0 0 8px 8px;padding:4px 0\">\n<div style=\"padding:10px 14px;border-bottom:1px solid #ffd9d9\"><a href=\"http://english.people.com.cn/n3/2025/0605/c90000-20323960.html\" target=\"_blank\" rel=\"noopener\" style=\"display:block;color:#c62828;font-weight:700;font-size:14px;text-decoration:none;margin-bottom:3px;line-height:1.4\">中国敦促美国放弃滥用国家安全概念</a><div style=\"color:#555;font-size:12px;margin-bottom:4px;line-height:1.4\">China urges U.S. to abandon excessive use of national security concept</div><div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap\"><span style=\"color:#777;font-size:12px;flex:1\">中方呼吁美方停止泛化国家安全概念</span><span style=\"background:#ffd9d9;color:#c62828;font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap;font-weight:600\">人民日报(英文版)</span></div></div>\n<div style=\"padding:10px 14px;border-bottom:1px solid #ffd9d9\"><a href=\"http://english.people.com.cn/n3/2025/0605/c90000-20323922.html\" target=\"_blank\" rel=\"noopener\" style=\"display:block;color:#c62828;font-weight:700;font-size:14px;text-decoration:none;margin-bottom:3px;line-height:1.4\">北京迎来2025年首个高温日</a><div style=\"color:#555;font-size:12px;margin-bottom:4px;line-height:1.4\">Beiji ealth contract</div><div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap\"><span style=\"color:#777;font-size:12px;flex:1\"></span><span style=\"background:#b2dfdb;color:#00695c;font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap;font-weight:600\">BBC Africa</span></div></div>\n<div style=\"padding:10px 14px;border-bottom:1px solid #b2dfdb\"><a href=\"https://www.bbc.com/sport/football/articles/c895x5x0jy5o?at_medium=RSS&at_campaign=rss\" target=\"_blank\" rel=\"noopener\" style=\"display:block;color:#00695c;font-weight:700;font-size:14px;text-decoration:none;margin-bottom:3px;line-height:1.4\">Senegal appeal to be heard &#x27;as swiftly as possible&#x27;</a><div style=\"color:#555;font-size:12px;margin-bottom:4px;line-height:1.4\">Senegal appeal to be heard &#x27;as swiftly as possible&#x27;</div><div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap\"><span style=\"color:#777;font-size:12px;flex:1\"></span><span style=\"background:#b2dfdb;color:#00695c;font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap;font-weight:600\">BBC Africa</span></div></div>\n<div style=\"padding:10px 14px;border-bottom:1px solid #b2dfdb\"><a href=\"https://www.bbc.com/news/articles/clydj9gj24jo?at_medium=RSS&at_campaign=rss\" target=\"_blank\" rel=\"noopener\" style=\"display:block;color:#00695c;font-weight:700;font-size:14px;text-decoration:none;margin-bottom:3px;line-height:1.4\">Dozens of bodies, mostly infants, discovered in Kenya mass grave</a><div style=\"color:#555;font-size:12px;margin-bottom:4px;line-height:1.4\">Dozens of bodies, mostly infants, discovered in Kenya mass grave</div><div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap\"><span style=\"color:#777;font-size:12px;flex:1\"></span><span style=\"background:#b2dfdb;color:#00695c;font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap;font-weight:600\">BBC Africa</span></div></div>\n<div style=\"padding:10px 14px;border-bottom:1px solid #b2dfdb\"><a href=\"https://www.bbc.com/sport/football/articles/c86ew5d52d9o?at_medium=RSS&at_campaign=rss\" target=\"_blank\" rel=\"noopener\" style=\"display:block;color:#00695c;font-weight:700;font-size:14px;text-decoration:none;margin-bottom:3px;line-height:1.4\">Saudi Pro League, the US or Europe - what are Salah&#x27;s options?</a><div style=\"color:#555;font-size:12px;margin-bottom:4px;line-height:1.4\">Saudi Pro League, the US or Europe - what are Salah&#x27;s options?</div><div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap\"><span style=\"color:#777;font-size:12px;flex:1\"></span><span style=\"background:#b2dfdb;color:#00695c;font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap;font-weight:600\">BBC Africa</span></div></div>\n</div></div>"}, {"date_key": "2026-03-25", "date_cn": "2026年03月25日", "day_cn": "周三", "english": "<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e8f0fe;border-left:4px solid #1a73e8;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1a73e8;font-size:15px\">【今日主题】</strong><span style=\"margin-left:8px;font-weight:400;color:#1a73e8\">人际关系与友谊 Friendship, Trust &amp; Communication</span></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e3f2fd;border-left:4px solid #0d47a1;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#0d47a1;font-size:15px\">【英文原文】</strong></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A (Megan): Hey, so… I need to vent for a sec. You know how I&#x27;ve been <strong>ride or die</strong> with Chloe since, like, middle school?</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">B (Jake): Oh yeah, you two have always been super tight. What happened?</p>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Okay so last week she totally <strong>left me on read</strong> for three days after I asked if she was okay. Then she goes and posts stories hanging out with her new work friends like nothing&#x27;s wrong.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Hmm. I mean, that stings, but maybe she just needed space? Sometimes people aren&#x27;t trying to be shady — they&#x27;re just <span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">dealing with their own stuff</span>.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">I get that, but here&#x27;s the thing — when I finally called her out on it, she tried to <strong>gaslight</strong> me. She was like, &quot;I never saw your message,&quot; even though I could literally see the read receipts.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Yikes. That&#x27;s not cool. But real talk — did you <strong>come at her</strong> super aggressive, or did you keep it chill?</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Honestly? I probably came in a little hot. But I was hurt! I feel like I always <strong>have her back</strong>, and she just <strong>blows me off</strong> whenever something better comes along.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">I hear you. Look, I don&#x27;t wanna <strong>stir the pot</strong>, but have you considered that maybe you guys are just in different chapters right now? It doesn&#x27;t mean the friendship is over. Sometimes people <strong>grow apart</strong> and that&#x27;s just life.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Yeah… my sister said the same thing. She told me to stop <strong>reading into</strong> every little thing and just give Chloe some grace.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Your sister&#x27;s <span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">spot on</span>. And hey — if Chloe&#x27;s really your girl, she&#x27;ll come around. But you gotta <strong>keep it real</strong> with her too. Just sit down, no drama, and tell her how you actually feel. Like, <span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">lay your cards on the table</span>.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">You&#x27;re right. I think I&#x27;ve been so <strong>in my head</strong> about it that I made it worse than it needs to be. I&#x27;ll text her tonight and ask if she wants to grab coffee this weekend.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">There you go. Worst case, you get closure. Best case, you guys <span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">hash it out</span> and come back even stronger.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#1a73e8;white-space:nowrap\">A:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">Thanks, Jake. Seriously. You always know how to talk me off the ledge.</td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:5px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:8px 6px 8px 0;font-weight:700;font-size:14px;color:#e53935;white-space:nowrap\">B:</td><td valign=\"top\" style=\"padding:8px 0;font-size:14px;color:#333;line-height:1.7\">That&#x27;s what friends are for, Meg.</td></tr></table>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#e8f5e9;border-left:4px solid #1b5e20;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#1b5e20;font-size:15px\">【中文翻译】</strong></div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A（Megan）：嘿，我得吐槽一下。你知道我从初中开始就跟 Chloe 是<strong>生死之交</strong>（ride or die）吧？</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">B（Jake）：当然啦，你俩一直关系特别铁。怎么了？</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A：上周我发消息问她还好吗，她直接<strong>已读不回</strong>（left me on read）了三天。然后转头就发动态跟她新同事们玩得开开心心，好像什么事都没有。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">B：嗯……确实挺扎心的，但也许她只是需要一点空间？有时候人家不是故意搞事，只是在<span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">处理自己的事情</span>。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A：我理解，但问题是——我后来质问她的时候，她居然想<strong>PUA我 / 操控我认知</strong>（gaslight）。她说&quot;我没看到你的消息&quot;，但我明明能看到已读回执啊。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">B：呃……那确实不太行。但说真的——你<strong>质问她</strong>（come at her）的时候，语气是不是太冲了？</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A：说实话？可能有点上头。但我真的很受伤啊！我觉得我一直<strong>挺她</strong>（have her back），而她一有更好的选择就<strong>甩开我</strong>（blow me off）。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">B：我懂。我不想<strong>搅局 / 挑事</strong>（stir the pot），但你有没有想过，也许你们只是处在人生不同的阶段？这不代表友谊就结束了。有时候人就是会<strong>渐行渐远</strong>（grow apart），这就是生活。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A：嗯……我姐也这么说的。她让我别什么事都<strong>过度解读</strong>（read into），对 Chloe 宽容一点。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">B：你姐说得<span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">太对了</span>。而且——如果 Chloe 真的是你的好朋友，她会回来的。但你也得<strong>坦诚相待</strong>（keep it real）。坐下来，别搞得太戏剧化，跟她说你真实的感受，<span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">把话摊开说</span>。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A：你说得对。我觉得我一直<strong>钻牛角尖</strong>（in my head），把事情想得比实际更严重了。我今晚给她发消息，问她周末要不要出来喝杯咖啡。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">B：这就对了。最坏的结果，你得到一个了结。最好的结果，你们<span style=\"background:#f5f0e6;color:#8b7355;padding:1px 4px;border-radius:3px;font-size:0.98em\">把问题聊开</span>，关系反而更好。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">A：谢谢你，Jake。真的。你总能让我冷静下来。</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">B：这就是朋友的意义啊，Meg。</p>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#f3e5f5;border-left:4px solid #4a148c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#4a148c;font-size:15px\">【本日表达列表】</strong></div>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">01.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>ride or die</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 生死之交；最铁的朋友，无论什么情况都力挺对方</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用（源自嘻哈文化，现已广泛使用）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 形容最亲密的朋友或伴侣关系</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">02.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>left me on read</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 已读不回</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用 / Gen Z</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 聊社交媒体和短信沟通时常用，表达被忽略的失落感</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">03.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>gaslight</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 操控他人认知，让对方怀疑自己的判断或记忆（心理操控）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 全球通用英语（美国尤其高频使用）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 讨论人际关系中的不健康行为、情感操控</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">04.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>come at someone</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 冲着某人来；以攻击性/对抗性的态度对待某人</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 描述争吵或质问时语气过于强硬</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">05.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>have someone&#x27;s back</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 挺某人，支持某人，在背后保护某人</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 表达对朋友的忠诚和支持</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">06.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>blow someone off</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 放某人鸽子；无视某人；不把某人当回事</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 抱怨朋友取消计划或忽略自己</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">07.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>stir the pot</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 搅局；挑事；故意把事情搞复杂</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 在给别人建议时，表明自己不想制造更多矛盾</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">08.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>grow apart</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— （两人之间）渐渐疏远，渐行渐远</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 全球通用英语</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 描述友谊或感情随时间自然变淡</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">09.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>read into something</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 过度解读某事；想太多</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 劝人不要把简单的事情想得太复杂</span></td></tr></table>\n<div style=\"height:8px\"></div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:6px 0;border-collapse:collapse\"><tr><td width=\"28\" valign=\"top\" style=\"padding:10px 8px 10px 14px;color:#1a73e8;font-weight:700;font-size:13px;white-space:nowrap;background:#f0f4ff;border-radius:8px 0 0 8px;border:1px solid #d0d9ff;border-right:none\">10.</td><td valign=\"top\" style=\"padding:10px 14px 10px 8px;background:#f8f9ff;border-radius:0 8px 8px 0;border:1px solid #d0d9ff;border-left:none\"><strong style=\"color:#1a73e8;font-size:14px\"><strong>keep it real</strong></strong><span style=\"color:#555;font-size:13px;margin-left:8px\">— 坦诚相待；说真话；做真实的自己</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f0fe;border-radius:10px;font-size:11px;color:#1a73e8;white-space:nowrap;margin-left:6px\">📍 美国通用（源自非裔美国人口语，已广泛使用）</span><span style=\"display:inline-block;padding:2px 8px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#2e7d32;white-space:nowrap;margin-left:6px\">💬 鼓励朋友在沟通中保持真诚</span></td></tr></table>", "beauty": "<div style=\"background:#fce4ec;border-left:4px solid #e91e8c;padding:10px 16px;margin:18px 0 10px;border-radius:0 6px 6px 0\"><strong style=\"color:#c2185b;font-size:15px\">【今日主题】</strong><span style=\"margin-left:8px;font-weight:400;color:#c2185b\">修容高光 · 圆脸&quot;瘦&quot;三圈的光影魔法</span></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">一、修容篇——把&quot;圆&quot;变成&quot;鹅蛋&quot;</div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">Step 1 选对修容色调</div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">棱橄榄皮最常踩的坑：用灰调修容 → 脸上脏兮兮。</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">✅ 正确思路：选 <strong>偏暖棕/焦糖棕</strong> 色调的修容，与你自身的黄暖肤色融为一体，阴影才像&quot;天生长在脸上&quot;。</p>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">Step 2 圆脸五区修容法（重点区域 + 手法）</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 区域 | 目的 | 手法要点 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">|------|------|----------|</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| ① <strong>太阳穴→颧骨下方</strong> | 收窄中庭宽度（最关键！） | 用修容刷从耳前向嘴角方向斜扫&quot;3&quot;字形，<strong>不超过瞳孔正下方</strong>，否则显脸更短 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| ② <strong>下颌角→下巴两侧</strong> | 削弱圆润轮廓线 | 顺着下颌骨向下巴方向轻扫，收窄下半张脸 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| ③ <strong>发际线两侧（额角）</strong> | 缩小额头横向宽度 | 沿发际线半圆形轻扫，面积不宜过大 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| ④ <strong>鼻梁两侧</strong> | 集中五官、视觉拉长中庭 | 眉头下方→鼻翼两侧细线条，用小号刷晕开 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| ⑤ <strong>下巴底部（颏下三角）</strong> | 制造下巴&quot;尖&quot;的错觉 | 下巴最下缘轻轻带过，让下巴在视觉上往前&quot;翘&quot;出来 |</p>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">Step 3 晕染铁律</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>工具</strong>：用 <strong>松散的扇形刷 / 蘑菇头刷</strong> 打圈晕染，绝对不要硬边。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>手法</strong>：少量多次！先在手背试色，每次蘸取后在手背蹭掉多余粉量再上脸。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>顺序</strong>：先修容 → 再高光 → 最后腮红，三步叠加才不会互相盖掉。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">二、高光篇——橄榄皮的&quot;高级光泽&quot;</div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">Step 1 高光质地选择</div>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 质地 | 适合场景 | 棱橄榄皮适配度 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">|------|----------|----------------|</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| <strong>细腻缎光 / 香槟光</strong> | 日常通勤 | ⭐⭐⭐⭐⭐ 首选！ |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 水光 / 液体高光 | 拍照、派对 | ⭐⭐⭐⭐ 混合底妆用，少量即可 |</p>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">| 大亮片闪光 | 舞台 | ⭐⭐ 毛孔偏大慎用，会放大纹理 |</p>\n<div style=\"height:8px\"></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">&gt; <strong>关键原则</strong>：橄榄皮避开银白色/冷粉色高光，会显灰显&quot;金属脸&quot;。选 <strong>香槟金、蜜桃金、浅古铜色</strong>，与肤色融合后是高级的&quot;从内透出来的光&quot;。</p>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">Step 2 圆脸高光四点打法</div>\n<div style=\"height:8px\"></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">1.</span><span style=\"color:#333;font-size:14px;line-height:1.7\"><strong>眉弓 → 额头中央偏上</strong></span></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">竖向窄条高光，视觉拉长上庭。</p>\n<div style=\"height:8px\"></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">2.</span><span style=\"color:#333;font-size:14px;line-height:1.7\"><strong>鼻梁中段（短短一截）</strong></span></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">只点在山根到鼻尖上 1/3 处，不要通刷到鼻头——否则鼻子显宽显长。</p>\n<div style=\"height:8px\"></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">3.</span><span style=\"color:#333;font-size:14px;line-height:1.7\"><strong>颧骨最高点（苹果肌靠上）</strong></span></div>\n<div style=\"background:#fff3e0;border-left:4px solid #ff9800;padding:8px 16px;margin:10px 0;border-radius:0 6px 6px 0;color:#bf360c;font-size:13px\">⚠️ 圆脸重点：高光打在 <strong>颧骨最高点偏上、偏后</strong> 的位置（靠近太阳穴方向），而不是苹果肌正中间。这样光线把视觉焦点往上提，脸看起来更窄更立体。</div>\n<div style=\"height:8px\"></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">4.</span><span style=\"color:#333;font-size:14px;line-height:1.7\"><strong>下巴尖端（一小点）</strong></span></div>\n<p style=\"margin:6px 0;line-height:1.8;color:#333;font-size:14px\">配合修容的颏下阴影，让下巴更&quot;翘&quot;更V。</p>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:14px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">Step 3 叠加小心机</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>在高光 <strong>之前</strong>，用一点点 <strong>液体高光混进粉底</strong>，薄薄拍在颧骨最高点，再叠粉状高光 → 光泽更有层次、更&quot;皮肤感&quot;，不像浮在表面。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span>鼻梁高光用 <strong>手指轻点拍按</strong>，比刷子更服帖自然。</div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"color:#c2185b;font-weight:700;font-size:15px;margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid #fce4ec\">三、圆脸修容高光的&quot;三条红线&quot;🚫</div>\n<div style=\"height:8px\"></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">1.</span><span style=\"color:#333;font-size:14px;line-height:1.7\"><strong>修容不过瞳孔线</strong>——颧骨修容向内延伸超过瞳孔正下方，会让脸看起来更短更宽。</span></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">2.</span><span style=\"color:#333;font-size:14px;line-height:1.7\"><strong>高光不铺苹果肌正面</strong>——圆脸苹果肌本身饱满，正面打亮只会让脸更&quot;膨胀&quot;。</span></div>\n<div style=\"display:flex;align-items:flex-start;margin:8px 0;padding:10px 14px;background:#fdf0f7;border-radius:8px\"><span style=\"color:#e91e8c;font-weight:700;min-width:70px;font-size:13px\">3.</span><span style=\"color:#333;font-size:14px;line-height:1.7\"><strong>不用珠光腮红代替高光</strong>——橄榄皮 + 毛孔偏大，大面积珠光 = 放大毛孔 + 油光感。</span></div>\n<div style=\"height:8px\"></div>\n<div style=\"height:8px\"></div>\n<div style=\"background:#fff9c4;border-left:4px solid #f9a825;padding:12px 16px;margin:14px 0;border-radius:0 8px 8px 0\"><strong style=\"color:#e65100\">💡 <strong>针对你的肤质/脸型：</strong></strong></div>\n<div style=\"height:8px\"></div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>角质层偏厚 + 毛孔偏大</strong>：上修容前确保底妆有做好妆前毛孔填充（毛孔隐形乳），否则粉状修容会卡进毛孔，出现&quot;麻点阴影&quot;。</div>\n<div style=\"padding:4px 0 4px 16px;color:#444;font-size:14px;line-height:1.7\"><span style=\"color:#e91e8c;margin-right:8px\">✦</span><strong>出油适中</strong>：T区出油后高光会变得过亮、失控，建议鼻梁高光用 **哑光遮</div>", "research": "<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 1</div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">HAO YANG, Joseph Foley</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">Translanguaging as Interactional Resources Employed by Students in EFL Student-Led Group Task Interaction</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Journal of English Language and Linguistics</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2024</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2 次</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#4a148c;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📝 摘要：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">This study aimed to investigate the strategies used by students during group tasks in the EFL classroom. The study focused on translanguaging as one of the strategies to facilitate communication and interaction among students. The data was collected by recording the classroom discussions of a focused group in an EFL class at a Chinese university over three hours. The analysis was carried out using…</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#6a1b9a;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🔗 与本研究的关联性：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">该论文与<strong>方向二（课堂互动与中介）</strong>高度相关：研究聚焦EFL课堂中学生主导的小组任务互动，以会话分析方法考察translanguaging作为互动资源的使用策略，直接涉及translanguaging和peer interaction两个核心议题。此外，研究语境设置在中国大学外语课堂，与CSL/语言教学课堂互动研究共享理论框架（如会话分析、互动能力），其对学生如何借助translanguaging协商意义、促进交流的发现，可为探讨语言相关片段（LRE）及中介化互动能力模型（MICM）提</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#37474f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">🆔 DOI：</td><td valign=\"top\" style=\"font-size:13px;line-height:1.7\"><a href=\"https://doi.org/10.62819/jel.2024.145\" target=\"_blank\" style=\"color:#1a73e8;text-decoration:none\">🔍 10.62819/jel.2024.145</a></td></tr></table>\n<div style=\"height:6px\"></div>\n</div>\n<div style=\"background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:20px 22px;margin:16px 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)\"><div style=\"background:linear-gradient(135deg,#00bcd4,#00897b);color:#fff;padding:10px 16px;border-radius:6px;margin:-20px -22px 16px;font-weight:700;font-size:15px;letter-spacing:1px\">📄 论文 2</div>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#c62828;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📌 作者：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Richard Kern</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#1565c0;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📖 标题：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;font-weight:700;\">Twenty‐first century technologies and language education: Charting a path forward</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#00838f;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📰 期刊：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">Modern Language Journal</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#e65100;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📅 年份：</td><td valign=\"top\" style=\"color:#333;font-size:14px;line-height:1.7;\">2024</td></tr></table>\n<table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"margin:7px 0;border-collapse:collapse\"><tr><td width=\"88\" valign=\"top\" style=\"color:#2e7d32;font-weight:600;font-size:13px;padding-right:8px;white-space:nowrap\">📊 引用量：</td><td valign=\"top\" style=\"color:#333;font-size:14px;l
